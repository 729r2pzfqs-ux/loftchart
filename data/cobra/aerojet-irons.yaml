description: >
  The Aerojet is Cobra's 2023 game-improvement iron and the standard-length version
  of a set also sold in ONE Length. It combines a PWRSHELL face insert with H.O.T.
  Face Technology, a variable-thickness pattern generated by machine learning to
  even out ball speed and spin across the face, and a PWR-BRIDGE weight suspended in
  a soft polymer filler that positions mass low while damping impact sound. Lofts
  are identical to the LTDx set it replaced, with a 26.5-degree 7-iron and a
  41.5-degree pitching wedge on a 37.25-inch 7-iron. The stock set is sold as
  4-iron through pitching wedge or 5-iron through gap wedge, in right and left hand
  and in both steel and graphite. Swing weights below are the steel-shaft values,
  and offsets are converted from Cobra's published millimetre figures.
