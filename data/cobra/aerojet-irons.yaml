faq:
  - q: "What is the loft of a Cobra Aerojet 7-iron?"
    a: "The Cobra Aerojet 7-iron has a loft of 26.5 degrees, a lie of 63.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra Aerojet set?"
    a: "Cobra sold the Aerojet irons as a 4-iron through pitching wedge set or a 5-iron through gap wedge set, both seven clubs. A sand wedge was also catalogued."
  - q: "Are these the Aerojet or the Aerojet ONE Length specs?"
    a: "These are the standard-length Aerojet irons. The Aerojet ONE Length version builds every iron to 7-iron length and has its own specifications."
