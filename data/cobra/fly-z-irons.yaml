faq:
  - q: "What is the loft of a Cobra Fly-Z 7-iron?"
    a: "The Cobra Fly-Z 7-iron has a loft of 30.5 degrees, a lie of 62.5 degrees and a steel-shaft length of 37.25 inches."
  - q: "What clubs come in a stock Cobra Fly-Z set?"
    a: "The stock set is seven clubs, 4-iron through gap wedge, in either steel or graphite. A 3-iron, sand wedge and lob wedge were available separately."
  - q: "What is the difference between the Fly-Z and the Fly-Z XL or Fly-Z Pro?"
    a: "The Fly-Z is the standard game-improvement model. The Fly-Z XL is a larger, lighter and more forgiving set, the Fly-Z Pro is a compact better-player iron, and the Fly-Z+ is a forged model."
