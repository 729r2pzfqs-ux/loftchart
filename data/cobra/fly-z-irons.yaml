description: >
  The Fly-Z is Cobra's 2015 game-improvement iron and the standard-length model in a
  four-club family that also included the Fly-Z XL, the Fly-Z Pro and the forged
  Fly-Z+. It pairs a 17-4 stainless steel body with a high-strength 455 stainless
  face insert over Cobra's deepest undercut cavity to that point, adding a Speed
  Channel around the perimeter of the face and a thermoplastic urethane Harmonic
  Cavity insert behind the impact zone for damping. Lofts are moderately strong,
  with a 30.5-degree 7-iron and a 45-degree pitching wedge, on a 37.25-inch steel
  7-iron. The stock set is seven clubs, 4-iron through gap wedge, in both steel and
  graphite; 3-iron, sand wedge and lob wedge heads were also catalogued. Lengths and
  swing weights below are the steel-shaft values, and offsets are converted from
  Cobra's published millimetre figures.
