description: >
  The AMP Cell is Cobra's 2013 game-improvement iron, built with what Cobra called
  true metalwood face-weld construction: a thin, high-strength steel face welded to
  a softer 431 stainless steel body, used in the 4- through 7-irons, with a
  progressively more conventional cavity design through the short irons. E9 Face
  Technology gives the face a variable thickness pattern matched to typical impact
  dispersion, and AMP Cell weighting plus a V-Skid sole handle mass distribution and
  turf interaction. Lofts are strong for the period at 31 degrees in the 7-iron and
  44 degrees in the pitching wedge, on a 37.25-inch 7-iron. Cobra listed heads from
  3-iron through lob wedge; stock sets were sold as 4-PW or 5-SW. Swing weights below
  are the steel-shaft values — graphite builds run two points lighter.
