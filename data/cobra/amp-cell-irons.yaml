faq:
  - q: "What is the loft of a Cobra AMP Cell 7-iron?"
    a: "The Cobra AMP Cell 7-iron has a loft of 31 degrees, a lie of 62.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra AMP Cell set?"
    a: "Stock sets were sold as 4-iron through pitching wedge or 5-iron through sand wedge. Cobra also catalogued a 3-iron, gap wedge and lob wedge as separate heads."
  - q: "How is the Cobra AMP Cell iron built?"
    a: "The 4- through 7-irons use a metalwood-style face weld: a thin, high-strength steel face welded to a softer 431 stainless steel body, with E9 variable-thickness face geometry."
