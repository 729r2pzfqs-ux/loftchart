description: >
  The King Cobra SS-i Oversize is Cobra's 2003 oversize game-improvement iron,
  investment cast in a comparatively soft 431 stainless steel with a deep undercut
  cavity filled with a urethane insert to damp vibration. Despite the "SS-i" name
  sometimes being grouped with Cobra's forged clubs, this is the cast oversize
  model — Cobra sold a separate King Cobra SS Forged set alongside it, with
  different lofts. Lofts are traditional by modern standards: the 7-iron is 33
  degrees and the pitching wedge 45 degrees, on a 37.00-inch steel 7-iron. The
  numbered set ran 2-iron through pitching wedge, with three matching wedges that
  Cobra listed by loft rather than by letter (50, 55 and 60 degrees), shown here as
  GW, SW and LW. Specs below are the men's steel-shaft values from Cobra's own
  archived spec table; graphite builds were half an inch longer throughout. Cobra
  published an offset column for this set, but its values run backwards relative to
  normal convention (increasing toward the wedges), so they are not reproduced here.
