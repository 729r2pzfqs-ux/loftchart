faq:
  - q: "What is the loft of a Cobra SS-i 7-iron?"
    a: "The Cobra King Cobra SS-i Oversize 7-iron has a loft of 33 degrees, a lie of 62.5 degrees and a steel-shaft length of 37.00 inches."
  - q: "Is the Cobra SS-i a forged iron?"
    a: "No. The SS-i Oversize is investment cast from 431 stainless steel. Cobra sold a separate King Cobra SS Forged set at the same time, which had different lofts."
  - q: "What wedges came with the Cobra SS-i set?"
    a: "Cobra listed the SS-i wedges by loft rather than by letter: 50, 55 and 60 degrees, alongside a 45-degree pitching wedge."
