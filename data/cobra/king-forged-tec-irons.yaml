description: >
  The KING Forged Tec is Cobra's multi-material players-distance iron: a 10-25
  carbon steel body forged five times, fitted with a thinner forged J15
  high-strength steel face insert, co-forged tungsten weights in the heel and toe,
  and a TPU insert behind the impact zone for damping. It sits between Cobra's
  Forged CB/MB blades and its cast game-improvement irons, with a compact but
  slightly thicker profile and modest offset (3.0 mm at the 7-iron). Lofts are
  moderately strong, with a 30-degree 7-iron and a 45-degree pitching wedge. The
  stock set is eight clubs, 4-iron through gap wedge. It reached retail in
  November 2016 as Cobra's 2017-season forged iron. Offsets below are converted
  from Cobra's published millimetre figures.
