faq:
  - q: "What is the loft of a Cobra KING Forged Tec 7-iron?"
    a: "The Cobra KING Forged Tec 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING Forged Tec set?"
    a: "The stock set is eight clubs, 4-iron through gap wedge. A 3-iron was also offered, and the gap wedge is 50 degrees."
  - q: "What is the Cobra KING Forged Tec made of?"
    a: "The body is a five-times-forged 10-25 carbon steel with a forged J15 high-strength steel face insert, co-forged tungsten heel and toe weights, and a TPU damping insert."
