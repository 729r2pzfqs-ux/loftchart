description: >
  The KING Speedzone is Cobra's 2020 game-improvement iron and the standard-length
  version of a set that was also sold in ONE Length. It was Cobra's first iron with
  a carbon fibre topline, which saves about three grams to lower the centre of
  gravity, combined with a forged PWRSHELL face insert whose thin area is roughly a
  third larger than the previous generation and which wraps into an eight per cent
  deeper undercut. Speedback shaping carries over the low-and-back mass distribution
  from the driver line. Lofts are very strong: the 7-iron is 27.5 degrees and the
  pitching wedge 42.5 degrees, on a 37.25-inch 7-iron. The stock set is seven clubs,
  5-iron through gap wedge in both right and left hand, with a 4-PW option in right
  hand. Lengths below are the standard-grip figures rather than the COBRA CONNECT
  ones, swing weights are the steel-shaft values, and offsets are converted from
  Cobra's published millimetre figures.
