faq:
  - q: "What is the loft of a Cobra KING Speedzone 7-iron?"
    a: "The Cobra KING Speedzone 7-iron has a loft of 27.5 degrees, a lie of 63.5 degrees and a standard length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING Speedzone set?"
    a: "The stock set is seven clubs, 5-iron through gap wedge in right and left hand, with a 4-iron through pitching wedge option in right hand. A sand wedge was also catalogued."
  - q: "Are these specs for the Speedzone or the Speedzone ONE Length?"
    a: "These are the standard-length Speedzone irons. The Speedzone ONE Length version builds every iron to 7-iron length and has its own specifications."
