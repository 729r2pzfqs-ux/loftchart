description: >
  The KING F6 is the first of Cobra's TECFLO progressive iron sets and the template
  for the F7, F8 and F9 that followed. Cobra announced it on 19 November 2015 and put
  it on sale in January 2016, so listings date it either way; year_introduced records
  the announcement. Construction changes through the set: the 3- to 5-irons are full
  hollow with a face insert, the 6- and 7-irons half hollow with a very thin face, the
  8-iron through pitching wedge conventional cavity backs, and the gap and sand wedges
  a specialty wedge design. An engineered aluminium T.O.P. cap replaces steel on the
  hollow heads to free about 5 grams, a Speed Channel runs around the sole and upper
  cavity, and the grooves change from V to U to wedge spacing through the set. Lofts
  are strong at 30 degrees in the 7-iron and 45 degrees in the pitching wedge, on a
  37.25-inch steel 7-iron. The stock set is eight clubs, 4-iron through pitching wedge
  plus a gap wedge, with a 3-iron and sand wedge catalogued separately. Lengths and
  swing weights below are the steel-shaft values, and offsets are converted from
  Cobra's published millimetre figures.
