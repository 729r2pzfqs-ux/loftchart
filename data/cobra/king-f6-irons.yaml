faq:
  - q: "What is the loft of a Cobra KING F6 7-iron?"
    a: "The Cobra KING F6 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a steel-shaft length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING F6 set?"
    a: "The stock set is eight clubs — 4-iron through pitching wedge plus a gap wedge. Cobra also catalogued a 3-iron and a sand wedge."
  - q: "Are the Cobra KING F6 irons hollow?"
    a: "Only part of the set. The 3- to 5-irons are full hollow with a face insert, the 6- and 7-irons are half hollow, and the 8-iron through pitching wedge are conventional cavity backs. Cobra called the scheme TECFLO."
