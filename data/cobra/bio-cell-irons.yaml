description: >
  The BiO Cell is Cobra's tungsten-weighted game-improvement iron, announced in
  autumn 2013 and sold as the 2014 line — year_introduced records the announcement
  year, so the 2014 on the packaging will not match it. It combines Cobra's BiO CELL
  weighting with the E9 variable-thickness face and what Cobra called the largest
  unsupported face of any of its irons to that point, sitting over a deep perimeter
  undercut. Tungsten is placed in the heel and toe of the long and mid irons for
  stability and directly behind the hitting area in the short irons for control.
  Lofts are strong at 30.5 degrees in the 7-iron and 45 degrees in the pitching
  wedge, on a 37.25-inch 7-iron. The stock steel set is eight clubs, 4-iron through
  pitching wedge plus a gap wedge; graphite was custom-order only, and a 3-iron, sand
  wedge and lob wedge were catalogued separately. The heads were sold in four
  colours. Swing weights below are the steel-shaft values — graphite builds run two
  points lighter. Cobra published a single length column covering both shaft
  materials and did not publish an offset figure for this set.
