description: >
  The Darkspeed is Cobra's 2024 game-improvement iron and the standard-length
  version of a set also sold in ONE Length. Unlike the mixed sets Cobra had been
  building, every iron in this set uses a metalwood-inspired hollow body, which
  frees up weight for a more unsupported face; the hollow cavity is filled with a
  soft polymer for damping. The face is a larger PWRSHELL insert with an updated
  H.O.T. variable-thickness pattern. Lofts are marginally weaker than the Aerojet
  through the middle of the set: the 7-iron is 27 degrees and the pitching wedge 42
  degrees, on a 37.25-inch 7-iron. The stock set is sold as 4-iron through pitching
  wedge or 5-iron through gap wedge, in right and left hand and in both steel and
  graphite. Swing weights below are the steel-shaft values, and offsets are
  converted from Cobra's published millimetre figures.
