faq:
  - q: "What is the loft of a Cobra Darkspeed 7-iron?"
    a: "The Cobra Darkspeed 7-iron has a loft of 27 degrees, a lie of 63.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra Darkspeed set?"
    a: "Cobra sold the Darkspeed irons as a 4-iron through pitching wedge set or a 5-iron through gap wedge set, both seven clubs. A sand wedge was also catalogued."
  - q: "Is every Cobra Darkspeed iron a hollow-body design?"
    a: "Yes. Unlike Cobra's earlier mixed-construction sets, the Darkspeed uses a hollow body in every iron, with the cavity filled with a soft polymer for damping."
