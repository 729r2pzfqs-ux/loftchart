faq:
  - q: "What is the loft of a King Cobra SS Oversize 7-iron?"
    a: "The King Cobra SS Oversize 7-iron has a loft of 34 degrees, a lie of 62.5 degrees and a steel-shaft length of 37.00 inches."
  - q: "What clubs come in a stock King Cobra SS Oversize set?"
    a: "The stock set is a 3-iron through pitching wedge. Cobra also sold a 2-iron and gap, sand and lob wedges as separate heads, in both right and left hand."
  - q: "How do the King Cobra SS Oversize lofts compare with the SS-i Oversize?"
    a: "The SS Oversize is about a degree weaker through the middle of the set — 34 degrees at the 7-iron against 33 degrees for the SS-i — while both share a 45-degree pitching wedge."
