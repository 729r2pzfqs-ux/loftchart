description: >
  The King Cobra SS Oversize is Cobra's 2002 oversize game-improvement iron and the
  set the SS-i Oversize replaced a year later. It is investment cast from 17-4
  stainless steel, with tungsten inserts in the 2-, 3- and 4-irons to drop the centre
  of gravity in the hardest clubs to launch, and a skid sole for turf interaction.
  Lofts are traditional: the 7-iron is 34 degrees and the pitching wedge 45 degrees,
  roughly a degree weaker through the middle of the set than the SS-i that followed.
  Cobra sold the stock set as 3-iron through pitching wedge, with a 2-iron and gap,
  sand and lob wedges available separately, in both right and left hand. Cobra's own
  published table for this set gives lengths for graphite builds only; the steel
  lengths below are the graphite figures less half an inch, which is exactly the
  graphite-to-steel offset Cobra published for the successor SS-i Oversize across an
  identical length ladder — see `sources`. Cobra also published an offset column
  whose values run backwards relative to normal convention (increasing toward the
  wedges), so, as with the SS-i record, they are not reproduced here.
