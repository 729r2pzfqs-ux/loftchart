faq:
  - q: "What is the loft of a Cobra KING F7 7-iron?"
    a: "The Cobra KING F7 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a steel-shaft length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING F7 set?"
    a: "The stock set is seven clubs, 5-iron through gap wedge. Cobra also catalogued 3-iron, 4-iron and sand wedge heads for custom seven- and eight-piece sets."
  - q: "What is TECFLO construction in the Cobra KING F7?"
    a: "TECFLO is Cobra's mixed-set construction: full hollow long irons, half hollow mid irons, and conventional cavity-back short irons and wedges, so each part of the set is built for its own job."
