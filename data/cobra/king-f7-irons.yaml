description: >
  The KING F7 is Cobra's 2017 game-improvement iron and the standard-length version
  of a set that was also offered in ONE Length. It uses what Cobra called TECFLO
  construction, a mixed set in which the long irons are full hollow bodies, the mid
  irons are half hollow and the short irons and wedges are conventional cavity
  backs, all fronted by a PWRSHELL L-Cup face in high-strength 17-4 stainless steel.
  T.O.P. Technology removes mass from the centre of the head and redistributes it
  low and back. Lofts are strong, with a 30-degree 7-iron and a 45-degree pitching
  wedge, on a 37.25-inch steel 7-iron. The stock set is seven clubs, 5-iron through
  gap wedge, with 3-iron, 4-iron and sand wedge available to build custom seven- and
  eight-piece sets. Lengths and swing weights below are the steel-shaft values, and
  offsets are converted from Cobra's published millimetre figures.
