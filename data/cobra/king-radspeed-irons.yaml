faq:
  - q: "What is the loft of a Cobra KING Radspeed 7-iron?"
    a: "The Cobra KING Radspeed 7-iron has a loft of 27.5 degrees, a lie of 63.5 degrees and a standard length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING Radspeed set?"
    a: "The stock set is seven clubs, 5-iron through gap wedge in right and left hand, with a 4-iron through pitching wedge option in right hand. A sand wedge was also catalogued."
  - q: "How do Radspeed iron lofts compare with the Speedzone?"
    a: "They are identical through the set: both have a 27.5-degree 7-iron and a 42.5-degree pitching wedge. The Radspeed differs in offset and construction rather than loft."
