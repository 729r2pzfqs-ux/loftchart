description: >
  The KING Radspeed is Cobra's 2021 game-improvement iron and the standard-length
  version of a set that was also sold in ONE Length. It carries a forged PWRSHELL
  face insert in thin 17-4 stainless steel, designed to flex at both the face and
  the sole, behind a carbon fibre topline that saves about two grams and is finished
  in black to make the topline look thinner at address. RADIAL weighting and a
  3D-printed lattice medallion tune mass distribution and damping. Lofts match the
  previous Speedzone set exactly at 27.5 degrees in the 7-iron and 42.5 degrees in
  the pitching wedge, on a 37.25-inch 7-iron. The stock set is seven clubs, 5-iron
  through gap wedge in right and left hand, with a 4-PW option in right hand.
  Lengths below are the standard-grip figures rather than the COBRA CONNECT ones,
  swing weights are the steel-shaft values, and offsets are converted from Cobra's
  published millimetre figures.
