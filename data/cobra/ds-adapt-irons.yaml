faq:
  - q: "What is the loft of a Cobra DS-ADAPT 7-iron?"
    a: "The Cobra DS-ADAPT 7-iron has a loft of 27 degrees, a lie of 63.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra DS-ADAPT set?"
    a: "Stock steel sets are 5-iron through gap wedge or 4-iron through pitching wedge. Graphite is sold as a 5-GW set, and Cobra also offered a combo set with a 5-hybrid and 6-iron through gap wedge."
  - q: "How do the Cobra DS-ADAPT irons differ from the Darkspeed?"
    a: "The lofts are nearly identical. The change is the face: DS-ADAPT uses the larger 360 SPEEDSHELL insert that wraps around the toe and sole, which Cobra says flexes 23 per cent more than the Darkspeed face, together with a lower PWR-BRIDGE internal weight and softer cavity foam."
  - q: "What is the difference between the DS-ADAPT and DS-ADAPT MAX irons?"
    a: "The MAX is the super-game-improvement version, with more offset and weaker lofts — a 29-degree 7-iron and a 43.5-degree pitching wedge against 27 and 42 degrees for the standard DS-ADAPT."
