description: >
  The DS-ADAPT is Cobra's 2025 game-improvement iron, the direct replacement for the
  Darkspeed and the standard model in a family that also includes the
  super-game-improvement DS-ADAPT MAX. Every iron keeps the metalwood-inspired hollow
  body, but the face insert is now the 360 SPEEDSHELL, wrapping further around the toe
  and sole; paired with H.O.T. Face variable thickness, Cobra claims 23 per cent more
  face flex than the Darkspeed. A re-engineered internal PWR-BRIDGE weight sits lower
  for a lower centre of gravity, and a softer foam fills the cavity for damping.
  Lofts and lengths carry over from the Darkspeed almost unchanged — the 7-iron is 27
  degrees on 37.25 inches and the pitching wedge 42 degrees — with the 4-iron half a
  degree weaker and the gap wedge half a degree stronger. Stock steel sets are sold as
  5-iron through gap wedge or 4-iron through pitching wedge; graphite is a 5-GW set,
  and a 5H plus 6-GW combo set was also offered. Swing weights below are the
  steel-shaft values, and offsets are converted from Cobra's published millimetre
  figures.
