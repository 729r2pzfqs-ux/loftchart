description: >
  The KING F8 is Cobra's 2018 game-improvement iron and the standard-length version
  of a set that was also offered in ONE Length. It is a progressive set: the long
  irons are hollow bodies for a lower centre of gravity and a more responsive face,
  the mid and scoring irons are cavity backs with a two-piece carbon fibre insert
  and medallion, and the gap, sand and lob wedges use a specialty wedge design with
  a carbon fibre insert. All are fronted by a forged PWRSHELL face. It was the first
  Cobra iron set shipped with COBRA CONNECT grip sensors as standard, which add a
  quarter of an inch to each club. Lofts are strong, with a 29.5-degree 7-iron and a
  44-degree pitching wedge; the stock set is seven clubs, 5-iron through gap wedge.
  Lengths below are the standard-grip figures rather than the COBRA CONNECT ones,
  swing weights are the steel-shaft values, and offsets are converted from Cobra's
  published millimetre figures.
