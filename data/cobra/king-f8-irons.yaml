faq:
  - q: "What is the loft of a Cobra KING F8 7-iron?"
    a: "The Cobra KING F8 7-iron has a loft of 29.5 degrees, a lie of 62.5 degrees and a standard length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING F8 set?"
    a: "The stock set is seven clubs, 5-iron through gap wedge. A 4-iron, sand wedge and lob wedge were also catalogued."
  - q: "Why are there two lengths listed for the Cobra KING F8?"
    a: "The F8 shipped with COBRA CONNECT sensor grips, which are a quarter of an inch longer than a standard grip. The specs here use the standard-grip lengths."
