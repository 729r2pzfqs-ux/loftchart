description: >
  The S2 is Cobra's multi-material game-improvement iron, announced on 26 August 2009
  and shipping from 1 September 2009 as the 2010 line — the direct ancestor of the E9
  cavity that Cobra used through the S3 and AMP sets. A 431 stainless steel body is
  lightened with a polymer topline and toe insert, an expanded urethane sole insert
  and an aluminium back plate, which moves discretionary weight low into the heel and
  toe, and Cobra called the face pattern 9 Point Face Technology. A mid-width stepped
  sole handles turf interaction. Lofts are strong for the period at 31 degrees in the
  7-iron and 43 degrees in the pitching wedge, on a 37.25-inch 7-iron. The stock
  men's set is 4-iron through pitching wedge plus a gap wedge, in steel or graphite;
  a Lite/Seniors set ran 5-iron through sand wedge, and Cobra also catalogued a
  3-iron and a lob wedge. Cobra published a single length column covering both
  graphite and steel builds, and did not publish an offset figure for this set.
