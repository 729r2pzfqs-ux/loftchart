faq:
  - q: "What is the loft of a Cobra S2 7-iron?"
    a: "The Cobra S2 7-iron has a loft of 31 degrees, a lie of 63 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra S2 set?"
    a: "The stock men's set is a 4-iron through pitching wedge plus a gap wedge, in steel or graphite. A Lite/Seniors set ran 5-iron through sand wedge, and Cobra also catalogued a 3-iron and a lob wedge."
  - q: "What year did the Cobra S2 irons come out?"
    a: "Cobra announced the S2 irons on 26 August 2009 and began shipping them on 1 September 2009. They were sold as the 2010 line and were replaced by the Cobra S3 in February 2011."
