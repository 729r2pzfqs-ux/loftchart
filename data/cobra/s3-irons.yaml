description: >
  The S3 is Cobra's 2011 game-improvement iron, built around E9 Face Technology —
  a variable-thickness face designed to enlarge the effective hitting zone, with an
  oval sweet zone in the long irons and a rounder one in the short irons. A hidden
  internal polymer topline and a full-cavity TPU insert redistribute weight and damp
  vibration, and a stepped crescent sole narrows at the heel and toe for turf
  interaction. Long irons (3-7) use 17-4 Hyper Steel while the 8-iron down uses
  standard 17-4 stainless. Lofts are strong for the era at 31 degrees in the 7-iron
  and 44 degrees in the pitching wedge, and lengths run long (37.25 inches at the
  7-iron). The stock men's set is 4-9, PW and GW; a Seniors/Lite set ran 5-9, PW,
  GW, SW, and iron-hybrid combo sets were also sold. Some secondary listings date the
  S3 to 2013; that is wrong — Cobra announced it on 15 February 2011 and the
  manufacturer product page is titled "2011 Cobra S3 Irons". Swing weights shown are
  the R/S values; Lite-flex clubs run one point lighter.
