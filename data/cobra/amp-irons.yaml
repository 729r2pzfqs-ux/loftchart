faq:
  - q: "What is the loft of a Cobra AMP 7-iron?"
    a: "The Cobra AMP 7-iron has a loft of 31 degrees, a lie of 62.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra AMP set?"
    a: "The stock set is eight clubs — 4-iron through pitching wedge plus a gap wedge — in steel or graphite. Cobra also catalogued a 3-iron, sand wedge and lob wedge."
  - q: "What is the difference between the Cobra AMP and the Cobra AMP Cell irons?"
    a: "The AMP is a conventional cast multi-alloy cavity back with an E9 face. The AMP Cell that replaced it in 2013 welds a thin high-strength steel face onto a softer 431 stainless body in the 4- through 7-irons. Their 7-iron through pitching wedge lofts are identical; the AMP Cell is a degree stronger from the 3- through the 6-iron."
