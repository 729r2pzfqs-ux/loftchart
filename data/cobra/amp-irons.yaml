description: >
  The AMP is Cobra's 2012 game-improvement iron, the set that carried the AMP name a
  year before the metalwood-face-welded AMP Cell replaced it. Cobra branded the
  weighting scheme Advanced Material Placement: a multi-alloy body that pushes mass
  around to give livelier long irons and steadier short irons, with a full-cavity
  thermoplastic urethane layer for damping. The face of the 3- through 7-irons is
  hyper 17-4 stainless steel milled thinner to Cobra's E9 variable-thickness pattern,
  and a V-Skid sole narrows at the heel and toe. Lofts and lengths carry straight
  over from the S3: the 7-iron is 31 degrees on 37.25 inches and the pitching wedge
  44 degrees. The stock set is eight clubs, 4-iron through pitching wedge plus a gap
  wedge, in steel or graphite, with a 3-iron, sand wedge and lob wedge catalogued
  separately. Swing weights below are the steel-shaft values — graphite builds run
  one point lighter. Cobra did not publish an offset figure for this set.
