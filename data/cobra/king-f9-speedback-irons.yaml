faq:
  - q: "What is the loft of a Cobra KING F9 Speedback 7-iron?"
    a: "The Cobra KING F9 Speedback 7-iron has a loft of 29.5 degrees, a lie of 63.5 degrees and a standard steel-shaft length of 37.25 inches."
  - q: "What clubs come in a stock Cobra KING F9 Speedback set?"
    a: "The stock steel set is seven clubs, 5-iron through gap wedge. A 4-iron and a sand wedge were catalogued separately, and Cobra also sold the set in ONE Length."
  - q: "Why are there two lengths listed for the Cobra KING F9 Speedback irons?"
    a: "Cobra published a standard build and a COBRA CONNECT build fitted with sensor-equipped grips. The COBRA CONNECT clubs are a quarter of an inch longer at every position; the specs here are the standard lengths."
