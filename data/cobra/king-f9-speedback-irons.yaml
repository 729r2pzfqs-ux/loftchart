model: KING F9 Speedback
slug: king-f9-speedback-irons
club_type: irons
year_introduced: 2019
year_discontinued: 2020
category: game-improvement
construction: cast SPEEDBACK-shaped cavity back with a forged face insert and tungsten heel-toe weighting in the long irons
material: stainless steel body with a forged E9 PWRSHELL face, 33 grams of tungsten in the 4- to 7-irons and a three-piece aluminium, TPU and acrylic-foam medallion
predecessor: Cobra KING F8
successor: Cobra KING Speedzone
description: >
  The KING F9 Speedback is Cobra's 2019 game-improvement iron and the standard-length
  version of a set also sold in ONE Length. Cobra carried the SPEEDBACK name over
  from the driver: a belt of steel low and wide across the back that drops and deepens
  the centre of gravity without widening the sole. The face is a forged E9 PWRSHELL
  insert, 1.8 mm at its thinnest, over a deep undercut sole with a 1.2 mm internal
  Speed Channel, and 33 grams of tungsten sit in the heel and toe of the 4- through
  7-irons. A three-piece medallion of aluminium, thermoplastic polyurethane and
  acrylic foam handles damping, and hosel lengths step up through the set. Lofts are
  moderately strong for the period at 29.5 degrees in the 7-iron and 44 degrees in the
  pitching wedge, on a 37.25-inch steel 7-iron. The stock set is seven clubs, 5-iron
  through gap wedge, with a 4-iron and sand wedge catalogued separately. Lengths and
  swing weights below are the standard steel-shaft values; Cobra also published a
  COBRA CONNECT build a quarter of an inch longer at every club. Offsets are converted
  from Cobra's published millimetre figures.
