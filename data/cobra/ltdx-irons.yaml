description: >
  The LTDx is Cobra's 2022 game-improvement iron and the standard-length version of
  a set that was also sold in ONE Length. Its defining feature is a steel core bar
  that centres the centre of gravity behind the hitting zone, suspended in a soft
  polymer so the head still feels damped. The PWRSHELL face is an L-cup design
  forged from thin, strong stainless steel with a thin area about 23 per cent larger
  than the previous generation, wrapping further onto the sole, and the face and
  grooves are CNC milled. Lofts are among the strongest Cobra has published, with a
  26.5-degree 7-iron and a 41.5-degree pitching wedge on a 37.25-inch 7-iron. The
  stock set is seven clubs, 5-iron through gap wedge in right and left hand, with a
  4-PW option in right hand; graphite was a custom-order option. Swing weights below
  are the steel-shaft values, and offsets are converted from Cobra's published
  millimetre figures. Cobra notes that an Arccos sensor grip adds a quarter of an
  inch to the listed lengths.
