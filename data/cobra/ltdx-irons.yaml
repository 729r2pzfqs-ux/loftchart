faq:
  - q: "What is the loft of a Cobra LTDx 7-iron?"
    a: "The Cobra LTDx 7-iron has a loft of 26.5 degrees, a lie of 63.5 degrees and a length of 37.25 inches."
  - q: "What clubs come in a stock Cobra LTDx set?"
    a: "The stock set is seven clubs, 5-iron through gap wedge in right and left hand, with a 4-iron through pitching wedge option in right hand. A sand wedge was also catalogued."
  - q: "Are these the LTDx or the LTDx ONE Length specs?"
    a: "These are the standard-length LTDx irons. The LTDx ONE Length version builds every iron to 7-iron length and has its own specifications."
