description: >
  Adams marketed this set as the Idea Tech a4, the better-player half of the 2008 a4
  generation that also produced the far more forgiving Idea Tech a4OS. It is a
  hybrid-iron combo set: the stock eight-club make-up is a 3-hybrid and 4-hybrid in
  place of the long irons, then six forged 8620 carbon steel irons from the 5-iron to
  the pitching wedge, with a quad cavity back, a forged stabiliser bar behind the face
  and a four-way cambered sole. Lofts run 26 degrees at the 5-iron to 45 degrees at the
  pitching wedge, with a 33-degree 7-iron, and matching GW, SW and LW were offered to
  extend the set. Only the iron clubs are listed below; the stock 3-hybrid (19 degrees,
  59.25-degree lie, 40.5 inches) and 4-hybrid (22 degrees, 60-degree lie, 39.25 inches)
  are hybrids built around Adams' Boxer Technology rather than irons. Swing weights below
  are the steel-shaft figures - the same heads build to D1 with the stock graphite shafts.
