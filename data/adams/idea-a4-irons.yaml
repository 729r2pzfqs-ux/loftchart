faq:
  - q: "What is the loft of an Adams Idea a4 7-iron?"
    a: "The Adams Idea a4 7-iron has a loft of 33 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a stock Adams Idea a4 set?"
    a: "Eight clubs. A 3-hybrid and a 4-hybrid replace the long irons, followed by forged 5-iron through pitching wedge. Matching 50-degree GW, 55-degree SW and 60-degree LW heads were sold to extend the set."
  - q: "Is the Adams Idea a4 the same club as the Idea Tech a4?"
    a: "Yes. Adams sold it as the Idea Tech a4. It should not be confused with the Idea Tech a4OS, which is a much more forgiving cast set built around seven hybrids rather than two hybrids and six forged irons."
  - q: "Are Adams Idea a4 irons forged?"
    a: "The irons are, from 8620 carbon steel with a quad cavity back and a forged stabiliser bar behind the impact area. The 3-hybrid and 4-hybrid that come with the set are not forged irons."
