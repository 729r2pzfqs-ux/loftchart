description: >
  The Idea Tech V4 is a hollow-bodied hybrid-iron set built around Adams' Velocity Slot
  Technology, with a Cut-Thru slot through the sole to raise face flex. The stock combo
  make-up is a 3-, 4- and 5-hybrid followed by 6-iron through pitching wedge, with a gap
  wedge available to extend the set; every head in the range shares the same hollow
  hybrid-iron construction, so Adams marketed even the short irons as hybrid irons.
  Lofts run in a strict 4-degree ladder with a 32-degree 7-iron and a 44-degree pitching
  wedge, and lie and length step evenly by 0.75 degrees and 0.75 inches per club. Only
  the iron-shaped clubs are listed below; the stock 3H (19 degrees), 4H (22 degrees) and
  5H (25 degrees) are hybrids. The stock steel shaft was the lightweight True Temper GS75.
