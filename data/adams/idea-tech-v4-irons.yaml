faq:
  - q: "What is the loft of an Adams Idea Tech V4 7-iron?"
    a: "The Adams Idea Tech V4 7-iron has a loft of 32 degrees, with a 62.25-degree lie and a 37.5-inch length."
  - q: "What clubs come in a stock Adams Idea Tech V4 set?"
    a: "The stock combo set is a 3-hybrid, 4-hybrid and 5-hybrid replacing the long irons, then 6-iron through pitching wedge, with a 49-degree gap wedge offered separately."
  - q: "Are the Adams Idea Tech V4 short irons hollow?"
    a: "Yes. The whole range uses the same hollow hybrid-iron body with a Cut-Thru sole slot, which is why Adams labelled even the 8-iron, 9-iron and wedges as hybrid irons."
