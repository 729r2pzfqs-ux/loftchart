faq:
  - q: "What is the loft of an Adams XTD 7-iron?"
    a: "The Adams XTD 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a stock Adams XTD set?"
    a: "The XTD is a conventional iron set rather than a hybrid combo. Heads ran from the 3-iron through the pitching wedge, with a 49-degree gap wedge and 54-degree sand wedge available to extend the set."
  - q: "How strong are Adams XTD lofts compared with rivals of the time?"
    a: "Moderately strong but not extreme for 2014. The 28-degree 6-iron was about 1.5 degrees weaker than the TaylorMade SpeedBlade and about 2 degrees weaker than the Callaway X2 Hot."
