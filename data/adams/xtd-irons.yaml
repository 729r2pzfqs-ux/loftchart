description: >
  The XTD is the game-improvement iron of Adams' 2014 XTD family, sold alongside the
  smaller XTD Forged and XTD Tour models and built around a Cross Cavity head with the
  brand's thinnest cast face to that point. A Cut-Thru sole slot roughly 25 percent longer
  than the previous generation runs through the sole of the long and mid irons to raise
  ball speed low on the face. Unlike the Idea sets it is a conventional all-iron set
  rather than a hybrid combo, offered from the 3-iron down with GW and SW to extend it.
  Lofts are strong for the era, with a 31-degree 7-iron and a 44-degree pitching wedge,
  and the stock steel shaft was the KBS C-Taper 90. It was one of the last iron models
  released under the Adams name before TaylorMade retired the brand.
