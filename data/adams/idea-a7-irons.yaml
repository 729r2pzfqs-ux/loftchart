description: >
  The Idea a7 is a hybrid-iron combo set: the stock eight-club make-up replaces the long
  irons with a 3-hybrid and 4-hybrid, then runs a hollow-bodied 5-iron and conventional
  dual-cavity short irons from the 6-iron down. The 5-iron and 5-hybrid were built to the
  same 25-degree loft, 60.5-degree lie and 38.5-inch length so the two could be swapped
  without a gap in the set. Lofts are strong for the period, with a 33-degree 7-iron and a
  45-degree pitching wedge, and matching GW, SW and LW were offered to extend the set.
  Iron sets began shipping on 1 August 2009 at 599 USD in steel and 699 USD in graphite.
  Only the iron clubs are listed below; the 3-hybrid (19 degrees, 59-degree lie, 40 inches)
  and 4-hybrid (22 degrees, 59.75-degree lie, 39.25 inches) are part of the stock set but
  are hybrids rather than irons.
