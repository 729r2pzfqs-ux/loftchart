faq:
  - q: "What is the loft of an Adams Idea a7 7-iron?"
    a: "The Adams Idea a7 7-iron has a loft of 33 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a stock Adams Idea a7 set?"
    a: "The stock set is a hybrid-iron combo: a 3-hybrid and 4-hybrid replace the long irons, followed by a hollow-body 5-iron and cavity-back 6-iron through pitching wedge. Matching GW, SW and LW were sold to extend the set."
  - q: "Is the Adams Idea a7 5-iron the same loft as the 5-hybrid?"
    a: "Yes. Adams built both to 25 degrees with a 60.5-degree lie and a 38.5-inch length so players could swap one for the other without changing the set gapping."
