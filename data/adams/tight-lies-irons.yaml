faq:
  - q: "What is the loft of an Adams Tight Lies 7-iron?"
    a: "The Adams Tight Lies 7-iron has a loft of 33 degrees, with a 62-degree lie and a 37-inch length."
  - q: "What clubs come in a stock Adams Tight Lies set?"
    a: "It is a hybrid-iron combo. The 14-piece Tight Lies Plus set carries a 22-degree 4-hybrid and 25-degree 5-hybrid in place of the long irons, then a 6-iron through pitching wedge and a 56-degree sand wedge. The 12-piece set drops the 4-hybrid."
  - q: "Are the Adams Tight Lies irons the same as the 1990s Tight Lies irons?"
    a: "No. The Tight Lies name was revived for packaged sets after TaylorMade acquired Adams in 2012. The lofts here are considerably stronger than the original 1990s Tight Lies and Tight Lies GT irons."
