description: >
  The modern Tight Lies irons were sold as part of Adams' Tight Lies packaged sets under
  TaylorMade ownership rather than as a standalone fitted iron set. The make-up is a
  hybrid-iron combo: a 4-hybrid and 5-hybrid replace the long irons, followed by wide-sole,
  perimeter-weighted cavity-back irons from the 6-iron through the pitching wedge plus a
  sand wedge. Lofts match the earlier Idea a7 ladder, with a 33-degree 7-iron and a
  45-degree pitching wedge, and the lie and length progression steps by roughly 0.5 degrees
  and 0.5 inches per club. The 12-piece set carries only the 5-hybrid, while the 14-piece
  Tight Lies Plus set adds the 22-degree 4-hybrid. Only the iron clubs are listed below;
  the 4H (22 degrees, 60.5-degree lie, 39 inches) and 5H (25 degrees, 61-degree lie,
  38 inches) are hybrids.
