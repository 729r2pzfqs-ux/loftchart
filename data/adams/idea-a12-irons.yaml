description: >
  This is the a12-generation hybrid-iron set that followed the Idea a7, announced on
  16 September 2011 and sold by Adams as the Idea a12 OS; the name Idea a12 on its own
  belonged to the matching standalone hybrid, offered in 17, 19, 22 and 25 degrees, and
  the players' iron of the same generation was the separate forged Idea Pro a12. The
  eight-club stock set is heavily hybrid-weighted: 4, 5 and 6 are full hybrids carrying
  Adams' Velocity Slot Technology, 7 and 8 are truss-back Transitional Hybrids, and only
  the 9-iron, pitching wedge and gap wedge are conventional deep undercut cavity-back
  irons. Lofts run in a 4-degree ladder with a 32-degree 7-iron and a 44-degree pitching
  wedge. Listed below are the iron-shaped clubs from the 7 down, plus the 54-degree SW
  and 59-degree LW heads Adams offered separately; the 4, 5 and 6 hybrids (22, 25 and 28
  degrees) are part of the stock set but are hybrids rather than irons. The men's set was
  699.99 USD in steel and 799.99 USD in graphite and reached shops in early October 2011.
