faq:
  - q: "What is the loft of an Adams Idea a12 7-iron?"
    a: "32 degrees, with a 62.25-degree lie and a 37.5-inch length. Note that the 7 in this set is a Transitional Hybrid rather than a conventional iron."
  - q: "What clubs come in a stock Adams Idea a12 set?"
    a: "Eight clubs, 4 through GW. The 4, 5 and 6 are Velocity Slot hybrids, the 7 and 8 are truss-back Transitional Hybrids, and the 9, pitching wedge and gap wedge are cavity-back irons. Separate 54-degree SW and 59-degree LW heads were also available."
  - q: "Is the Adams Idea a12 the same thing as the Idea a12 OS?"
    a: "Yes, for iron sets. Adams sold the a12-generation hybrid-iron set as the Idea a12 OS; the name Idea a12 on its own referred to the matching standalone hybrid, made in 17, 19, 22 and 25 degrees. The forged players' iron of the same generation was a different club, the Idea Pro a12, whose 7-iron is 34 degrees rather than 32."
