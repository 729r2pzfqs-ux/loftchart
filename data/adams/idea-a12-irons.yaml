  - "Adams Golf official Idea a12 OS iron page, specs tab, retrieved from http://web.archive.org/web/20120312165849/http://www.adamsgolf.com/products/irons/a12os.php - manufacturer spec table giving loft, lie, length and swing weight for every head from the 2 (17 degrees) to the LW (59 degrees), together with the True Temper Performance 85 steel and Grafalloy ProLaunch Blue graphite stock shafts and the Tour Elite Plus grip. The 7 through LW rows are reproduced above"
  - "Adams Golf press release 'Adams Golf Takes the Next Step in Hybrid Technology With the Introduction of the Idea a12 OS Hybrid Irons and the Idea a12 Hybrids', via The Golf Wire, 16 September 2011 (https://thegolfwire.com/245403-2/) - announcement date, the exact set breakdown (4, 5, 6 hybrids; 7 and 8 Transitional Hybrids; 9, PW, GW cavity-back irons), the 699.99 USD steel and 799.99 USD graphite pricing, the early-October 2011 availability, and the four lofts of the standalone Idea a12 hybrid"
