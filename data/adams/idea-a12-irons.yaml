  - "Note on naming: Adams never sold an iron set called simply 'Idea a12'. Its 2012 site navigation lists Idea a12 only under Hybrids, while the Irons menu carries Idea a12 OS and Idea Pro a12. This entry documents the Idea a12 OS, the a12-generation hybrid-iron set that directly succeeded the Idea a7 hybrid-iron set, under the shortened name used for lineage elsewhere in this database"
