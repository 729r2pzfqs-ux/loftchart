description: >
  The CG16 is a large cavity-back built around lightweight components and
  deliberately long club lengths: Cleveland paired ultra-light steel and graphite
  shafts with optimised head weights so the set could be built longer than normal
  while still finishing at standard swing weights. The head uses a full undercut
  cavity to push the centre of gravity low and deep, a large thin face for ball
  speed, a wide sole, and laser-milled Tour Zip Grooves. Lofts are strengthened
  compared with the CG7 it replaced — 31 degrees in the 7-iron against 33.5 — and
  the lengths are unusually long, with a 37.25-inch 7-iron where the CG7 measured
  36.75. The stock set ran 3-iron through pitching wedge and was offered in Satin
  Chrome and Black Pearl finishes, with a separate CG16 Tour model for better
  players. Specs below are the standard men's steel-shaft numbers from Cleveland's
  own product page.
