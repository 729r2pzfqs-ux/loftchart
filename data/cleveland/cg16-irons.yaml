faq:
  - q: "What is the loft of a Cleveland CG16 7-iron?"
    a: "The Cleveland CG16 7-iron has a loft of 31 degrees, a lie of 63 degrees and a steel-shaft length of 37.25 inches."
  - q: "What is the pitching wedge loft of the Cleveland CG16 irons?"
    a: "The CG16 pitching wedge is 44 degrees, with a 64.5-degree lie and a 35.75-inch steel length."
  - q: "Why are the Cleveland CG16 irons longer than normal?"
    a: "Cleveland deliberately built the set long — the 7-iron is 37.25 inches, half an inch longer than the CG7 — and offset the extra length with ultra-lightweight shafts and adjusted head weights so the clubs still finished at a standard swing weight."
  - q: "Are the Cleveland CG16 lofts stronger than the CG7?"
    a: "Yes, by around 2 to 2.5 degrees through the mid irons. The CG16 7-iron is 31 degrees against 33.5 on the CG7, and the pitching wedge is 44 degrees against 45."
