faq:
  - q: "What is the loft of a Cleveland CBX 7-iron?"
    a: "The Cleveland CBX 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a length of 37 inches."
  - q: "What is the pitching wedge loft of the Cleveland CBX irons?"
    a: "The CBX pitching wedge is 44 degrees, with a 64-degree lie and a 35.75-inch length. A 50-degree D wedge extends the set."
  - q: "How does the Cleveland CBX differ from the Launcher HB?"
    a: "The CBX is a cavity back with a face cup in the long and mid irons, aimed at players who still want some workability. The Launcher HB is fully hollow through the whole set and wider soled. From the 7-iron down their lofts are identical — 30 degrees at the 7-iron and 44 at the pitching wedge — and the CBX long irons are 1 degree stronger, with a 20-degree 4-iron against the HB's 21."
