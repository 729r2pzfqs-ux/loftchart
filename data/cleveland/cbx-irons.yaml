description: >
  The CBX, sold as the Launcher CBX, is the cavity-back half of the Launcher iron
  range Cleveland introduced in 2017, positioned between the hollow-bodied Launcher
  HB and a players iron. The 4 through 7 use a Launcher Face Cup that wraps around
  the chassis so the weld line sits behind the face, preserving ball speed on
  off-centre strikes, while the short irons move to a more conventional cavity for
  control. Lofts are strong for a cavity back at 30 degrees in the 7-iron and 44
  degrees in the pitching wedge, and the set carries a moderate amount of offset,
  tapering from about 4.2 mm in the 4-iron to 1.8 mm in the gap wedge. The stock
  set ran 4-iron through pitching wedge with a 50-degree D gap wedge available to
  extend it. Specs below are the standard men's steel-shaft numbers; offsets are
  converted from the millimetre figures Cleveland published.
