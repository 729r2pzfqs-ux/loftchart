description: >
  The Launcher HB (Hybrid) is a fully hollow-bodied, wide-soled iron built to play
  like a set of hybrids through the whole set. A HiBore crown steps the topline
  down to push the centre of gravity low and deep, and an ultra-thin high-strength
  HT1770 steel face insert adds ball speed. Internal stabilising ribs improve
  acoustics and, unusually for a hollow iron, make the heads strong enough to be
  bent for loft and lie. Lofts are strong for a game-improvement set at 30 degrees
  in the 7-iron, and the set runs 4-iron through PW with 50-degree (D) and
  56-degree (S) wedges available. Specs below are Cleveland's published numbers;
  lengths are common to steel and graphite, with graphite running one swing-weight
  point lighter.
