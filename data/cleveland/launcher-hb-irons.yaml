faq:
  - q: "What is the loft of a Cleveland Launcher HB 7-iron?"
    a: "The Cleveland Launcher HB 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a length of 37.0 inches."
  - q: "What are the Cleveland Launcher HB wedge lofts?"
    a: "The pitching wedge is 44 degrees, the D (gap) wedge 50 degrees and the S (sand) wedge 56 degrees."
  - q: "Can Cleveland Launcher HB irons be bent for loft and lie?"
    a: "Yes. Cleveland added internal stabilising ribs to the hollow heads specifically so they retain enough strength to be adjusted for loft and lie, which is unusual for a hollow-body iron."
