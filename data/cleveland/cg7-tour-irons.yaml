faq:
  - q: "What is the loft of a Cleveland CG7 Tour 7-iron?"
    a: "The Cleveland CG7 Tour 7-iron has a loft of 34 degrees, a lie of 62.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "What is the pitching wedge loft of the Cleveland CG7 Tour irons?"
    a: "The CG7 Tour pitching wedge is 46 degrees, with a 64.5-degree lie and a 35.5-inch steel length."
  - q: "How is the CG7 Tour different from the standard CG7?"
    a: "The CG7 Tour uses a more compact head, a Tour-style sole and much less offset — 0.115 inches at the 7-iron — while keeping the same Gelback insert and Micro-Cavity technology as the standard CG7."
