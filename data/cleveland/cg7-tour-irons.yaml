description: >
  The CG7 Tour is the compact, lower-offset version of Cleveland's CG7 cavity-back,
  aimed at better players. It shares the CG7 technology package — a full-cavity
  360-degree Gelback visco-elastic insert for vibration damping, progressively
  sized Dynamic Micro-Cavities to move the centre of gravity, and heel/toe muscle
  weighting — in a smaller head with a Tour-style sole and noticeably less offset
  (0.115 inches at the 7-iron). Lofts are traditional for its era, with a 34-degree
  7-iron and a 46-degree pitching wedge. A Black Pearl finish version was sold
  alongside the standard chrome finish. The specs below are the standard steel-shaft
  men's numbers from Cleveland's own product page.
