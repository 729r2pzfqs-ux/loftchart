faq:
  - q: "What is the loft of a Cleveland Launcher HB Turbo 7-iron?"
    a: "The Cleveland Launcher HB Turbo 7-iron has a loft of 30 degrees, a lie of 63 degrees and a length of 37 inches."
  - q: "What are the Cleveland Launcher HB Turbo wedge lofts?"
    a: "The pitching wedge is 44 degrees, the D (gap) wedge 49 degrees and the S (sand) wedge 54.5 degrees."
  - q: "How do Launcher HB Turbo lofts compare with the original Launcher HB?"
    a: "They are nearly identical. The 7-iron and pitching wedge are both unchanged at 30 and 44 degrees; the 6-iron is half a degree stronger at 26.5, the 8-iron half a degree weaker at 34.5, the D wedge is a degree stronger at 49 degrees and the S wedge is a degree and a half weaker at 54.5 degrees. Every lie angle is half a degree more upright."
  - q: "Which clubs came in a stock Cleveland Launcher HB Turbo set?"
    a: "The stock set was 5-iron through D wedge. The 4-iron and the S wedge were sold as individual clubs."
