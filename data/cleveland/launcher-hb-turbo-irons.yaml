description: >
  The Launcher HB Turbo is the second-generation hollow-bodied Launcher HB, keeping the
  fully hollow construction, internal stabilising ribs and HiBore crown while thinning the
  high-strength steel face for more ball speed. Cleveland added progressive hollow shaping,
  so the long irons stay hybrid-like while the short irons take on a more conventional iron
  profile. Lofts are almost unchanged from the Launcher HB, with a 30-degree 7-iron and a
  44-degree pitching wedge, but the 6-iron is half a degree stronger, the 8-iron half a degree
  weaker, the D wedge a degree stronger and the S wedge a degree and a half weaker, and every
  lie angle was set half a degree more upright than the original. The stock set is
  5-iron through D wedge, with the 4-iron and the S wedge sold as individual clubs. Specs
  below are Cleveland's published steel-shaft numbers; graphite builds share the same lengths
  and run one swing-weight point lighter.
