description: >
  The CG4 is a mid-size cavity-back aimed at the better player, and the model that
  established the CG naming that ran through the CG7 and CG16. It is cast from
  Cleveland's CMM alloy, which the company described as carrying substantially more
  carbon than ordinary stainless for vibration absorption while being around ten
  percent less dense, freeing roughly 25 grams to be redistributed low in the head.
  Lofts are traditional for the period, with a 33.5-degree 7-iron and a 45-degree
  pitching wedge — the same loft ladder Cleveland carried forward into the CG7.
  The stock set ran 3-iron through pitching wedge, with a 50-degree DW and a
  55-degree SW available to extend it. The numbers below are the standard men's
  steel-shaft specification.
