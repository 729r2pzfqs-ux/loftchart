sources:
  - "TheSandTrap.com forum thread 'Cleveland CG4 loft question' (https://thesandtrap.com/forums/topic/41653-cleveland-cg4-loft-question/) — carries a posted CG4 loft/lie table covering 1-iron through SW, which is the source of every loft and lie above. This is a secondary, user-posted table, not a Cleveland spec sheet."
  - "GolfRoots used-club listing 'Cleveland CG4 6 Iron S Flex 37.25\"' (https://golfroots.com/products/cl-70091) — a stock-length CG4 6-iron measured at 37.25 inches, which matches the length ladder used here."
  - "HONEST SOURCING NOTE: no Cleveland manufacturer spec page for the CG4 survives in the Wayback Machine — the archived clevelandgolf.com product pages begin with the 2009 site, by which time the CG4 had been replaced. The lengths above other than the 6-iron are the standard Cleveland iron length ladder of that era (identical to the CG7's published steel lengths) rather than figures read from a CG4 document. Offset, bounce and swing weight are omitted because no reliable figures were found. Corrections welcome."
