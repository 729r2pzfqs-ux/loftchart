faq:
  - q: "What is the loft of a Cleveland CG4 7-iron?"
    a: "The Cleveland CG4 7-iron has a loft of 33.5 degrees, with a 62.25-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Cleveland CG4?"
    a: "The CG4 pitching wedge is 45 degrees, roughly 2 degrees weaker than the game-improvement pitching wedges of the same era and 1 degree weaker than a modern set."
  - q: "How do the Cleveland CG4 lofts compare to the CG7?"
    a: "They are the same through the set. Both run a 33.5-degree 7-iron and a 45-degree pitching wedge; the CG4 uses slightly flatter lie angles in the mid irons."
