description: >
  The Launcher XL is an oversize distance iron built as a progressive set: the long
  irons are hollow bodied for forgiveness, while the short irons switch to a
  conventional cavity back for control. Cleveland pairs that with an enlarged head
  and its MainFrame face milling, and quotes an MOI of 3,081 g-cm2 in the 7-iron.
  Lofts are very strong, with a 29-degree 7-iron and a 43-degree pitching wedge, so
  the set is roughly a club stronger than a traditional iron at the same number.
  The stock set runs 4-iron through pitching wedge with a 48-degree DW gap wedge
  extending it. Cleveland also offers an Accuracy Build, which shortens every club
  by half an inch and drops one swing-weight point; the specs below are the
  standard build with steel shafts.
