faq:
  - q: "What is the loft of a Cleveland Launcher XL 7-iron?"
    a: "The Cleveland Launcher XL 7-iron has a loft of 29 degrees, a lie of 63 degrees and a standard build length of 37 inches."
  - q: "What is the pitching wedge loft of the Cleveland Launcher XL irons?"
    a: "The Launcher XL pitching wedge is 43 degrees, with a 64.5-degree lie and a 35.75-inch length. A 48-degree DW gap wedge extends the set."
  - q: "What is the Cleveland Launcher XL Accuracy Build?"
    a: "It is an alternative stock build in which every club is half an inch shorter than standard — a 36.5-inch 7-iron instead of 37 inches — and one swing-weight point lighter, aimed at golfers who want more control than the standard long build gives."
