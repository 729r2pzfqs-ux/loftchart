description: >
  The Launcher irons are an oversize game-improvement set built around a split
  design: the 3, 4 and 5 are hybrid-style heads with the largest face in the set
  and a parabolic leading edge, while the 6 through sand wedge are conventional
  oversize iron heads with a thick topline and extra offset. Both halves use
  Cleveland's extended horseshoe perimeter weighting, which the company rated at
  20 percent higher MOI than a traditional iron and up to 3,000 g-cm2 in the long
  irons. Lofts are moderately strong for the period at 33 degrees in the 7-iron
  and 45 degrees in the pitching wedge. The stock set ran 3-iron through sand
  wedge, including a 50-degree DW gap wedge and a 55-degree SW. The specs below
  are the standard men's steel-shaft numbers from Cleveland's own product page;
  graphite builds were a quarter inch longer at every club.
