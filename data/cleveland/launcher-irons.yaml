faq:
  - q: "What is the loft of a Cleveland Launcher 7-iron?"
    a: "The Cleveland Launcher 7-iron has a loft of 33 degrees, a lie of 62.5 degrees and a steel-shaft length of 37 inches."
  - q: "What are the Cleveland Launcher wedge lofts?"
    a: "The pitching wedge is 45 degrees, the DW gap wedge 50 degrees and the sand wedge 55 degrees."
  - q: "Are the Cleveland Launcher long irons really hybrids?"
    a: "The 3, 4 and 5 are hybrid-style heads built on an iron chassis with the largest face in the set and a parabolic leading edge, while the 6-iron through sand wedge are conventional oversize iron heads."
