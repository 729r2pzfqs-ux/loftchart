faq:
  - q: "What is the loft of a Cleveland CG7 7-iron?"
    a: "The Cleveland CG7 7-iron has a loft of 33.5 degrees, a lie of 62.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "What is the pitching wedge loft of the Cleveland CG7 irons?"
    a: "The CG7 pitching wedge is 45 degrees, with a 64.5-degree lie and a 35.5-inch steel length. The set extends to a 50-degree DW and a 55-degree SW."
  - q: "What is the difference between the CG7 and the CG7 Tour?"
    a: "The standard CG7 is the larger, more forgiving head with much more offset — 0.140 inches at the 7-iron against 0.115 on the Tour — while the CG7 Tour is a compact players head with a Tour sole. The CG7 Tour is also 1.5 degrees stronger through the mid irons, at 34 degrees in the 7-iron versus 33.5."
