description: >
  The CG7 is the standard, larger-headed member of Cleveland's CG7 family, sold
  alongside the more compact CG7 Tour. It uses 360-degree Gelback Technology — a
  one-piece injection-moulded insert that damps vibration across the whole face —
  together with Dynamic Microcavity Technology, in which the microcavities shorten
  progressively from the long irons to the short irons to place the centre of
  gravity correctly in each head, and heel/toe muscle weighting that Cleveland
  rated at 6 percent higher MOI than a traditional iron. Lofts are traditional
  rather than strengthened, with a 33.5-degree 7-iron and a 45-degree pitching
  wedge, and offset is far heavier than on the CG7 Tour at 0.140 inches in the
  7-iron against the Tour's 0.115. The stock set ran 3-iron through pitching wedge
  with a 50-degree DW and a 55-degree SW extending it, and a Black Pearl finish
  was offered alongside the standard chrome. Specs below are the standard men's
  steel-shaft numbers from Cleveland's own product page.
