faq:
  - q: "What is the loft of a Callaway X-16 7-iron?"
    a: "The Callaway Steelhead X-16 7-iron is 34 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "How do the Callaway X-14 and X-16 lofts compare?"
    a: "The X-16 is a degree stronger through the middle of the set, with a 34 degree 7-iron against the X-14's 33 degrees."
  - q: "How much bounce do the Callaway X-16 irons have?"
    a: "Bounce runs from 0 degrees at the long irons through 2 degrees at the 7-iron to 7 degrees at the pitching wedge and 15 degrees at the sand wedge."
