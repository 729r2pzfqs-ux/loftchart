sources:
  - "Specification figures are reconstructed from widely reproduced spec tables for this model and cross-checked for set progression against LoftChart's independently verified Callaway X-14 (2000) and X-20 (2007) entries, which bracket it. They have NOT been verified against an original Callaway catalogue page or manufacturer spec sheet."
