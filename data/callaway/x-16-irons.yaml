description: >
  The X-16 replaced the Steelhead X-14 in 2002 and was the first set to drop the Steelhead
  badge in favour of the plain X-series name that Callaway carried through to the X-24.
  It retains Variable Face Thickness and the S2H2 hosel, with a notched, tiered sole and
  a slightly more compact head than the X-14. Lofts hold the X-14's 33 degree 7-iron but
  strengthen the scoring clubs, moving the pitching wedge from 46.5 to 45 degrees. Specs
  below are the standard men's steel-shaft numbers.
