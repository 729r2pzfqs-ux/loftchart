faq:
  - q: "What is the loft of a Callaway X-16 7-iron?"
    a: "The Callaway X-16 7-iron has a loft of approximately 33 degrees, with a 62.5 degree lie and a 36.75 inch standard steel length."
  - q: "What is the loft of a Callaway X-16 pitching wedge?"
    a: "The X-16 pitching wedge is approximately 45 degrees, with a 50 degree A-wedge and a 55 degree sand wedge."
  - q: "How does the X-16 differ from the Steelhead X-14?"
    a: "The 7-iron loft is unchanged at 33 degrees, but the X-16 strengthens the scoring clubs, moving the pitching wedge from 46.5 to 45 degrees, and uses a slightly more compact head. It was also the first of the line to drop the Steelhead name."
