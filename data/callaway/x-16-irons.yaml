description: >
  The Steelhead X-16 followed the X-14 in 2002 and refined the Steelhead sole
  and the S2H2 hosel rather than reinventing them. Lofts are a degree stronger
  than the X-14 through the middle of the set, giving a 34 degree 7-iron and a
  46 degree pitching wedge, and Callaway published a full bounce ladder for
  this generation, running from flat at the long irons to 15 degrees at the
  sand wedge. Lies remain the upright Callaway standard of the era at 65
  degrees through the wedges. The catalogued range ran 1-iron to lob wedge,
  with 3-PW the usual retail set.
