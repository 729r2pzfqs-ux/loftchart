description: >
  The X Hot revived the X name for Callaway's distance-oriented game-improvement iron,
  taking over from the RAZR X family. It used a deep undercut cavity with a thin, unsupported
  face section to raise ball speed, and Callaway lowered the sweet spot roughly 0.155 inches
  versus the previous RAZR X game-improvement head. Lofts were notably strong for the period,
  with a 30 degree 7-iron and a 44 degree pitching wedge. The stock set was 4-PW with an
  A-wedge, and 3-iron, sand wedge and lob wedge were offered separately. A smaller X Hot Pro
  model with weaker lofts was sold alongside it. Callaway announced the X Hot on 17 December 2012
  and it reached retail on 25 January 2013, so it is commonly referred to as the 2013 X Hot even
  though the year below is the announcement year per this database's convention.
