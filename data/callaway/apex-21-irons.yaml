description: >
  The Apex 21 is a 100 percent forged 1025 mild carbon steel iron carrying an
  A.I.-designed Flash Face Cup, a Tungsten Energy Core to set the centre of gravity club
  by club, and urethane microspheres for feel. Lofts are unchanged from the Apex 19
  everywhere except the 4-iron, holding a 30.5 degree 7-iron and a 43 degree pitching
  wedge. Published spec tables run 3-iron to A-wedge with no sand wedge in the set. Specs
  below are the standard men's steel-shaft numbers.
