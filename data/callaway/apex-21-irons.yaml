faq:
  - q: "What is the loft of a Callaway Apex 21 7-iron?"
    a: "The Callaway Apex 21 7-iron has a loft of 30.5 degrees, with a 62 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Apex 21 pitching wedge?"
    a: "The Apex 21 pitching wedge is 43 degrees and the matching A-wedge is 48 degrees."
  - q: "What is the difference between the Apex 21 and the Apex 19 lofts?"
    a: "They are identical apart from the 4-iron. Both sets run a 30.5 degree 7-iron and a 43 degree pitching wedge; the change from Apex 19 to Apex 21 is in construction, principally the move to an A.I.-designed Flash Face Cup."
  - q: "Are the Callaway Apex 21 irons fully forged?"
    a: "Yes. The Apex 21 body is 100 percent forged from 1025 mild carbon steel, with a forged Flash Face Cup and an internal tungsten energy core."
