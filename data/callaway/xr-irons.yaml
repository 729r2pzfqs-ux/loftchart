description: >
  The XR was Callaway's 2015 game-improvement iron, replacing the X2 Hot. It uses a
  two-piece cast head with dual heat treatment, allowing a thinner 360 Face Cup that wraps
  around the perimeter of the face, together with an Internal Standing Wave that positions
  mass low and central. This generation predates the tungsten weighting and urethane
  microspheres of later Callaway irons. Lofts are strong for the period, with a 30 degree
  7-iron and a 44 degree pitching wedge, and the published range runs from a 3-iron to a
  lob wedge. Specs below are the standard men's steel-shaft numbers.
