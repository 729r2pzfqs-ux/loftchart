faq:
  - q: "What is the loft of a Callaway XR 7-iron?"
    a: "The Callaway XR 7-iron has a loft of 30 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway XR pitching wedge?"
    a: "The Callaway XR pitching wedge is 44 degrees, with a 49 degree A-wedge, a 54 degree sand wedge and a 59 degree lob wedge."
  - q: "What is the difference between the Callaway XR and the Steelhead XR?"
    a: "The lofts, lies and lengths are almost identical, differing only in the 3-iron lie angle. The heads are genuinely different though: the Steelhead XR has substantially less offset, a hollow bore-through hosel and a steel-infused polyurethane layer behind the face."
