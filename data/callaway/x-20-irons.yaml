description: >
  The X-20 was Callaway's 2007 game-improvement iron, replacing the X-18 in the long-running
  X-series. It combined Variable Face Thickness technology with "Extreme Notch Weighting"
  perimeter weighting and the S2H2 hosel to push mass low and to the edges of the head.
  Callaway published a lower centre of gravity than the X-18. The set ran 3-PW with a
  2-iron, A-wedge, sand wedge and lob wedge available. A separate X-20 Tour model with
  a smaller head and different lofts was sold alongside it. Specs below are the standard
  men's steel-shaft numbers.
