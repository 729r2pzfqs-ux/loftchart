faq:
  - q: "What is the loft of a Callaway X-12 7-iron?"
    a: "The Callaway Big Bertha X-12 7-iron is 33 degrees, with a 62.5 degree lie and a 37 inch standard length."
  - q: "Do the Callaway X-12 and the 1994 Big Bertha share the same lofts?"
    a: "Almost exactly. Both run a 33 degree 7-iron and a 46.5 degree pitching wedge on an identical lie and length ladder; only the approach wedge differs, at 51 degrees against 50.8."
  - q: "What shafts came in the Callaway X-12?"
    a: "The stock steel shaft was the Memphis 10 '98, with the RCH Series 99 graphite offered in Light, Regular, Firm and Strong flexes."
