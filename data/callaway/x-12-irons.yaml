description: >
  The Big Bertha X-12 arrived in 1998 as Callaway's first multi-piece iron,
  using a 360 degree undercut channel to push weight low and to the perimeter.
  It carries the same loft and lie ladder as the original Big Bertha irons,
  with a 33 degree 7-iron and a 46.5 degree pitching wedge, and the same
  upright 65 degree lie through the wedges. Only the approach wedge changed,
  moving from 50.8 to 51 degrees. It became one of the best-selling iron sets
  of its decade and directly preceded the Steelhead X-14.
