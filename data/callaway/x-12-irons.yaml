faq:
  - q: "What is the loft of a Callaway Big Bertha X-12 7-iron?"
    a: "The Callaway Big Bertha X-12 7-iron has a loft of approximately 34 degrees, with a 62 degree lie and a 36.75 inch standard steel length."
  - q: "What is the loft of a Callaway X-12 pitching wedge?"
    a: "The X-12 pitching wedge is approximately 46 degrees, with a 51 degree A-wedge and a 56 degree sand wedge."
  - q: "What replaced the Callaway Big Bertha X-12?"
    a: "The Steelhead X-14, introduced in 2000, which moved to a Variable Face Thickness face and strengthened the 7-iron by a degree to 33."
