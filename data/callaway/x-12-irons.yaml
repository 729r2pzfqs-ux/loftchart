description: >
  The Big Bertha X-12 replaced the original Big Bertha iron in 1998 and was one of the
  best-selling iron sets of the late 1990s. It kept the S2H2 hosel of its predecessor but
  moved to a deeper, more pronounced cavity with a multi-tiered sole, pushing the centre
  of gravity lower and further back. Lofts are about a degree stronger than the 1994 Big
  Bertha through the mid irons, with a 34 degree 7-iron and a 46 degree pitching wedge.
  Specs below are the standard men's steel-shaft numbers.
