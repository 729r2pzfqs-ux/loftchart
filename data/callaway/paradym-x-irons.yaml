description: >
  The Paradym X is the distance and forgiveness model of Callaway's 2023 Paradym iron
  family. It shares the hollow-body Speed Frame construction and A.I.-designed forged 455
  face cup of the standard Paradym but carries more tungsten, up to 79 grams against 67,
  along with a larger profile and more offset. Lofts are a degree and a half stronger at
  the 7-iron, 27.5 degrees against 29, and the published range extends to a sand wedge.
  Specs below are the standard men's steel-shaft numbers.
