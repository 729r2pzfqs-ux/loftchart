faq:
  - q: "What is the loft of a Callaway Paradym X 7-iron?"
    a: "The Callaway Paradym X 7-iron has a loft of 27.5 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Paradym X pitching wedge?"
    a: "The Paradym X pitching wedge is 41 degrees, with a 46 degree A-wedge, a 51 degree gap wedge and a 56 degree sand wedge."
  - q: "Is the Paradym X stronger lofted than the standard Paradym?"
    a: "Yes. The Paradym X 7-iron is 27.5 degrees against 29 for the standard Paradym, and the difference runs about one to one and a half degrees through the set."
  - q: "Which 2023 Callaway Paradym iron is more forgiving?"
    a: "The Paradym X. It uses a larger head, more offset and up to 79 grams of tungsten against the standard Paradym's 67 grams, placing the centre of gravity lower and deeper."
