description: >
  Launched in January 2020, the Mavrik was the first Callaway iron designed with the
  company's artificial-intelligence face software, which produced a Flash Face Cup shaped
  individually for every loft in the set rather than one face scaled across it. A Tungsten
  Energy Core positions the centre of gravity club by club and urethane microspheres damp
  vibration. Lofts are strong for the category, with a 27 degree 7-iron and a 41 degree
  pitching wedge. Specs below are the standard men's steel-shaft numbers.
