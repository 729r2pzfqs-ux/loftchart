faq:
  - q: "What is the loft of a Callaway Mavrik 7-iron?"
    a: "The Callaway Mavrik 7-iron has a loft of 27 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Mavrik pitching wedge?"
    a: "The Callaway Mavrik pitching wedge is 41 degrees, with a 46 degree A-wedge, a 51 degree gap wedge and a 56 degree sand wedge."
  - q: "Are the Callaway Mavrik irons stronger lofted than the Rogue?"
    a: "Yes, by three degrees through most of the set. The Mavrik 7-iron is 27 degrees against 30 for the Rogue, and the pitching wedge is 41 degrees against 44."
  - q: "What makes the Mavrik iron face different?"
    a: "The Mavrik was the first Callaway iron whose face was designed by artificial intelligence, producing a Flash Face Cup shaped uniquely for each loft in the set instead of a single face design scaled across every club."
