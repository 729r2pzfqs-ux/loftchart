faq:
  - q: "What is the loft of a Callaway Apex DCB 7-iron?"
    a: "The Callaway Apex DCB 7-iron has a loft of 30 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Apex DCB pitching wedge?"
    a: "The Apex DCB pitching wedge is 43 degrees and the matching A-wedge is 48 degrees, the same as the Apex 21."
  - q: "What is the difference between the Apex DCB and the Apex 21?"
    a: "The DCB uses a deeper dual cavity back and a wider sole for a lower, deeper centre of gravity and easier launch. Its 7-iron is 30 degrees against 30.5 for the Apex 21, and its short irons are half a degree to one degree more upright."
  - q: "What does DCB stand for on the Callaway Apex irons?"
    a: "DCB stands for deep cavity back, referring to the deeper dual cavity construction that makes it the more forgiving model in the 2021 Apex family."
