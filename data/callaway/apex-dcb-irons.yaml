description: >
  The Apex DCB launched alongside the Apex 21 as the forgiving member of the 2021 Apex
  family. DCB stands for deep cavity back: the head uses a deeper dual cavity and a wider
  sole than the Apex 21, moving the centre of gravity lower and further back for an easier
  launch. Construction is otherwise shared with the Apex 21, a forged 1025 mild carbon
  steel body with an A.I.-designed Flash Face Cup, tungsten in the long and mid irons and
  urethane microspheres. Lofts are half a degree weaker than the Apex 21 at the 7-iron and
  the set is more upright through the short irons. Specs below are the standard men's
  steel-shaft numbers.
