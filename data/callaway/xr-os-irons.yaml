description: >
  The XR OS is the oversize, maximum-forgiveness version of Callaway's XR iron, announced
  on 12 January 2016 and at retail from 22 January. OS stands for oversize: the head is
  larger than the standard XR with a wider sole and a lower, deeper centre of gravity to
  raise launch. It also runs longer than the standard XR through the mid irons, with a
  37.25 inch 7-iron against 37 inches. Lofts are weaker than the standard XR in the long
  and mid irons, a 31.5 degree 7-iron against 30, but converge from the 9-iron down. Specs
  below are the standard men's steel-shaft numbers.
