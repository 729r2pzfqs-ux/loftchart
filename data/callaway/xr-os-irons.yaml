faq:
  - q: "What is the loft of a Callaway XR OS 7-iron?"
    a: "The Callaway XR OS 7-iron has a loft of 31.5 degrees, with a 62.5 degree lie and a 37.25 inch standard steel length."
  - q: "What is the loft of a Callaway XR OS pitching wedge?"
    a: "The XR OS pitching wedge is 44 degrees, with a 49 degree A-wedge and a 54 degree sand wedge, matching the standard XR."
  - q: "What does OS mean on the Callaway XR OS irons?"
    a: "OS stands for oversize. The XR OS has a larger head, a wider sole and a lower, deeper centre of gravity than the standard XR, making it the more forgiving and higher-launching of the two."
  - q: "Are the XR OS irons from 2015 or 2016?"
    a: "2016. Callaway announced the XR OS irons on 12 January 2016 with retail availability from 22 January 2016, a year after the standard XR."
