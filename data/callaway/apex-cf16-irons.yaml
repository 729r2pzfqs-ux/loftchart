description: >
  Announced in September 2015 for the 2016 model year, the Apex CF16 replaced the original
  2014 Apex as Callaway's forged players-distance iron. The body is quadruple-net forged
  from 1025 mild carbon steel including the hosel, with a laser-welded forged cup face.
  The 360 Face Cup appears only in the 3 through 7 irons; the 8-iron through A-wedge use
  an engineered face plate instead. Lofts, lies and lengths carry over unchanged from the
  2014 Apex, with a 31 degree 7-iron and a 45 degree pitching wedge. Specs below are the
  standard men's steel-shaft numbers.
