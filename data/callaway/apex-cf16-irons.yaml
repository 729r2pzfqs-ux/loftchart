faq:
  - q: "What is the loft of a Callaway Apex CF16 7-iron?"
    a: "The Callaway Apex CF16 7-iron has a loft of 31 degrees, with a 62 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Apex CF16 pitching wedge?"
    a: "The Apex CF16 pitching wedge is 45 degrees, with a 50 degree A-wedge and a 55 degree sand wedge."
  - q: "Are the Apex CF16 lofts the same as the 2014 Apex?"
    a: "Yes. The Apex CF16 carries over the 2014 Apex loft, lie and length chart unchanged, from a 19 degree 3-iron to a 55 degree sand wedge. The differences are in construction, not specification."
  - q: "Do all the Apex CF16 irons have the 360 Face Cup?"
    a: "No. The 360 Face Cup is used in the 3 through 7 irons only. The 8-iron, 9-iron, pitching wedge and A-wedge use an engineered face plate instead."
