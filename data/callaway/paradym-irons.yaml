faq:
  - q: "What is the loft of a Callaway Paradym 7-iron?"
    a: "The Callaway Paradym 7-iron has a loft of 29 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Paradym pitching wedge?"
    a: "The Callaway Paradym pitching wedge is 42 degrees, with a 47 degree A-wedge and a 52 degree gap wedge."
  - q: "What is the difference between the Paradym and Paradym X irons?"
    a: "The Paradym X is the stronger-lofted, more forgiving model. Its 7-iron is 27.5 degrees against 29 for the standard Paradym, and its pitching wedge is 41 degrees against 42, with more offset and more tungsten."
  - q: "Are the Callaway Paradym irons forged?"
    a: "The head is cast, but the face is a forged 455 steel cup designed using artificial intelligence, set into a hollow body with internal tungsten weighting and urethane microspheres."
