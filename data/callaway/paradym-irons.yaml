description: >
  Released in February 2023, the Paradym is a hollow-bodied cast iron built on what
  Callaway calls Speed Frame construction, with an A.I.-designed forged 455 steel face
  cup, up to 67 grams of tungsten to set the centre of gravity low and patented urethane
  microspheres behind the face. Lofts sit between the Rogue ST Max it followed and the
  more distance-oriented Paradym X sold alongside it, with a 29 degree 7-iron and a 42
  degree pitching wedge. Specs below are the standard men's steel-shaft numbers.
