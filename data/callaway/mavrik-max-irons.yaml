faq:
  - q: "What is the loft of a Callaway Mavrik Max 7-iron?"
    a: "The Callaway Mavrik Max 7-iron has a loft of 30 degrees, with a 62.5 degree lie and a 37.125 inch standard steel length."
  - q: "What is the loft of a Callaway Mavrik Max pitching wedge?"
    a: "The Mavrik Max pitching wedge is 43 degrees, with a 48 degree A-wedge and a 54 degree sand wedge."
  - q: "Why are the Mavrik Max lofts weaker than the standard Mavrik?"
    a: "Because the standard Mavrik was the distance model in the family. The Max was built for launch and forgiveness with a larger head and deeper centre of gravity, so it uses more conventional lofts: a 30 degree 7-iron against 27, and a 43 degree pitching wedge against 41."
  - q: "Which Mavrik iron is the most forgiving?"
    a: "The Mavrik Max. It uses the largest head and the deepest centre of gravity in the 2020 Mavrik range, which is why it sits in the super game improvement category."
