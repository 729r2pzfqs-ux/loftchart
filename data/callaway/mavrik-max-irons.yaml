description: >
  The Mavrik Max is the most forgiving member of the 2020 Mavrik family, using a larger
  head and a deeper centre of gravity than the standard Mavrik to raise launch and widen
  the effective hitting area. Counterintuitively for the more forgiving model, its lofts
  are three degrees weaker than the standard Mavrik through most of the set, a 30 degree
  7-iron against 27, because the standard Mavrik was the distance-oriented set in the
  range. Lengths also run slightly longer in the mid irons. Specs below are the standard
  men's steel-shaft numbers.
