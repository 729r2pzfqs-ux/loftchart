description: >
  In stores from 2 September 2016, the Steelhead XR revived the Steelhead name Callaway
  had used on the X-14 era irons. It combines a next-generation 360 Face Cup with a hollow
  bore-through hosel and a steel-infused polyurethane layer behind the face, the precursor
  to the urethane microspheres used in later Callaway irons. Lofts, lies and lengths carry
  over from the standard XR almost exactly, but offset is cut substantially, from 0.220
  inches at the 3-iron against the XR's 0.270. Specs below are the standard men's
  steel-shaft numbers.
