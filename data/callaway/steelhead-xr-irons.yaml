faq:
  - q: "What is the loft of a Callaway Steelhead XR 7-iron?"
    a: "The Callaway Steelhead XR 7-iron has a loft of 30 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Steelhead XR pitching wedge?"
    a: "The Steelhead XR pitching wedge is 44 degrees, with a 49 degree A-wedge, a 54 degree sand wedge and a 59 degree lob wedge."
  - q: "How do the Steelhead XR and XR irons differ?"
    a: "The specifications are nearly identical, differing only in the 3-iron lie angle. The Steelhead XR is a different head, with markedly less offset, a hollow bore-through hosel and a steel-infused polyurethane layer behind the face."
  - q: "Is the Steelhead XR related to the older Callaway Steelhead irons?"
    a: "Only by name. The Steelhead XR revived a badge Callaway last used on the X-14 era irons around 2000, but it is a 2016 design built on the XR platform rather than a continuation of that head."
