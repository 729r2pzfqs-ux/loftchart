description: >
  The Apex 19 arrived for the 2019 season as the third generation of Callaway's forged
  players-distance iron. It keeps the forged 1025 mild carbon steel body of the CF16 but
  adds a 360 Face Cup across the set, internal tungsten weighting to place the centre of
  gravity by club, and urethane microspheres behind the face to damp vibration without
  slowing it. Lofts are noticeably stronger than the CF16 it replaced, moving the 7-iron
  from 31 to 30.5 degrees and the pitching wedge from 45 to 43 degrees. Specs below are
  the standard men's steel-shaft numbers.
