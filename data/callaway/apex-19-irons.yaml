faq:
  - q: "What is the loft of a Callaway Apex 19 7-iron?"
    a: "The Callaway Apex 19 7-iron has a loft of 30.5 degrees, with a 62 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Apex 19 pitching wedge?"
    a: "The Apex 19 pitching wedge is 43 degrees, with a 48 degree A-wedge and a 54 degree sand wedge."
  - q: "Are the Apex 19 irons stronger lofted than the Apex CF16?"
    a: "Yes. The Apex 19 is half a degree stronger at the 7-iron (30.5 versus 31 degrees) and two degrees stronger at the pitching wedge (43 versus 45 degrees), with the gap widening through the short irons."
