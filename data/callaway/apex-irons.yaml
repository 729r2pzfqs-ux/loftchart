description: >
  The 2014 Apex was Callaway's first iron under the revived Apex name and established the
  brand's players-distance category. The head is a forged 1025 carbon steel body with a
  welded high-strength 455 Carpenter steel face plate, giving forged feel with a thinner,
  faster face than a conventional forging. Lofts sit between traditional players irons and
  game-improvement sets, with a 31 degree 7-iron and a 45 degree pitching wedge, and offset
  tapers from 0.220 inches at the 3-iron to 0.100 inches at the sand wedge. The set ran
  3-PW with matching A-wedge and sand wedge. A smaller, weaker-lofted Apex Pro was sold
  alongside it.
