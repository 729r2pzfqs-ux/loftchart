description: >
  Released in February 2018, the Rogue was Callaway's mainstream game-improvement iron
  between the Steelhead XR and the Mavrik. It pairs a 360 Face Cup with Variable Face
  Thickness so the face flexes across a wider area, adds tungsten weighting to lower the
  centre of gravity, and fills the head with elastic urethane microspheres to absorb
  vibration without restricting face speed. Note that the Rogue predates Callaway's
  artificial-intelligence face design, which reached the iron line with the Mavrik in
  2020. The published set is unusually deep, running from a 3-iron to a lob wedge. Specs
  below are the standard men's steel-shaft numbers.
