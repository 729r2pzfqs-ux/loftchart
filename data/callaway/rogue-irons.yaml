faq:
  - q: "What is the loft of a Callaway Rogue 7-iron?"
    a: "The Callaway Rogue 7-iron has a loft of 30 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Rogue pitching wedge?"
    a: "The Callaway Rogue pitching wedge is 44 degrees, with a 49 degree A-wedge, a 54 degree sand wedge and a 59 degree lob wedge."
  - q: "Do the Callaway Rogue irons have an A.I.-designed face?"
    a: "No. The 2018 Rogue uses a 360 Face Cup with Variable Face Thickness. Callaway's artificial-intelligence face design first appeared in the Epic Flash driver in 2019 and did not reach the iron line until the Mavrik in 2020."
  - q: "How long is a standard Callaway Rogue 7-iron?"
    a: "The standard men's steel-shaft Callaway Rogue 7-iron is 37 inches with a 62.5 degree lie angle."
