faq:
  - q: "What is the loft of a Callaway X2 Hot 7-iron?"
    a: "The Callaway X2 Hot 7-iron has a loft of 30 degrees, a lie of 62.5 degrees and a length of 37 inches."
  - q: "What are the Callaway X2 Hot wedge lofts?"
    a: "The pitching wedge is 44 degrees, the A-wedge 49 degrees, the sand wedge 54 degrees and the lob wedge 59 degrees."
  - q: "Are Callaway X2 Hot irons stronger lofted than the X Hot?"
    a: "No. The X2 Hot carries the same loft structure as the 2013 X Hot from the 3-iron through the lob wedge. The changes are in bounce, offset and the flatter, shorter long irons."
  - q: "What year are Callaway X2 Hot irons?"
    a: "Callaway announced them on 12 November 2013 and they went on sale on 17 January 2014, which is why they are usually referred to as the 2014 X2 Hot."
