description: >
  The X2 Hot is the second-generation X Hot game-improvement iron, replacing the 2013 model
  with a Deep Central Undercut Cavity and an internal Stabilizing Arch that let Callaway thin
  the centre of the face further for ball speed. Callaway also added roughly two to four degrees
  more bounce than the X Hot to improve turf interaction, and progressed the offset so the short
  irons sit straighter than the long irons. The loft structure is carried over unchanged from
  the X Hot at 30 degrees in the 7-iron and 44 degrees in the pitching wedge; the differences are
  in the long irons, where the 4-, 5- and 6-iron are a quarter of a degree more upright and
  around a quarter to three-eighths of an inch shorter, and the 3-iron is a quarter of a degree
  flatter. From the 7-iron down the lie and length figures are identical to the X Hot.
  Stock sets ran 3-PW, 4-PW, 5-PW or 6-PW with A, S and L wedges sold as add-ons; a smaller,
  weaker-lofted X2 Hot Pro was sold alongside it. Callaway announced the line on 12 November 2013
  and it reached retail on 17 January 2014, so it is widely known as the 2014 X2 Hot even though
  the year below is the announcement year per this database's convention.
