faq:
  - q: "What is the loft of a Callaway X-18 7-iron?"
    a: "The Callaway X-18 7-iron has a loft of approximately 33 degrees, with a 62.5 degree lie and a 36.75 inch standard steel length."
  - q: "What is the loft of a Callaway X-18 pitching wedge?"
    a: "The X-18 pitching wedge is approximately 45 degrees, with a 50 degree A-wedge and a 55 degree sand wedge."
  - q: "Are the Callaway X-18 and X-20 lofts the same?"
    a: "Yes. Both sets run a 21 degree 3-iron, a 33 degree 7-iron and a 45 degree pitching wedge. The X-20 changed the head, adding Extreme Notch Weighting and a lower centre of gravity, rather than the specification chart."
