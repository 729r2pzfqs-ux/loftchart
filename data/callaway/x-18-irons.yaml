description: >
  The X-18 was Callaway's game-improvement iron from 2004 to 2007, sitting between the
  X-16 and the X-20 in the long-running X-series. It uses Variable Face Thickness and the
  S2H2 hosel with a deeper undercut cavity and a more upright lie progression through the
  short irons than the X-16. Lofts are unchanged from the X-16, with a 33 degree 7-iron
  and a 45 degree pitching wedge, figures the X-20 also carried over. A smaller X-18 Pro
  Series with different lofts was sold alongside it. Specs below are the standard men's
  steel-shaft numbers.
