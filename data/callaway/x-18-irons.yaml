faq:
  - q: "What is the loft of a Callaway X-18 7-iron?"
    a: "The Callaway X-18 7-iron is 33 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "Is the Callaway X-18 stronger or weaker than the X-16?"
    a: "Weaker through the middle and short irons. The X-18 7-iron is 33 degrees against 34 on the X-16, and its 9-iron is 41 degrees against 42."
  - q: "What is the pitching wedge loft on the Callaway X-18?"
    a: "The X-18 pitching wedge is 46 degrees, with a 51 degree approach wedge, a 56 degree sand wedge and a 60 degree lob wedge."
