description: >
  The X-18 replaced the X-16 in 2004 and moved the line back toward slightly
  weaker lofts, with a 33 degree 7-iron against the X-16's 34 and a 41 degree
  9-iron against 42. It keeps the upright Callaway lie ladder topping out at
  65 degrees through the wedges and the notched, undercut cavity that defined
  the mid-2000s X-series. Callaway listed the stock steel build as Constant
  Weight Uniflex Steel, and published no bounce column for this generation.
  The catalogued range ran 2-iron to lob wedge.
