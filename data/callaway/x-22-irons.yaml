description: >
  The X-22 followed the X-20 in 2008 and was the last of the numbered X-series irons to
  sell in real volume before Callaway moved the line towards the X Hot and XR names. It
  uses a notched, undercut cavity with weight pushed to the extreme heel and toe, giving
  a higher moment of inertia than the X-20, and keeps the S2H2 hosel. Lofts are about a
  degree stronger than the X-20 through the set, with a 32 degree 7-iron and a 44 degree
  pitching wedge. A smaller X-22 Tour model with more traditional lofts was sold
  alongside it. Specs below are the standard men's steel-shaft numbers.
