description: >
  The X-22 followed the X-20 in 2008 and was the last numbered X-series iron
  to sell in real volume before Callaway moved the line toward the X Hot and
  XR names. It uses a notched, undercut cavity with weight pushed to the
  extreme heel and toe for a higher moment of inertia than the X-20, and keeps
  the S2H2 hosel. Contrary to the common assumption that each generation grew
  stronger, Callaway's own spec sheet shows the X-22 carrying the X-20 loft
  ladder essentially unchanged, with a 33 degree 7-iron and a 45 degree
  pitching wedge. A smaller X-22 Tour model with more traditional lofts was
  sold alongside it.
