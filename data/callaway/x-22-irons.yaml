faq:
  - q: "What is the loft of a Callaway X-22 7-iron?"
    a: "The Callaway X-22 7-iron is 33 degrees, with a 62.5 degree lie and a 36.75 inch standard steel length."
  - q: "Is the Callaway X-22 stronger lofted than the X-20?"
    a: "No. Callaway's published spec sheet gives the X-22 the same 33 degree 7-iron and 45 degree pitching wedge as the X-20. Secondary sources listing it a degree stronger are not supported by the manufacturer table."
  - q: "What is the difference between the X-22 and the X-22 Tour?"
    a: "The X-22 Tour has a smaller head, a thinner topline, less offset and more traditional lofts, aimed at better players. The standard X-22 listed here is the larger game improvement model."
