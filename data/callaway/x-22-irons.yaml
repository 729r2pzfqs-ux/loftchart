sources:
  - "Specification figures are reconstructed from widely reproduced spec tables for this model and cross-checked for set progression against LoftChart's independently verified Callaway X-20 (2007) entry, which directly preceded it. They have NOT been verified against an original Callaway catalogue page or manufacturer spec sheet."
  - "Lie angles and lengths in particular should be treated as approximate. The one degree strengthening relative to the X-20 is the least certain element of this table: some sources show the X-22 carrying the X-20 lofts unchanged at 33 degrees for the 7-iron and 45 for the pitching wedge. Verify before relying on the exact figures."
faq:
  - q: "What is the loft of a Callaway X-22 7-iron?"
    a: "The Callaway X-22 7-iron has a loft of approximately 32 degrees, with a 62.5 degree lie and a 36.75 inch standard steel length. Some sources list it as 33 degrees, matching the X-20."
  - q: "What is the loft of a Callaway X-22 pitching wedge?"
    a: "The X-22 pitching wedge is approximately 44 degrees, with a 49 degree A-wedge, a 54 degree sand wedge and a 59 degree lob wedge."
  - q: "What is the difference between the X-22 and the X-22 Tour?"
    a: "The X-22 Tour has a smaller head, a thinner topline, less offset and more traditional lofts, aimed at better players. The standard X-22 is the larger, stronger-lofted game improvement model listed here."
