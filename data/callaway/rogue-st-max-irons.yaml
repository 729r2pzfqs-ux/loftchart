description: >
  The Rogue ST Max was the core game-improvement iron of Callaway's 2022 Rogue ST family,
  which revived the Rogue name four years after the original. The head is cast from
  high-strength 450 stainless steel around an A.I.-designed Flash Face Cup, with up to 62
  grams of high-density tungsten placed low in the head and patented urethane microspheres
  behind the face. Lofts sit half a degree weaker than the Mavrik at the 7-iron but match
  it at the pitching wedge. Specs below are the standard men's steel-shaft numbers.
