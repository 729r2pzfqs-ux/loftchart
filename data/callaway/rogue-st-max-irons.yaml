faq:
  - q: "What is the loft of a Callaway Rogue ST Max 7-iron?"
    a: "The Callaway Rogue ST Max 7-iron has a loft of 27.5 degrees, with a 62.5 degree lie and a 37 inch standard steel length."
  - q: "What is the loft of a Callaway Rogue ST Max pitching wedge?"
    a: "The Rogue ST Max pitching wedge is 41 degrees, with a 46 degree A-wedge, a 51 degree gap wedge and a 56 degree sand wedge."
  - q: "How do the Rogue ST Max lofts compare with the Mavrik?"
    a: "They are very close. The Rogue ST Max 7-iron is 27.5 degrees against 27 for the Mavrik, and both sets share a 41 degree pitching wedge, a 46 degree A-wedge and a 56 degree sand wedge."
  - q: "Is the Rogue ST Max the same as the 2018 Callaway Rogue?"
    a: "No. They are separate models four years apart. The 2018 Rogue uses a 360 Face Cup and has a 30 degree 7-iron, while the 2022 Rogue ST Max uses an A.I.-designed Flash Face Cup in high-strength 450 stainless steel and has a 27.5 degree 7-iron."
