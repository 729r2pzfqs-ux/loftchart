description: >
  The 1994 Big Bertha irons carried Callaway's breakthrough driver name into the iron
  category and became the set that established oversize, perimeter-weighted irons in the
  mainstream. The head is investment cast from 17-4 stainless steel and uses Callaway's
  S2H2 design, standing for short, straight, hollow hosel: shortening the hosel and
  hollowing it out freed weight to be redistributed to the perimeter and the sole. Lofts
  are traditional by modern standards, with a 35 degree 7-iron and a 47 degree pitching
  wedge, roughly seven degrees weaker at the 7-iron than Callaway's current game
  improvement irons. Specs below are the standard men's steel-shaft numbers.
