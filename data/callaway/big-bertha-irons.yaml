faq:
  - q: "What is the loft of a Callaway Big Bertha 7-iron?"
    a: "The original 1994 Callaway Big Bertha 7-iron has a loft of approximately 35 degrees, with a 62 degree lie and a 36.75 inch standard steel length."
  - q: "What is the loft of a 1994 Callaway Big Bertha pitching wedge?"
    a: "The 1994 Big Bertha pitching wedge is approximately 47 degrees, with a 55 degree sand wedge."
  - q: "How do the 1994 Big Bertha lofts compare with modern Callaway irons?"
    a: "They are far weaker. The 1994 Big Bertha 7-iron is about 35 degrees, while the 2023 Paradym 7-iron is 29 degrees and the Paradym X is 27.5 degrees, a difference of six to seven and a half degrees. Comparing distance between the two without accounting for that loft gap is misleading."
  - q: "What does S2H2 mean on the Callaway Big Bertha irons?"
    a: "S2H2 stands for short, straight, hollow hosel. Shortening and hollowing the hosel saved weight that Callaway redistributed to the perimeter and sole of the head, raising the moment of inertia."
