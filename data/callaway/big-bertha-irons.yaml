faq:
  - q: "What is the loft of a Callaway Big Bertha 7-iron?"
    a: "The 1994 Callaway Big Bertha 7-iron is 33 degrees, with a 62.5 degree lie and a 37 inch standard length."
  - q: "What is the pitching wedge loft on the 1994 Big Bertha?"
    a: "The Big Bertha pitching wedge is 46.5 degrees, followed by a 50.8 degree approach wedge, a 55 degree sand wedge and a 60 degree lob wedge."
  - q: "Why are the Big Bertha lie angles so upright?"
    a: "The 1994 Big Bertha runs 65 degrees at the wedges and 62.5 degrees at the 7-iron, several degrees more upright than a modern set. That was normal for Callaway irons of the period and is worth checking before buying a used set."
