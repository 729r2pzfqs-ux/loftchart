description: >
  The 1994 Big Bertha irons are the set that carried Callaway's metalwood
  success into the iron market, built around the S2H2 short, straight, hollow
  hosel that moved weight out of the neck and into the head. Lofts are
  traditional for the era with a 33 degree 7-iron and a 46.5 degree pitching
  wedge, and the lie ladder is strikingly upright by modern standards,
  reaching 65 degrees through the wedges. Callaway published a single standard
  length per club rather than separate steel and graphite figures. The
  catalogued range ran from a 1-iron to a lob wedge, though 3-PW was the
  normal retail set.
