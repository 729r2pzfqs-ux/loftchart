faq:
  - q: "What is the loft of a Callaway Steelhead X-14 7-iron?"
    a: "The Callaway Steelhead X-14 7-iron has a loft of 33 degrees."
  - q: "What is the loft of a Callaway Steelhead X-14 pitching wedge?"
    a: "The Steelhead X-14 pitching wedge is 46.5 degrees. The matching A-wedge is 52 degrees and the sand wedge is 55 degrees."
  - q: "How long is a standard Callaway X-14 7-iron?"
    a: "The standard men's Callaway Steelhead X-14 7-iron is 37 inches with a 62.5 degree lie angle."
