description: >
  The Steelhead X-14 was Callaway's mainstream game-improvement iron for 2000 and one of
  the best-selling iron sets of its era. It used a cast stainless steel head with Callaway's
  Variable Face Thickness (VFT) face and the S2H2 short, straight, hollow hosel design to
  move weight into the perimeter. Lofts were moderately strong for the period (33 degrees
  at the 7-iron) and the set ran 3-PW with an A-wedge, sand wedge and lob wedge sold
  alongside. Specs below are the standard men's steel-shaft numbers published by Callaway.
