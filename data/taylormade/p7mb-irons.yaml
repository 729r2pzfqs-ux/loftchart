description: >
  The P7MB is TaylorMade's muscleback blade, forged from 1025 carbon steel using
  a compact grain forging process and finished with milled faces and grooves. It
  carries the least offset of any club in the P-Series, from 1.9mm in the 3-iron
  down to 1.4mm in the pitching wedge, with a thin topline and a narrow sole. The
  7-iron is 35 degrees and the pitching wedge 47 degrees, one degree weaker than
  the P7MC cavity back through the 9-iron, and the set is offered 3-iron through
  pitching wedge with no stock gap wedge. Specs below are the men's standard
  right-handed steel build.
