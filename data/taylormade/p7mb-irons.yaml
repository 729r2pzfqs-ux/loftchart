faq:
  - q: "What is the loft of a TaylorMade P7MB 7-iron?"
    a: "The TaylorMade P7MB 7-iron has a loft of 35 degrees, with a 62.5-degree lie and a 37.00-inch steel-shaft length."
  - q: "Is the P7MB a true blade?"
    a: "Yes. The P7MB is a one-piece 1025 carbon steel muscleback with no cavity, no tungsten weighting and the smallest offset in the P-Series, ranging from 1.9mm in the 3-iron to 1.4mm in the pitching wedge."
  - q: "What is the pitching wedge loft on the P7MB?"
    a: "The P7MB pitching wedge is 47 degrees, the same as the P7MC. The set runs 3-iron through pitching wedge with no stock approach or gap wedge."
