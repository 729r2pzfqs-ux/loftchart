description: >
  The M1 iron was TaylorMade's only M-family players iron, sold for a single
  season in 2017 alongside the larger M2. It pairs a thin high-COR face with
  Face Slot Technology in the heel and toe and a Speed Pocket in the sole, while
  a 180-degree fluted hosel and high-density tungsten in the 3-iron through
  7-iron move the centre of gravity low. Head size, blade length and offset are
  smaller than the M2, and offset runs from 4.0 mm in the 3-iron to 1.6 mm in
  the sand wedge. The 7-iron is 30.5 degrees, about two degrees weaker than the
  M2 of the same year. Specs below are the men's standard steel-shaft build.
