faq:
  - q: "What is the loft of a TaylorMade M1 7-iron?"
    a: "The TaylorMade M1 7-iron has a loft of 30.5 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the M1 irons differ from the M2 irons?"
    a: "The M1 is the more compact of the two. It has a smaller head, a thinner topline, a shorter blade length and less offset, and its lofts are about two degrees weaker through the set: 30.5 degrees at the 7-iron against 28.5 degrees for the 2016 M2."
  - q: "Do the TaylorMade M1 irons use tungsten?"
    a: "Yes. High-density tungsten is placed in the 3-iron through 7-iron heads to lower the centre of gravity and allow a narrower sole. The short irons do not carry the tungsten weight."
  - q: "What is the pitching wedge loft on the M1 irons?"
    a: "The M1 pitching wedge is 45 degrees. The set also offers a 50-degree approach wedge and a 55-degree sand wedge, and runs from a 3-iron at 18 degrees."
