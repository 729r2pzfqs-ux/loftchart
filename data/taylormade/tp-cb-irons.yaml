description: >
  The Tour Preferred CB was the most forgiving of TaylorMade's three 2014 Tour
  Preferred irons, sitting above the MC and MB in the range. It pairs a forged face
  with a cast undercut cavity and adds a Speed Pocket to the 3- through 7-irons, which
  let TaylorMade strengthen the lofts while keeping launch high. The head shape is
  progressive, with compact minimal-offset short irons and larger long irons carrying
  more offset, and the set runs from a 3-iron to a 51-degree approach wedge. The
  7-iron is 32.5 degrees. Specs below are the men's standard steel-shaft build.
