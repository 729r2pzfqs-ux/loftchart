faq:
  - q: "What is the loft of a TaylorMade TP CB 7-iron?"
    a: "The TaylorMade TP CB 7-iron has a loft of 32.5 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the TP CB lofts compare to the TP MB?"
    a: "The TP CB is stronger through most of the set. Its 7-iron is 32.5 degrees against 35 degrees for the TP MB, and its pitching wedge is 46 degrees against 47. TaylorMade strengthened the CB lofts because the Speed Pocket in the 3- through 7-irons raises launch angle."
  - q: "Does the TaylorMade TP CB have a Speed Pocket?"
    a: "Yes, in the 3- through 7-irons. The slot in the sole increases ball speed on strikes low on the face, which is what allowed the stronger loft progression compared with the MB and MC models in the same 2014 Tour Preferred range."
