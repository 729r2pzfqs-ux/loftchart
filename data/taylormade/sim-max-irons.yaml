faq:
  - q: "What is the loft of a TaylorMade SIM Max 7-iron?"
    a: "The TaylorMade SIM Max 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37.25-inch steel-shaft length."
  - q: "Are the SIM Max irons the same loft as the M6 irons?"
    a: "Almost identically. Both use a 19-degree 4-iron, a 28.5-degree 7-iron and a 43.5-degree pitching wedge. The only change is the 8-iron, which went from 33 degrees on the M6 to 32.5 degrees on the SIM Max."
  - q: "What is the ECHO Damping System in the SIM Max irons?"
    a: "It is a soft polymer insert that spans the head from heel to toe behind the face, held in place by the Speed Bridge. It absorbs the high-frequency vibration a very thin, fast face produces, so the iron can be flexible without sounding harsh."
  - q: "What is the pitching wedge loft on the SIM Max irons?"
    a: "The SIM Max pitching wedge is 43.5 degrees. The set continues with a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge."
