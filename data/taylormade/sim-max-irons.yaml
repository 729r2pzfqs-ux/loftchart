description: >
  The SIM Max took over from the M6 as TaylorMade's mainstream game-improvement
  iron in 2020. It keeps the Speed Bridge structure introduced on the M6 but
  adds the ECHO Damping System, a polymer insert running heel to toe behind the
  face, and pairs it with a Thru-Slot Speed Pocket and progressive Inverted Cone
  Technology. Lofts are marginally weaker than the M6 in the 8-iron only; the
  7-iron stays at 28.5 degrees and the pitching wedge at 43.5 degrees. Lengths
  are TaylorMade's progressive set measured on the ground plane. Specs below are
  the men's standard steel-shaft build.
