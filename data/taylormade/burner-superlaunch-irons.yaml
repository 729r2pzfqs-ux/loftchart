description: >
  The Burner SuperLaunch was TaylorMade's maximum-forgiveness iron of 2010-2011, sold
  alongside the Burner 2.0 rather than replacing it and marketed as the company's
  highest-MOI iron to that point. It uses an ultra-large deep cavity, a low-profile
  long-iron head, an extra-wide multi-functional sole and Inverted Cone Technology,
  and it was one of the first TaylorMade irons built with the 2010 conforming groove
  design. Lofts sit a degree weaker than the concurrent Burner 2.0, with a 33-degree
  7-iron and a 46-degree pitching wedge, and the set tops out at a sand wedge.
  Specs below are the men's standard steel-shaft build.
