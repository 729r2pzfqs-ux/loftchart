faq:
  - q: "What is the loft of a TaylorMade Burner SuperLaunch 7-iron?"
    a: "The TaylorMade Burner SuperLaunch 7-iron has a loft of 33 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "How do the Burner SuperLaunch lofts compare to the Burner 2.0?"
    a: "The SuperLaunch is 2 degrees weaker at the 7-iron (33 degrees versus 31) and 1 degree weaker at the pitching wedge (46 versus 45). The SuperLaunch was built for higher launch and easier carry rather than for maximum distance."
  - q: "Is there a Burner SuperFast iron set?"
    a: "No. SuperFast was a TaylorMade driver, fairway wood and rescue name. The SuperFast branding appears on this iron only as the shaft designation, the Burner SuperFast 85 steel shaft fitted to the Burner SuperLaunch irons."
