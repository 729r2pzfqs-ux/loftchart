description: >
  The M6 replaced the M4 as TaylorMade's mainstream game-improvement iron in
  2019. Its headline change is the Speed Bridge, a rib that runs from the
  topline to the back of the sole and stiffens the head so the Speed Pocket and
  the unsupported thin face could be made more flexible without the sound
  turning harsh; a HYBRAR damping bar sits behind it. Lofts are unchanged from
  the M4, with a 28.5-degree 7-iron and a 43.5-degree pitching wedge. The stated
  lengths use the ground-plane method TaylorMade adopted on 1 November 2018, so
  they read roughly half an inch longer than the M4 figures even though the
  physical clubs are within an eighth of an inch of each other. Specs below are
  the men's standard steel-shaft build.
