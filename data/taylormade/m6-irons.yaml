faq:
  - q: "What is the loft of a TaylorMade M6 7-iron?"
    a: "The TaylorMade M6 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37.5-inch steel-shaft length as TaylorMade measures it."
  - q: "Why are the M6 irons listed as longer than the M4 irons?"
    a: "It is a measuring change, not a design change. From 1 November 2018 TaylorMade switched from the older pin-length method to the USGA-preferred ground-plane method, which adds about half an inch to the stated figure. TaylorMade states the physical lengths of the M6 are within an eighth of an inch of the previous M-series irons."
  - q: "What does the Speed Bridge do in the M6 irons?"
    a: "The Speed Bridge is a rib joining the topline to the rear of the sole. It stiffens the head structure, which let TaylorMade keep a very flexible face and Speed Pocket without the hollow, tinny sound that usually comes with them, and it holds a HYBRAR damping bar."
  - q: "What is the pitching wedge loft on the M6 irons?"
    a: "The M6 pitching wedge is 43.5 degrees, the same as the M4. The set continues with a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge."
