faq:
  - q: "What is the loft of a TaylorMade Burner Plus 7-iron?"
    a: "The TaylorMade Burner Plus 7-iron has a loft of 32 degrees, with a 63-degree lie and a 37.25-inch steel-shaft length."
  - q: "What is the difference between the Burner Plus and the Burner 2.0?"
    a: "The Burner Plus is the 2009 model and the Burner 2.0 replaced it in 2010. The Burner 2.0 is 1 degree stronger through the mid-irons (31-degree 7-iron versus 32 degrees) and uses slightly flatter lies and a different length progression, though both sets share a 45-degree pitching wedge."
  - q: "How many clubs were in the Burner Plus iron set?"
    a: "The stock Burner Plus range ran from a 19-degree 3-iron to a 60-degree lob wedge, including a 50-degree approach wedge and a 55-degree sand wedge. Burner Rescue clubs were also offered as combo-set replacements for the long irons."
