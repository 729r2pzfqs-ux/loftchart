description: >
  The Burner Plus was the higher-launching, more forgiving companion to the 2009
  Burner iron, aimed at players who wanted the same Burner distance with a larger
  head and a wider sole. It combines a thin high-COR face with Inverted Cone
  Technology, advanced perimeter weighting and TaylorMade's SuperFast light-shaft
  and light-grip package. Lofts run strong for the period, with a 32-degree 7-iron
  and a 45-degree pitching wedge, and the stock set extends to a 60-degree lob wedge.
  Specs below are the men's standard steel-shaft build.
