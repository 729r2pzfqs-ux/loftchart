faq:
  - q: "What is the loft of a TaylorMade r7 CGB Max 7-iron?"
    a: "The TaylorMade r7 CGB Max 7-iron has a loft of 30 degrees, with a 63-degree lie and a 36.75-inch steel-shaft length."
  - q: "Are the r7 CGB Max irons strong-lofted?"
    a: "Yes. The set runs about 2 degrees stronger than the standard r7 through the mid-irons, with a 30-degree 7-iron and a 44-degree pitching wedge, and it uses a compressed 5-iron to 3-iron gap of only 2 degrees each."
  - q: "Who were the r7 CGB Max irons designed for?"
    a: "They were TaylorMade's maximum-forgiveness iron, aimed at golfers who want the easiest possible launch. The head is oversize with toe and heel tungsten weights for very high MOI, and the whole club is built light to add clubhead speed."
