description: >
  The r7 CGB Max was the largest and most forgiving iron in TaylorMade's line, announced
  in October 2007 and at retail from 30 October 2007. It combines an oversize head with
  toe and heel tungsten weights for very high MOI, a thin high-strength steel face with
  Inverted Cone Technology, and a rearward centre of gravity to make the ball easy to
  launch. The SuperFast package pairs it with a light 90-gram steel shaft and a light
  grip. The 7-iron is 30 degrees and the stock range runs from a 3-iron to a 59-degree
  lob wedge. Specs below are the men's standard steel-shaft build.
