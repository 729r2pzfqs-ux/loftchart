faq:
  - q: "What is the loft of a TaylorMade M4 7-iron?"
    a: "The TaylorMade M4 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "What is RIBCOR in the M4 irons?"
    a: "RIBCOR is a pair of internal ribs running through the heel and toe of the head. They stiffen the perimeter so that more of the face's flexing happens in the centre, which TaylorMade used to tighten shot dispersion rather than to add outright ball speed."
  - q: "What is the pitching wedge loft on the M4 irons?"
    a: "The M4 pitching wedge is 43.5 degrees. The set continues with a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge, and starts at a 19-degree 4-iron."
  - q: "Are the M4 and M6 iron lofts the same?"
    a: "Almost. Both sets use a 19-degree 4-iron, a 28.5-degree 7-iron and a 43.5-degree pitching wedge. The M6 8-iron is 33 degrees like the M4, but TaylorMade changed the way it measured club length between the two models, so the M6's stated lengths look about half an inch longer."
