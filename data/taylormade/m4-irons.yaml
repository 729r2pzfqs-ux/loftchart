description: >
  The M4 was TaylorMade's mainstream game-improvement iron for 2018, replacing
  the 2017 M2. Its new feature was RIBCOR, a pair of internal ribs that run
  through the heel and toe to stiffen the perimeter and channel more of the
  impact energy into the middle of the face. A Speed Pocket in the sole,
  Inverted Cone Technology and a 360-degree undercut cavity carry over from the
  M-family distance irons. Lofts are strong for the class, with a 28.5-degree
  7-iron and a 43.5-degree pitching wedge. Specs below are the men's standard
  steel-shaft build.
