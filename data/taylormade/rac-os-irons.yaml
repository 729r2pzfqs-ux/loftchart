faq:
  - q: "What is the loft of a TaylorMade rac OS 7-iron?"
    a: "The TaylorMade rac OS 7-iron has a loft of 33 degrees, with a 63-degree lie and a 36.75-inch steel-shaft length."
  - q: "What does rac stand for on TaylorMade irons?"
    a: "rac stands for relative amplitude coefficient. It is TaylorMade's method of managing impact vibration by directing energy into shaped Feel Pockets in the back of the clubhead rather than letting it spread in all directions."
  - q: "What is the pitching wedge loft on the rac OS?"
    a: "The rac OS pitching wedge is 45 degrees, with a 50-degree approach wedge, 55-degree sand wedge and 60-degree lob wedge available in the set."
