description: >
  The rac OS was the oversize, most forgiving member of TaylorMade's rac iron family.
  The rac name stands for relative amplitude coefficient, a vibration-management approach
  that routes impact energy into shaped Feel Pockets in the back of the head. A repositioned
  Tuned Performance Cartridge saves 32 grams that is moved to the perimeter, and the head
  pairs an ultra-thin face and deep cavity with generous offset. The 7-iron is 33 degrees
  and the stock range runs from a 2-iron to a 60-degree lob wedge. Specs below are the
  men's standard steel-shaft build.
