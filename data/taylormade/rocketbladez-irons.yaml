faq:
  - q: "What is the loft of a TaylorMade RocketBladez 7-iron?"
    a: "The standard TaylorMade RocketBladez 7-iron has a loft of 30.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "What is the Speed Pocket on the RocketBladez irons?"
    a: "The Speed Pocket is a slot cut into the sole just behind the face on the long and mid irons. It lets the lower part of the face flex more at impact, which raises ball speed and launch on shots struck low on the face, where game-improvement players most often miss."
  - q: "How do RocketBladez lofts compare to RocketBladez Tour?"
    a: "The standard RocketBladez is considerably stronger. Its 7-iron is 30.5 degrees against roughly 33.75 degrees for the RocketBladez Tour, and its pitching wedge is 45 degrees against about 47 degrees."
