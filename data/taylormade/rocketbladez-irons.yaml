description: >
  The RocketBladez was the first TaylorMade iron to carry the Speed Pocket, a slot
  cut into the sole behind the face of the long and mid irons that lets the lower
  face flex more and raises ball speed on shots struck low on the face. It was
  announced in late 2012 and sold as the 2013 game-improvement model, alongside a
  more compact RocketBladez Tour version with weaker lofts. The standard set is
  strongly lofted, with a 30.5-degree 7-iron. Specs below are the men's standard
  steel-shaft build.
