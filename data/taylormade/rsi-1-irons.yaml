faq:
  - q: "What is the loft of a TaylorMade RSi 1 7-iron?"
    a: "The TaylorMade RSi 1 7-iron has a loft of 30.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "What is Face Slot Technology on the RSi irons?"
    a: "Face Slots are two slots cut near the heel and toe of the clubface in the 3- through 8-irons. They let the face flex more uniformly across its width, which protects ball speed on strikes toward the heel and toe. The 3- through 7-irons additionally have the ThruSlot Speed Pocket in the sole for low-face strikes."
  - q: "What is the difference between the RSi 1 and the RSi 2?"
    a: "The RSi 1 is the larger game-improvement model with stronger lofts; its 7-iron is 30.5 degrees against 31 degrees for the RSi 2, and its pitching wedge is 44 degrees against 45. The RSi 2 is a more compact multi-material head with a forged face in the short irons and tungsten weighting in the long irons."
