description: >
  The RSi 1 was TaylorMade's mainstream game-improvement iron for 2015 and the model
  that introduced Face Slot Technology, a pair of slots near the heel and toe of the
  face in the 3- through 8-irons intended to keep ball speed up on off-centre strikes.
  The 3- through 7-irons also carry the ThruSlot Speed Pocket in the sole, and the
  head uses a deep undercut cavity with Inverted Cone Technology. Lofts are strong,
  with a 30.5-degree 7-iron and a 44-degree pitching wedge, and the stock range runs
  3-iron through a 60-degree lob wedge. Specs below are the men's standard steel-shaft
  build with the True Temper Reax 90 shaft.
