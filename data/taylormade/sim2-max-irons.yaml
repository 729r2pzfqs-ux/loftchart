faq:
  - q: "What is the loft of a TaylorMade SIM2 Max 7-iron?"
    a: "The TaylorMade SIM2 Max 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37.25-inch steel-shaft length."
  - q: "Did the lofts change between the SIM Max and SIM2 Max irons?"
    a: "No. The two sets share the same loft, lie, length and offset through the whole set, from a 19-degree 4-iron to a 59-degree lob wedge. The changes are structural, chiefly the move from the Speed Bridge to the Cap Back design."
  - q: "What is the Cap Back design on the SIM2 Max irons?"
    a: "The Cap Back is a stiffening structure set back from the topline rather than bridging it, as the earlier Speed Bridge did. Moving it back allowed a larger, thinner face and a bigger ECHO Damping insert while keeping the sound and feel under control."
  - q: "What is the pitching wedge loft on the SIM2 Max irons?"
    a: "The SIM2 Max pitching wedge is 43.5 degrees, with a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge available in the set."
