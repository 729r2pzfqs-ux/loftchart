description: >
  The SIM2 Max replaced the SIM Max in 2021 and swapped the Speed Bridge for the
  Cap Back design, a stiffening structure moved back and away from the topline
  so the face and the ECHO Damping System could be enlarged. The face is thinner
  than the SIM Max and uses progressive Inverted Cone Technology, with a
  Thru-Slot Speed Pocket in the sole of the longer irons. Lofts and lengths
  carry over unchanged from the SIM Max, with a 28.5-degree 7-iron, a
  43.5-degree pitching wedge and TaylorMade's progressive length set measured on
  the ground plane. Specs below are the men's standard steel-shaft build.
