faq:
  - q: "What is the loft of a TaylorMade RocketBladez 2.0 7-iron?"
    a: "The TaylorMade RocketBladez 2.0 7-iron is 30.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length. That is the same loft as the original RocketBladez 7-iron."
  - q: "What is the difference between the RocketBladez and the RocketBladez 2.0?"
    a: "The lofts are the same. The 2.0 is a 2014 follow-on sold mainly through off-channel retail, starting at the 4-iron rather than the 3-iron, with a revised Inverted Cone face and progressive offset. Both use the Speed Pocket slot in the sole of the longer irons."
  - q: "Which RocketBladez 2.0 irons have the Speed Pocket?"
    a: "The Speed Pocket runs through the long and mid irons, the 4 through 7. The short irons and wedges do not have it, because the benefit of extra low-face ball speed matters far less at those lofts."
  - q: "What clubs came in a RocketBladez 2.0 set?"
    a: "The stock retail set was 4-PW. TaylorMade also catalogued a 50-degree approach wedge and a 55-degree sand wedge to extend it, and sold a hybrid combo version that swapped the 4- and 5-irons for rescues."
