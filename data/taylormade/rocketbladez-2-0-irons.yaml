sources:
  - "QSponge club spec database, TaylorMade RocketBladez 2.0 irons table, which supplied every loft, lie, length and offset value here. This is the only spec table for the model that could be retrieved."
  - "TaylorMade official 2014 RocketBladez HL Irons spec sheet, taylormadegolf.com/on/demandware.static/-/Sites-TMaG-Library/default/v1463473265710/docs/productspecs/2014/Rocketbladez-HL-Irons.pdf — used as a cross-check. Its 4-iron-through-sand-wedge offset column (6.0, 5.7, 4.8, 4.2, 3.4, 2.7, 2.0, 1.4, 1.0 mm) matches the QSponge RocketBladez 2.0 offsets exactly, which is why offset is recorded here."
  - "2nd Swing Golf and GolfEtail RocketBladez 2.0 listings, which confirm the model existed as a 2014 4-PW set with Speed Pocket and progressive offset in steel and graphite, but publish no numeric spec table."
  - "NOTE: no TaylorMade spec sheet for the RocketBladez 2.0 exists in the archived taylormadegolf.com productspecs/2014 directory, which does hold sheets for the RocketBladez HL, SLDR and Tour Preferred irons. Confidence is low. The recorded lengths run in an even half-inch progression (38.5, 38.0, 37.5, 37.0) rather than TaylorMade's usual 38.875/38.25/37.625/37.0 ladder of the period; that difference comes from the single source and could not be independently confirmed."
  - "Bounce and swing weight are omitted because no retrieved source gave them. The shaft names come from the retailer listings above and are recorded without weights or a full flex range because none was published."
