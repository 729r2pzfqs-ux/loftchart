description: >
  The RocketBladez 2.0 was the 2014 follow-on to the RocketBladez, sold largely
  through big-box and off-channel retail rather than as a headline launch. It keeps
  the Speed Pocket sole slot in the long and mid irons, adds a revised Inverted Cone
  face for a wider effective hitting area, and uses progressive offset that shrinks
  through the set. Lofts are unchanged from the RocketBladez, at 30.5 degrees in the
  7-iron and 45 degrees in the pitching wedge, and the set starts at the 4-iron
  rather than the 3. TaylorMade never published a spec sheet for it, so the numbers
  below carry lower confidence than the rest of the family — see sources. Specs are
  the men's standard steel-shaft build.
