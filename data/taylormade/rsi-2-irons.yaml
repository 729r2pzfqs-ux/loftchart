description: >
  The RSi 2 sat above the RSi 1 in TaylorMade's 2015 iron range, offering the same
  Face Slot and ThruSlot Speed Pocket technologies in a more compact multi-material
  head. The long irons are cast with tungsten weighting low in the toe to lower the
  centre of gravity, while the short irons use a forged carbon steel face with milled
  grooves for feel and control. Lofts are about half a degree to a degree weaker than
  the RSi 1, with a 31-degree 7-iron and a 45-degree pitching wedge, and the published
  range runs from a 2-iron to a 55-degree sand wedge. Specs below are the men's
  standard steel-shaft build with the KBS Tour 105 shaft.
