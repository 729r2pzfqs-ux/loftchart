faq:
  - q: "What is the loft of a TaylorMade RSi 2 7-iron?"
    a: "The TaylorMade RSi 2 7-iron has a loft of 31 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "Are the TaylorMade RSi 2 irons forged?"
    a: "Partly. The RSi 2 uses progressive multi-material construction: the long irons are cast with tungsten weighting low in the toe, while the short irons have a forged carbon steel face with milled grooves. It is not a fully forged iron."
  - q: "How do the RSi 2 lofts compare to the RSi 1?"
    a: "The RSi 2 is marginally weaker. Its 7-iron is 31 degrees against 30.5 for the RSi 1 and its pitching wedge is 45 degrees against 44. The RSi 2 also uses a shorter length ladder, with a 36.75-inch 7-iron versus 37 inches."
