faq:
  - q: "What is the loft of a TaylorMade Stealth 7-iron?"
    a: "The TaylorMade Stealth 7-iron has a loft of 28 degrees, with a 63-degree lie and a 37.25-inch steel-shaft length."
  - q: "Are the Stealth irons stronger lofted than the SIM2 Max?"
    a: "Slightly. The 4-iron goes from 19 to 18.5 degrees, the 6-iron from 25 to 24, the 7-iron from 28.5 to 28 and the pitching wedge from 43.5 to 43. The wedges are unchanged at 49, 54 and 59 degrees."
  - q: "What is toe wrap construction in the Stealth irons?"
    a: "Toe wrap construction removes weight from the toe section of the head and redistributes it low and around the perimeter. TaylorMade used it alongside the Cap Back design to raise forgiveness without widening the sole."
  - q: "What is the pitching wedge loft on the Stealth irons?"
    a: "The Stealth pitching wedge is 43 degrees. The set also offers a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge, and starts at an 18.5-degree 4-iron."
