description: >
  The Stealth iron replaced the SIM2 Max in 2022 and extended the Cap Back
  design with a toe wrap construction that moves mass out of the toe and into
  the perimeter. It uses a 450 stainless steel face with progressive Inverted
  Cone Technology, a Thru-Slot Speed Pocket in the sole and the ECHO Damping
  System behind the face. Lofts are half a degree to one degree stronger than
  the SIM2 Max through the middle of the set: the 7-iron is 28 degrees and the
  pitching wedge 43 degrees. Specs below are the men's standard steel-shaft
  build, using TaylorMade's progressive lengths measured on the ground plane.
