description: >
  The Tour Preferred MB was the muscleback blade in TaylorMade's 2014 Tour Preferred
  range, sitting below the MC cavity and the CB in forgiveness. It is precisely forged
  from soft 1025 carbon steel, with a thin topline that runs seamlessly into the hosel,
  milled grooves and a precision-shaped sole with reduced camber requested by tour
  players. The set is a traditional 3-iron through pitching wedge with a 35-degree
  7-iron and a 47-degree pitching wedge, roughly 2 to 3 degrees weaker than the
  companion TP CB. Specs below are the men's standard steel-shaft build.
