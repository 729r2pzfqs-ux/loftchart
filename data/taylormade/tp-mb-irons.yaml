faq:
  - q: "What is the loft of a TaylorMade TP MB 7-iron?"
    a: "The TaylorMade TP MB 7-iron has a loft of 35 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "Are the TaylorMade TP MB irons forged?"
    a: "Yes. The 2014 Tour Preferred MB is a one-piece muscleback forged from soft 1025 carbon steel, with grooves milled after forging and a hand-polished satin nickel-chrome finish."
  - q: "What is the pitching wedge loft on the TP MB?"
    a: "The TP MB pitching wedge is 47 degrees, which is traditional for a blade and about 2 to 5 degrees weaker than a game-improvement pitching wedge of the same era."
