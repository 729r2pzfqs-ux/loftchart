description: >
  The r7 iron was TaylorMade's mainstream game-improvement model for 2006, replacing the
  rac OS at the centre of the range. It uses a deep undercut cavity and perimeter weighting
  to place the centre of gravity low and back, with a progressively lighter head build and
  a T-Step 90 steel shaft. The 7-iron is 32 degrees and the stock range runs from a 2-iron
  to a 60-degree lob wedge. A separate draw-biased r7 Draw model was sold alongside it.
  Specs below are the men's standard steel-shaft build.
