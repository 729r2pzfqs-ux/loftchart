faq:
  - q: "What is the loft of a TaylorMade r7 7-iron?"
    a: "The TaylorMade r7 7-iron has a loft of 32 degrees, with a 63-degree lie and a 36.75-inch steel-shaft length."
  - q: "What year did the TaylorMade r7 irons come out?"
    a: "The r7 irons arrived in 2006. TaylorMade's own sell sheet lists the right-handed set as available in September 2006 and the left-handed set in October 2006."
  - q: "What is the difference between the r7 and the r7 Draw?"
    a: "They share the same lofts, lies and lengths, but the r7 Draw moves weight from the toe toward the heel and uses maximum offset to help the face close through impact. The standard r7 is the neutral-bias version with less offset."
