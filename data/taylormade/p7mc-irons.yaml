faq:
  - q: "What is the loft of a TaylorMade P7MC 7-iron?"
    a: "The TaylorMade P7MC 7-iron has a loft of 34 degrees, with a 62.5-degree lie and a 37.00-inch steel-shaft length."
  - q: "What is the difference between the P7MC and the P7MB?"
    a: "The P7MC is a small cavity back and the P7MB is a full muscleback. They share lie angles and lengths, but the P7MC is one degree stronger from 3-iron through 9-iron (34 degrees at the 7-iron against 35) and carries about 0.5 to 1mm more offset per club."
  - q: "What is the pitching wedge loft on the P7MC?"
    a: "The P7MC pitching wedge is 47 degrees. The set is offered 3-iron through pitching wedge, with no stock approach or gap wedge."
