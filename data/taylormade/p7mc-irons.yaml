description: >
  The P7MC is TaylorMade's tour cavity back, forged from 1025 carbon steel using
  a compact grain forging process and finished with milled faces and grooves. It
  shares its head shape and length progression with the P7MB muscleback but adds
  a small perimeter-weighted cavity and about 1mm more offset per club for a
  slight gain in forgiveness. Lofts are one degree stronger than the P7MB through
  the 9-iron, with a 34-degree 7-iron and a 47-degree pitching wedge, and the set
  runs 3-iron through pitching wedge with no stock gap wedge. Specs below are the
  men's standard right-handed steel build.
