faq:
  - q: "What is the loft of a TaylorMade RocketBallz 7-iron?"
    a: "The TaylorMade RocketBallz (RBZ) 7-iron has a loft of 30.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "Are the RocketBallz and RocketBladez irons lofted the same?"
    a: "Yes. TaylorMade carried the RocketBallz loft ladder straight over to the RocketBladez, so both sets run 17.5 degrees in the 3-iron, 30.5 in the 7-iron and 45 in the pitching wedge. The difference between them is the Speed Pocket in the RocketBladez sole, not the lofts."
  - q: "How do RocketBallz lofts compare to the Burner 2.0 they replaced?"
    a: "The RocketBallz is about half a degree to a degree stronger through the long and mid irons — 17.5 degrees against 19 in the 3-iron, 20 against 21 in the 4-iron and 30.5 against 31 in the 7-iron. From the 8-iron down the two sets are identical, both finishing at a 45-degree pitching wedge."
  - q: "What clubs came in the stock RocketBallz iron set?"
    a: "TaylorMade specified the RocketBallz from the 3-iron through the lob wedge: 3 to 9, pitching wedge, approach wedge at 50 degrees, sand wedge at 55 and lob wedge at 60. Retail sets were most often built 4-PW or 4-AW."
