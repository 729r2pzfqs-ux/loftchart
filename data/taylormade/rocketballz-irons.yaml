description: >
  The RocketBallz iron, usually sold as the RBZ, was TaylorMade's mainstream
  game-improvement iron for 2012 and the direct replacement for the Burner 2.0. Each
  head was individually engineered, with a two-piece metalwood-inspired construction
  in the 3, 4 and 5 irons to lower the centre of gravity and raise COR, an ultra-thin
  face taken to the USGA COR limit, and a "Toe-Bar" that controls how the face flexes
  so shots start straighter. The wedges use TaylorMade's ATV sole. Lofts are strong
  for the era at 30.5 degrees in the 7-iron, the same set of lofts TaylorMade then
  carried over to the RocketBladez. The RocketBladez was announced in late 2012,
  which ends the RocketBallz run. Specs below are the men's standard steel-shaft
  build.
