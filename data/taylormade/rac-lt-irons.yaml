faq:
  - q: "What is the loft of a TaylorMade rac LT 7-iron?"
    a: "The TaylorMade rac LT 7-iron has a loft of 35 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the difference between the rac LT and the rac OS?"
    a: "The rac LT is the players cavityback: a smaller head with a thin topline, minimal offset and traditional lofts such as a 35-degree 7-iron. The rac OS is the oversize game-improvement model with generous offset and lofts two degrees stronger, at 33 degrees in the 7-iron."
  - q: "What is the pitching wedge loft on the rac LT?"
    a: "The rac LT pitching wedge is 47 degrees, with a 51-degree approach wedge and a 55-degree sand wedge available. There was no stock lob wedge in the set."
