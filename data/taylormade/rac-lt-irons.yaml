description: >
  The rac LT was the players cavityback in TaylorMade's rac range, sitting between the
  rac MB blade and the oversize rac OS. It uses a thin topline, minimal offset and a
  tour-cambered sole, with a 16-gram Tuned Performance Cartridge relocating weight to
  the perimeter and rac Feel Pockets managing impact vibration. Lofts are traditional
  for a players iron, with a 35-degree 7-iron and a 47-degree pitching wedge, and the
  stock range runs from a 2-iron to a sand wedge. Specs below are the men's standard
  steel-shaft build.
