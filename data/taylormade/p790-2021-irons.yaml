description: >
  The 2021 P790 is the third generation of TaylorMade's hollow-body forged
  distance iron, replacing the 2019 model and using a thinner forged face
  with the lighter SpeedFoam Air filling and a repositioned tungsten weight.
  Lofts carried over unchanged from the 2017 original, with a 30.5-degree
  7-iron and a 45-degree pitching wedge, but the set is built a quarter inch
  longer through the 3-iron to 9-iron and with less long-iron offset, so a
  3-iron measures 39.00 inches with 3.5mm of offset against 38.75 inches and
  3.9mm on the first generation. Bounce is progressive, from 0 degrees in the
  3-iron to 11.5 degrees in the approach wedge. Numbers below are the men's
  standard right-handed steel build.
