faq:
  - q: "What is the loft of a TaylorMade P790 (2021) 7-iron?"
    a: "The TaylorMade P790 (2021) 7-iron has a loft of 30.5 degrees, with a 62.5-degree lie and a 37.00-inch steel-shaft length."
  - q: "Are the 2021 P790 lofts different from the 2017 P790?"
    a: "No. Both generations use 19, 21, 23.5, 26.5, 30.5, 35, 40, 45 and 50 degrees from 3-iron to approach wedge. The 2021 set is a quarter inch longer in the 3-iron through 9-iron and carries slightly less offset in the long irons, which is where the distance difference comes from."
  - q: "What is the pitching wedge loft on the 2021 P790?"
    a: "The 2021 P790 pitching wedge is 45 degrees, with a 50-degree approach wedge to complete the published 3-iron through approach wedge range."
