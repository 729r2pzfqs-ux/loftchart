description: >
  The 2016 M2 was TaylorMade's distance-oriented game-improvement iron. Three
  weight-saving features, an L-shaped toe, a 360-degree undercut cavity and a
  thick-thin fluted hosel, let the designers push the centre of gravity very low,
  which is what allowed them to use unusually strong lofts without losing peak
  height. A large unsupported thin face with Inverted Cone Technology and a Speed
  Pocket in the sole add ball speed. The 7-iron is 28.5 degrees, roughly a
  traditional 5-iron loft. Specs below are the men's standard steel-shaft build.
