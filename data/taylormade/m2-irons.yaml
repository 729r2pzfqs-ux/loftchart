faq:
  - q: "What is the loft of a TaylorMade M2 7-iron?"
    a: "The 2016 TaylorMade M2 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "Why are the 2016 M2 iron lofts so strong?"
    a: "TaylorMade used an L-shaped toe, a 360-degree undercut cavity and a thick-thin fluted hosel to move the centre of gravity extremely low in the head. A lower centre of gravity launches the ball higher for a given loft, so the lofts could be strengthened for distance without the ball flight getting too flat."
  - q: "What is the pitching wedge loft on the 2016 M2?"
    a: "The 2016 M2 pitching wedge is 43.5 degrees. The set also offers a 49-degree approach wedge, a 55-degree sand wedge and a 60-degree lob wedge."
  - q: "Does the 2016 M2 iron set include a 3-iron?"
    a: "No. The stock 2016 M2 set runs from the 4-iron, which is 19 degrees, down through the wedges."
