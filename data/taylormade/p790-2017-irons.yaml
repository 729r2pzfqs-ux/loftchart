faq:
  - q: "What is the loft of a TaylorMade P790 (2017) 7-iron?"
    a: "The TaylorMade P790 (2017) 7-iron has a loft of 30.5 degrees, with a 62.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the 2017 P790 specs differ from the 2021 P790?"
    a: "The lofts are identical across the two generations, including the 30.5-degree 7-iron and 45-degree pitching wedge. What changed is length and offset: the 2021 set is 0.25 inches longer in the 3-iron through 9-iron (37.00-inch 7-iron versus 36.75 inches) and drops long-iron offset from 3.9mm to 3.5mm in the 3-iron."
  - q: "What is the pitching wedge loft on the 2017 P790?"
    a: "The 2017 P790 pitching wedge is 45 degrees, and the matching approach wedge is 50 degrees. The published set runs 3-iron through approach wedge."
