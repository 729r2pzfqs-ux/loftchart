description: >
  The 2017 P790 was the first generation of TaylorMade's hollow-body forged
  distance iron, built around a 1.75mm wrapped forged 4140 face, an injected
  SpeedFoam filling and a high-density tungsten weight in the toe. It sat
  between the P770 players iron and the game-improvement M-series in
  TaylorMade's 2017 line, using stronger lofts than a traditional players
  iron: the 7-iron is 30.5 degrees and the pitching wedge 45 degrees. The
  first-generation set is shorter than the 2021 model, with a 36.75-inch
  7-iron and 38.75-inch 3-iron, and it carries slightly more offset through
  the long irons. All numbers below are the men's standard right-handed steel
  build.
