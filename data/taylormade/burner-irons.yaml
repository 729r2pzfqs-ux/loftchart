faq:
  - q: "What is the loft of a TaylorMade Burner 7-iron?"
    a: "The TaylorMade Burner 7-iron has a loft of 31 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "What is the difference between the Burner and the Burner Plus?"
    a: "The Burner is the smaller, more workable of the pair, with a 31-degree 7-iron and flatter lies. The Burner Plus uses a larger head and wider sole for higher launch and more forgiveness, and its lofts are a degree weaker through the mid-irons at 32 degrees in the 7-iron."
  - q: "What is the pitching wedge loft on the TaylorMade Burner?"
    a: "The Burner pitching wedge is 45 degrees, with a 50-degree approach wedge, 55-degree sand wedge and 60-degree lob wedge available in the set."
