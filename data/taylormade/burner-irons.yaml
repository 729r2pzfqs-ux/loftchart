description: >
  The Burner iron was TaylorMade's mainstream distance iron of the SuperFast era, built
  around the idea of eight individually engineered heads rather than one scaled blueprint.
  Long irons are low-profile and forgiving, mid-irons are tuned for distance control and
  short irons for response, with a thin face, Inverted Cone Technology and a multi-functional
  sole running through the set. The SuperFast package uses a light 85-gram steel shaft and a
  47-gram grip. Lofts are strong for the period, with a 31-degree 7-iron and a 45-degree
  pitching wedge. Specs below are the men's standard steel-shaft build.
