faq:
  - q: "What is the loft of a TaylorMade Stealth HD 7-iron?"
    a: "The TaylorMade Stealth HD 7-iron has a loft of 30 degrees, with a 63.5-degree lie and a 37.25-inch steel-shaft length."
  - q: "How is the Stealth HD different from the standard Stealth iron?"
    a: "Stealth HD is a draw-biased, higher-launching companion model rather than a replacement. Its lofts are about two degrees weaker (30 degrees at the 7-iron against 28), its lie angles are half a degree to one degree more upright, and its bounce is roughly twice as high across the set."
  - q: "Does the Stealth HD iron set include a 4-iron?"
    a: "No. The Stealth HD set starts at the 5-iron, which is 23.5 degrees, and runs through to a 59-degree lob wedge. TaylorMade expected buyers to fill the long-iron gap with hybrids or fairway woods."
  - q: "What is the pitching wedge loft on the Stealth HD?"
    a: "The Stealth HD pitching wedge is 44.5 degrees, a degree and a half weaker than the standard Stealth. It is followed by a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge."
