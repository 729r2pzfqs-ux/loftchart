description: >
  Stealth HD was a line extension alongside the 2022 Stealth iron rather than a
  replacement for it, aimed at slower swing speeds and at players who miss to
  the right. It uses the same Cap Back design and ECHO Damping System but adds a
  draw bias, a very low centre of gravity that shifts progressively higher
  through the set, and much wider soles. Bounce is far higher than on the
  standard Stealth, from 11 degrees in the 5-iron to 16 degrees in the sand and
  lob wedges, and the lie angles are half a degree to one degree more upright.
  The 7-iron is 30 degrees, two degrees weaker than the standard Stealth. Specs
  below are the men's standard steel-shaft build.
