faq:
  - q: "What is the loft of a TaylorMade P770 7-iron?"
    a: "The TaylorMade P770 7-iron has a loft of 33 degrees, with a 62.5-degree lie and a 37.00-inch steel-shaft length."
  - q: "How do P770 lofts compare with the P790?"
    a: "The P770 is 2.5 degrees weaker than the P790 through most of the set: a 33-degree 7-iron against 30.5 degrees, and a 46-degree pitching wedge against 45. Lengths and lie angles are the same across the two models."
  - q: "What is the pitching wedge loft on the P770?"
    a: "The P770 pitching wedge is 46 degrees, with a 51-degree approach wedge available to complete the 3-iron through approach wedge range."
