description: >
  The 2020 P770 is a compact hollow-body forged players iron that sits between
  the blade-like P7MC and the larger P790 in TaylorMade's P-Series. It uses the
  same SpeedFoam-filled hollow construction and forged face as the P790 but in a
  smaller head with a thinner topline, less offset and a narrower sole. Lofts sit
  roughly two to three degrees weaker than the P790 through the middle of the
  set, with a 33-degree 7-iron and a 46-degree pitching wedge, and the published
  range runs 3-iron through approach wedge. Specs below are the men's standard
  right-handed steel build.
