description: >
  The 300 Forged was TaylorMade's tour iron for 2001, a compact carbon-steel head
  double-struck in a forging process the company called coining, with a thin topline
  and only a slight amount of offset. The centre of gravity moves progressively through
  the set and an impact pad sits behind the sweet spot for feel. Lofts are traditional
  rather than strong, with a 35-degree 7-iron and a 48-degree pitching wedge, and the
  documented range runs from a 1-iron to a pitching wedge. Specs below are the men's
  standard steel-shaft build.
