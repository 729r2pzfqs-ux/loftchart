faq:
  - q: "What is the loft of a TaylorMade 300 Forged 7-iron?"
    a: "The TaylorMade 300 Forged 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What year did the TaylorMade 300 Forged irons come out?"
    a: "The 300 Forged irons were introduced in 2001 and were sold until the rac line took over the TaylorMade iron range in 2003."
  - q: "What is the pitching wedge loft on the TaylorMade 300 Forged?"
    a: "The 300 Forged pitching wedge is 48 degrees. The set uses traditional loft gaps of 3 to 4 degrees, so it runs roughly 4 to 6 degrees weaker than a modern game-improvement set."
