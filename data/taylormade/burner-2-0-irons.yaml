description: >
  The Burner 2.0 was TaylorMade's mainstream game-improvement iron for 2010-2011,
  replacing the 2009 Burner. Each head was individually engineered rather than
  built from a single blueprint: thin, high-COR faces with Inverted Cone Technology
  in the long irons for ball speed, and progressively higher-CG short irons for
  control. TaylorMade positioned it as a 0-30 handicap iron. Lofts are notably
  strong for the era, with a 31-degree 7-iron and a 45-degree pitching wedge.
  Specs below are the men's standard steel-shaft build.
