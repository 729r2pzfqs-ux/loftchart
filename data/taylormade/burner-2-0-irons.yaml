faq:
  - q: "What is the loft of a TaylorMade Burner 2.0 7-iron?"
    a: "The TaylorMade Burner 2.0 7-iron has a loft of 31 degrees, with a 63-degree lie and a 37-inch steel-shaft length."
  - q: "Are TaylorMade Burner 2.0 irons strong-lofted?"
    a: "Yes. The 2010 Burner 2.0 set runs about 3 to 4 degrees stronger than a traditional iron set, with a 31-degree 7-iron and a 45-degree pitching wedge, which is why they carry a full club further than older irons of the same number."
  - q: "What is the pitching wedge loft on the Burner 2.0?"
    a: "The Burner 2.0 pitching wedge is 45 degrees. The matching approach wedge is 50 degrees, sand wedge 55 degrees and lob wedge 60 degrees."
