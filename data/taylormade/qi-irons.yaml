faq:
  - q: "What is the loft of a TaylorMade Qi 7-iron?"
    a: "The TaylorMade Qi 7-iron has a loft of 28 degrees, with a 63-degree lie and a 37.25-inch steel-shaft length."
  - q: "Is the 2024 TaylorMade iron called Qi or Qi10?"
    a: "The iron is called Qi. Qi10 is the name TaylorMade used for the 2024 drivers, fairway woods and rescues; the matching irons dropped the number and were sold simply as Qi, with Qi HL as the higher-launching companion set."
  - q: "Do the Qi irons have the same lofts as the Stealth irons?"
    a: "Yes. The Qi set matches the Stealth through the whole bag, from an 18.5-degree 4-iron and a 28-degree 7-iron to a 43-degree pitching wedge and a 59-degree lob wedge, and the lengths are identical too."
  - q: "What is the pitching wedge loft on the Qi irons?"
    a: "The Qi pitching wedge is 43 degrees. The set also offers a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge."
