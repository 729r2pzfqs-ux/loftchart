description: >
  The Qi iron replaced the Stealth as TaylorMade's mainstream game-improvement
  model for 2024, and is the iron counterpart to the Qi10 metalwoods rather than
  a set called Qi10. It carries over the Cap Back design and ECHO Damping System
  and adds flighted centres of gravity, positioned low in the long irons and
  progressively higher through the short irons, along with a 450 stainless steel
  face TaylorMade says enlarges the effective hitting area by about 14 per cent
  over the Stealth. Lofts and lengths are identical to the Stealth, with a
  28-degree 7-iron and a 43-degree pitching wedge. TaylorMade did not publish
  offset or bounce figures for the Qi set, so those are omitted here. Specs
  below are the men's standard steel-shaft build.
