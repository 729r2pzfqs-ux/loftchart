description: >
  The second-generation M2 iron was announced on 12 December 2016 and sold as the
  2017 model; the year recorded here is the announcement year, following this
  database's convention. It keeps the distance brief of the 2016 M2 but adds Face
  Slots, cut near the heel and toe, so that ball speed holds up on strikes away from
  the centre as well as on the low strikes the Speed Pocket already covered. A
  six-sided fluted hosel and a 1 mm top line move more weight low, the face is 1.5 mm
  thin, and a Geocoustic fin badge handles sound. Lofts through the irons are
  unchanged from the 2016 M2 at 28.5 degrees in the 7-iron, but the lie angles in the
  4- and 5-irons are half a degree more upright and the sand and lob wedges were
  weakened by a degree to 54 and 59. Specs below are the men's standard steel-shaft
  build.
