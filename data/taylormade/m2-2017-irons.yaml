faq:
  - q: "What is the loft of a TaylorMade 2017 M2 7-iron?"
    a: "The 2017 TaylorMade M2 7-iron has a loft of 28.5 degrees, with a 63-degree lie and a 37-inch steel-shaft length. That is the same loft as the 2016 M2 7-iron."
  - q: "What changed between the 2016 M2 irons and the 2017 M2 irons?"
    a: "The lofts through the irons did not change. The 2017 model adds Face Slots near the heel and toe for forgiveness on strikes away from centre, a six-sided fluted hosel and a 1 mm top line to push weight lower, and a Geocoustic fin badge for sound. The 4- and 5-iron lie angles are half a degree more upright, and the sand and lob wedges are weakened a degree to 54 and 59."
  - q: "What are Face Slots on the 2017 M2 irons?"
    a: "Face Slots are narrow slots cut into the face near the heel and the toe. They let those outer parts of the face flex more at impact, which recovers ball speed on heel and toe misses. They complement the Speed Pocket in the sole, which does the same job for strikes low on the face."
  - q: "What is the pitching wedge loft on the 2017 M2?"
    a: "The 2017 M2 pitching wedge is 43.5 degrees. The set continues with a 49-degree approach wedge, a 54-degree sand wedge and a 59-degree lob wedge."
  - q: "Does the 2017 M2 iron set include a 3-iron?"
    a: "No. The stock set runs from the 4-iron at 19 degrees through the wedges, the same composition as the 2016 M2."
