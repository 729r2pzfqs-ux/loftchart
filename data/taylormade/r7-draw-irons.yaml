description: >
  The r7 Draw iron was TaylorMade's draw-biased game-improvement model, launched in
  November 2006 and sold through the 2007 season. Weight was removed from the toe
  side of the cavity and repositioned to move the centre of gravity back and toward
  the heel, encouraging faster face rotation through impact. It pairs maximum offset,
  a wide cambered sole and an ultra-deep cavity with an aluminium-and-bonding-compound
  dampening web for feel. Specs below are the men's standard steel-shaft build.
