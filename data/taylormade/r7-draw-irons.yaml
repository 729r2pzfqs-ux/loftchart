faq:
  - q: "What is the loft of a TaylorMade r7 Draw 7-iron?"
    a: "The TaylorMade r7 Draw 7-iron has a loft of 32 degrees, with a 63-degree lie and a 36.75-inch steel-shaft length."
  - q: "What made the r7 Draw irons draw-biased?"
    a: "TaylorMade removed weight from the toe side of the cavity and repositioned it so the centre of gravity sat further back and closer to the heel. Combined with maximum offset, this helps the clubface rotate closed through impact to promote a draw or a straighter shot."
  - q: "What is the pitching wedge loft on the r7 Draw?"
    a: "The r7 Draw pitching wedge is 44 degrees, with a 49-degree approach wedge, 54-degree sand wedge and 59-degree lob wedge available in the set."
