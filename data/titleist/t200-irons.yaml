faq:
  - q: "What is the loft of a Titleist T200 7-iron?"
    a: "The 2019 Titleist T200 7-iron is 30 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How do the 2019 and 2023 Titleist T200 differ?"
    a: "The 2023 T200 is half a degree weaker in the middle irons, with a 30.5 degree 7-iron against 30, and its long-iron lies are half a degree more upright."
  - q: "What is the difference between the Titleist T100 and T200?"
    a: "The T200 is the distance model: its 7-iron is 30 degrees against the T100's 34, and it uses a hollow forged-face construction rather than a solid forged cavity back."
