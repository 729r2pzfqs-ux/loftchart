description: >
  The T200 is the players-distance iron of Titleist's original 2019 T-Series,
  replacing the 718 AP3. It uses a hollow-body construction with a forged
  SUP-10 face and Max Impact internal support that stiffens the centre of the
  face, plus high-density tungsten around the perimeter. Lofts sit four
  degrees stronger than the T100 through the middle of the set, giving a 30
  degree 7-iron and a 43 degree pitching wedge, while keeping a compact
  players-style head. Titleist did not publish offset figures for this
  generation.
