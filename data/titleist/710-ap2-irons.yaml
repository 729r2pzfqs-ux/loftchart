faq:
  - q: "What is the loft of a Titleist 710 AP2 7-iron?"
    a: "The Titleist 710 AP2 7-iron has a loft of 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How do the 710 AP2 lofts compare with the 714 AP2?"
    a: "From the 6-iron down the 714 AP2 is one degree stronger: the 710 AP2 7-iron is 35 degrees versus 34 degrees in the 714 AP2, and the pitching wedge is 47 degrees versus 46 degrees."
  - q: "What are the Titleist 710 AP2 irons made of?"
    a: "The body is forged 1025 carbon steel, with a laser-welded high-density tungsten-nickel weight box, an elastomer cushion behind the face and an aluminium cavity plate."
