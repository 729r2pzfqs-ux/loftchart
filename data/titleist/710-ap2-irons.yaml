description: >
  The 710 AP2 was the second generation of Titleist's multi-material AP2
  players iron, released for the 2010 season. A forged 1025 carbon steel body
  carries a laser-welded tungsten-nickel weight box in the heel and toe, an
  elastomer cushion behind the face and an aluminium cavity plate, which
  together push mass low and to the perimeter while keeping a compact head.
  Compared with the AP1 of the same generation it has a thinner topline,
  smaller blade, less offset and a reduced-bounce sole. Lofts are traditional,
  with a 35 degree 7-iron.
