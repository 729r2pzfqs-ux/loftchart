description: >
  The 690.MB is Titleist's 2002 forged muscleback and the blade half of the
  690 pair. Lofts are fully traditional, with a 36 degree 7-iron and a 48
  degree pitching wedge, and the set stops at the pitching wedge rather than
  carrying a gap wedge. Offset is minimal throughout, from .140 inches at the
  2-iron down to .075 inches at the pitching wedge, and lies are flat by
  modern standards at 61.5 degrees in the 7-iron. It remained a common tour
  build long after it left the retail range.
