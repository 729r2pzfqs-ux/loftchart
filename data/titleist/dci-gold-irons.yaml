description: >
  The DCI Gold is the gold-finished version of the early 1990s Dynamic Cavity
  Iron that established the DCI name, sold alongside the DCI Black. It is an
  investment cast perimeter-weighted cavity back with a thick topline and a
  large rear cavity, aimed at the everyday golfer. Two things date it: the lie
  angles, which are flat by any modern standard at 61.5 degrees for the 7-iron
  where later DCI sets use 63, and the offset, which starts at .380 inches at
  the 1-iron and is still .180 inches at the 7-iron. Lofts are traditional,
  with a 36 degree 7-iron, and Titleist catalogued a full 1-iron through lob
  wedge. Every club is built to D1 swing weight.
