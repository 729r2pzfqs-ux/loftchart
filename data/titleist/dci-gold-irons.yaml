faq:
  - q: "What is the loft of a Titleist DCI Gold 7-iron?"
    a: "The Titleist DCI Gold 7-iron is 36 degrees, with a 61.5 degree lie and a 36.5 inch standard steel length."
  - q: "Why do Titleist DCI Gold irons look so flat compared with modern sets?"
    a: "Because they are. Titleist built the DCI Gold from a 56 degree lie at the 1-iron to 63 degrees at the wedges, roughly two degrees flatter through the set than the DCI 981 and 990 that followed."
  - q: "How much offset do the Titleist DCI Gold irons have?"
    a: "A great deal by current standards: .380 inches at the 1-iron, .180 inches at the 7-iron and .095 inches at the pitching wedge."
