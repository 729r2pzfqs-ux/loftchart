faq:
  - q: "What is the loft of a Titleist T150 7-iron?"
    a: "The Titleist T150 7-iron is 32 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Is the Titleist T150 the same as the T100S?"
    a: "They share a loft ladder: both run a 32 degree 7-iron and a 44 degree pitching wedge with identical lies and lengths. The T150 is the 2023 replacement and was renamed to fit the numbered T-Series convention."
  - q: "Where does the T150 sit in the Titleist range?"
    a: "Between the T100 and the T200. It is two degrees stronger than the T100 and roughly a degree and a half weaker than the T200 through the middle irons."
