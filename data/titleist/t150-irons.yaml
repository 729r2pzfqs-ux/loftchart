description: >
  The T150 is the 2023 iron that took over the slot the T100S had occupied,
  sitting between the T100 and the T200 in Titleist's players range. It
  carries the same loft ladder as the T100S it replaced, a 32 degree 7-iron
  and a 44 degree pitching wedge, on a forged 1025 carbon steel head with
  high-density tungsten weighting. The renaming aligned the line with the
  numbered T-Series convention rather than signalling a loft change, and lies
  and lengths match the T100 exactly.
