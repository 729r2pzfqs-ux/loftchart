description: >
  The 718 AP1 is the last AP1 before the line became the T-Series, and the
  game-improvement model of Titleist's 2018 range. Titleist used hollow-body
  construction in the long irons and an undercut cavity in the mid and short
  irons, with tungsten weighting tuned club by club to lower the centre of
  gravity. It is the strongest-lofted and most offset set in the 718 family:
  a 30 degree 7-iron against 34 on the 718 AP2, and 5.3mm of offset at the
  4-iron. The stock set ran a 4-iron through two gap wedges, badged W at 48
  degrees and W2 at 53 degrees. Titleist published 718 offsets in millimetres
  rather than inches.
