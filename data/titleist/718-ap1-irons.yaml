faq:
  - q: "What is the loft of a Titleist 718 AP1 7-iron?"
    a: "The Titleist 718 AP1 7-iron is 30 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How much stronger is the 718 AP1 than the 718 AP2?"
    a: "Four degrees through most of the set. The AP1 7-iron is 30 degrees against 34 on the AP2, and the AP1 pitching wedge is 43 degrees against 46."
  - q: "What wedges came with the Titleist 718 AP1?"
    a: "The stock set ran 4-iron to pitching wedge plus two gap wedges: a 48 degree W and a 53 degree W2, both at 35.5 inches."
