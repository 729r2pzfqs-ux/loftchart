faq:
  - q: "What is the loft of a Titleist 716 CB 7-iron?"
    a: "The Titleist 716 CB 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the difference between the Titleist 716 CB and 716 AP2?"
    a: "The CB is the more compact head with less offset, .102 inches at the 7-iron against .110 on the AP2, and it is one degree weaker through the middle of the set."
  - q: "Does the Titleist 716 CB come with a gap wedge?"
    a: "No. The 716 CB stock set ran 2-iron through a 47 degree pitching wedge; a gap wedge was not part of the set."
