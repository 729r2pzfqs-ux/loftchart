description: >
  The 716 CB is the compact forged cavity back that sits between the AP2 and
  the MB in Titleist's 2016 range. It is a smaller head with a thinner topline
  and less offset than the AP2, and it keeps traditional players lofts where
  the AP2 had moved stronger: the 7-iron is 35 degrees against 34, and the
  pitching wedge is 47 degrees against 46. High-density tungsten in the toe of
  the long irons lifts moment of inertia without widening the blade. The stock
  set ran 2-iron through pitching wedge with no gap wedge.
