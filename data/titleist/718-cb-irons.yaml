faq:
  - q: "What is the loft of a Titleist 718 CB 7-iron?"
    a: "The Titleist 718 CB 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Do the 716 CB and 718 CB have the same lofts?"
    a: "Yes. Both run 18 degrees at the 2-iron through 47 degrees at the pitching wedge, with a 35 degree 7-iron. The 718 CB is half a degree more upright at the 2-iron."
  - q: "How does the 718 CB differ from the 718 AP2?"
    a: "The CB is a smaller, less offset head and is one degree weaker through the middle of the set: a 35 degree 7-iron against 34, and a 47 degree pitching wedge against 46."
