description: >
  The 718 CB is the compact forged cavity back of Titleist's 2018 range,
  sitting between the 718 AP2 and the 718 MB. Lofts are unchanged from the 716
  CB, keeping a 35 degree 7-iron and a 47 degree pitching wedge across a
  2-iron to pitching wedge set, and the refined leading edge is the main
  design change. High-density tungsten in the long irons keeps the moment of
  inertia up in a head that is visibly smaller than the AP2. It was the last
  CB to use the Titleist year-number naming before the 620 CB.
