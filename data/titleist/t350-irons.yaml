description: >
  The T350 is the 2023 game-improvement iron that replaced the T300, keeping
  its predecessor's loft ladder exactly — a 29 degree 7-iron and a 43 degree
  pitching wedge — while shrinking the head slightly and moving to a D1 build
  rather than D2. It retains the hollow cast body with Max Impact internal
  support and high-density tungsten weighting. It is the most heavily offset
  iron in the T-Series, running .213 inches at the 4-iron and .146 inches at
  the 7-iron, roughly 60 percent more than the T200.
