faq:
  - q: "What is the loft of a Titleist T350 7-iron?"
    a: "The Titleist T350 7-iron is 29 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Is the Titleist T350 the same loft as the T300?"
    a: "Yes. The T350 carries the T300 loft ladder unchanged, from 20 degrees at the 4-iron to 53 degrees at the second wedge, including a 29 degree 7-iron."
  - q: "How much offset does the Titleist T350 have?"
    a: "The T350 is the most offset iron in the T-Series, at .213 inches in the 4-iron and .146 inches in the 7-iron."
