description: >
  The DCI Oversize Gold is the 1996 oversize member of the DCI family, the
  gold-finished counterpart to the DCI Oversize Black and the direct ancestor
  of the 2001 DCI 822 OS. It is an investment cast oversize cavity back with
  the heaviest offset ladder Titleist published before the 822 OS: .386 inches
  at the 1-iron, .180 inches at the 7-iron and .100 inches at the pitching
  wedge. Lofts run about a degree and a half stronger through the middle of the
  set than the standard DCI of the era, with a 34.5 degree 7-iron, and the lie
  angles are two degrees more upright than the DCI Gold at 63 degrees for the
  7-iron. Titleist catalogued it from a 1-iron through a lob wedge.
