faq:
  - q: "What is the loft of a Titleist DCI Oversize Gold 7-iron?"
    a: "The Titleist DCI Oversize Gold 7-iron is 34.5 degrees, with a 63 degree lie and a 36.75 inch standard steel length."
  - q: "How does the DCI Oversize Gold compare with the DCI 822 OS that replaced it?"
    a: "The 822 OS is a degree stronger through most of the set, with a 33.5 degree 7-iron against 34.5, and it carries even more offset at .205 inches at the 7-iron against .180."
  - q: "How much offset do the DCI Oversize Gold irons have?"
    a: "Among the most Titleist has published: .386 inches at the 1-iron, tapering to .180 inches at the 7-iron and .100 inches at the pitching wedge."
