description: >
  The T100S is the strong-lofted variant of the T100, built on the same forged
  1025 carbon steel head with high-density tungsten weighting but set two
  degrees stronger through the whole set. That gives a 32 degree 7-iron
  against the T100's 34, and a 44 degree pitching wedge against 46. Lies,
  lengths and offsets are identical to the T100, so the S is purely a loft
  play: the same tour-compact head delivering a lower, longer ball flight. It
  was replaced by the T150 in 2023.
