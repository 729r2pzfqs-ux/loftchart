faq:
  - q: "What is the loft of a Titleist T100S 7-iron?"
    a: "The Titleist T100S 7-iron is 32 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the difference between the Titleist T100 and T100S?"
    a: "The T100S is two degrees stronger on every club. Its 7-iron is 32 degrees against 34 on the T100, and its pitching wedge is 44 degrees against 46. Lie, length and offset are identical."
  - q: "What replaced the Titleist T100S?"
    a: "The T150, launched in 2023, replaced the T100S and carries the same 32 degree 7-iron and 44 degree pitching wedge."
