  - q: "What is the loft of a Titleist DCI 990 7-iron?"
    a: "The Titleist DCI 990 7-iron has a loft of 36 degrees, with a 63 degree lie and a 36.75 inch standard steel length."
  - q: "What is the pitching wedge loft on the Titleist DCI 990?"
    a: "The DCI 990 pitching wedge is 49 degrees, which is roughly 3 to 4 degrees weaker than most modern players' irons."
