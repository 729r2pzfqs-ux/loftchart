description: >
  The DCI 990 was the better-player model in Titleist's Dynamic Cavity Iron
  family at the turn of the 2000s. It used a progressive cavity that shifted
  from a deeper long-iron cavity toward a more muscleback-like short iron,
  paired with a shallow profile, thin topline and minimal progressive offset.
  Lofts are traditional by modern standards, with a 36 degree 7-iron and a
  49 degree pitching wedge. A slightly larger DCI 990B variant was offered
  alongside it.
