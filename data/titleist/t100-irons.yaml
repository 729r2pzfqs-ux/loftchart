faq:
  - q: "What is the loft of a Titleist T100 7-iron?"
    a: "The 2019 Titleist T100 7-iron has a loft of 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the pitching wedge loft on the Titleist T100?"
    a: "The T100 pitching wedge is 46 degrees, and the matching gap wedge, badged W, is 50 degrees."
  - q: "Are the Titleist T100 lofts the same as the AP2 they replaced?"
    a: "Yes. The 2019 T100 uses the same lofts as the 714, 716 and 718 AP2, from a 21 degree 3-iron to a 46 degree pitching wedge, though the T100 lie angles are one degree upright in the 3 and 4 irons."
