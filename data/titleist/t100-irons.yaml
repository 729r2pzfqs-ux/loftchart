description: >
  The T100 launched in August 2019 as the tour model of Titleist's new
  T-Series, replacing the AP2 line. It is a fully forged, multi-material iron
  in which high-density tungsten is co-forged into the heel and toe of the long
  and mid irons to control centre-of-gravity progression through the set. The
  sole uses a Variable Bounce design with a softened trailing edge for turf
  interaction. Lofts match the outgoing 714/716/718 AP2 family, with a 34
  degree 7-iron and a 46 degree pitching wedge.
