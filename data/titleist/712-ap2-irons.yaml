faq:
  - q: "What is the loft of a Titleist 712 AP2 7-iron?"
    a: "The Titleist 712 AP2 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the difference between the 712 AP2 and the 714 AP2?"
    a: "The 714 AP2 is one degree stronger from the 6-iron down. Its 7-iron is 34 degrees against 35 on the 712, and its pitching wedge is 46 degrees against 47."
  - q: "Do the 710 AP2 and 712 AP2 share the same lofts?"
    a: "Yes. The 710 AP2 and 712 AP2 carry identical lofts, lies and lengths across the set; the changes between them were in construction and finish."
