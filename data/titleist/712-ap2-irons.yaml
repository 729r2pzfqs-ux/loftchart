description: >
  The 712 AP2 is the third-generation AP2 and the last of the line to use the
  traditional 35 degree 7-iron. It is forged from 1025 carbon steel with
  high-density tungsten placed in the heel and toe to move the centre of
  gravity low and to the perimeter without enlarging the head. Lofts and
  offsets carry over unchanged from the 710 AP2; the 714 AP2 that followed
  strengthened everything from the 6-iron down by a degree. The stock set ran
  3-iron through a 51 degree gap wedge, all at D2.
