faq:
  - q: "What is the loft of a Titleist 690.CB 7-iron?"
    a: "The Titleist 690.CB 7-iron is 35 degrees, with a 61.5 degree lie and a 36.75 inch standard steel length."
  - q: "What is the difference between the Titleist 690.CB and 690.MB?"
    a: "The 690.CB is a forged cavity back and the 690.MB is a muscleback blade. The CB is one degree stronger through the set, with a 35 degree 7-iron against 36, and carries slightly more offset."
  - q: "How do the 690.CB lies compare with later Titleist irons?"
    a: "The 690.CB is notably flat: its 7-iron lie is 61.5 degrees, where the 695.CB and the AP2 sets that followed are 63 degrees."
