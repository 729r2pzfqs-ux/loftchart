description: >
  The 690.CB is the forged cavity back of Titleist's 2002 tour range and the
  direct counterpart to the 690.MB muscleback. It keeps traditional players
  lofts with a 35 degree 7-iron and a 47 degree pitching wedge, and pairs them
  with the flattest lies in the modern Titleist catalogue: 61.5 degrees at the
  7-iron, a full degree and a half flatter than the AP2 sets that followed.
  Offset is minimal at .110 inches in the 7-iron, and the whole set is built
  to D2. It was the shorter-shafted, more compact platform that the 695.CB
  later replaced.
