description: >
  The T300 is the game-improvement iron of Titleist's 2019 T-Series, taking
  over from the 718 AP1. It pairs a hollow cast stainless body with Max Impact
  internal face support and high-density tungsten weighting, in a larger head
  with more offset than the T200. Lofts are strong for the category with a 29
  degree 7-iron and a 43 degree pitching wedge, and the set extends through
  two matching wedges at 48 and 53 degrees. It ran until 2023, when the T350
  replaced it.
