faq:
  - q: "What is the loft of a Titleist T300 7-iron?"
    a: "The Titleist T300 7-iron is 29 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What replaced the Titleist T300?"
    a: "The T350, launched in 2023, replaced the T300. It carries an identical loft ladder, including the same 29 degree 7-iron and 43 degree pitching wedge."
  - q: "How many wedges came with the Titleist T300 set?"
    a: "The T300 set extended past the 43 degree pitching wedge with two matching wedges, W1 at 48 degrees and W2 at 53 degrees."
