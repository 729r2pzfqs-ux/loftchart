faq:
  - q: "What is the loft of a Titleist 695.MB 7-iron?"
    a: "The Titleist 695.MB 7-iron is 36 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the difference between the Titleist 695.MB and 690.MB?"
    a: "The lofts are identical across the set. The 695.MB is a degree and a half more upright at the 7-iron and every club is three quarters of an inch longer."
  - q: "What is the difference between the 695.MB and the 695.CB?"
    a: "The 695.MB is a muscleback blade and the 695.CB is a cavity back. The MB is two degrees weaker through the set, with a 36 degree 7-iron against 34 degrees."
