description: >
  The 695.MB is the 2006 forged muscleback that replaced the 690.MB and shares
  its loft ladder exactly: 19 degrees at the 2-iron through 48 degrees at the
  pitching wedge, with a 36 degree 7-iron. What changed is the geometry around
  those lofts. Lies are upright by a degree and a half at the 7-iron, 63
  degrees against 61.5, and every shaft is three quarters of an inch longer,
  so the set plays taller and longer than the 690.MB despite identical lofts.
  It is the direct blade counterpart to the 695.CB.
