faq:
  - q: "What is the loft of a Titleist 718 AP2 7-iron?"
    a: "The Titleist 718 AP2 7-iron is 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What replaced the Titleist 718 AP2?"
    a: "The T100, launched in 2019, replaced the 718 AP2 as Titleist's tour players iron and carried the same 34 degree 7-iron loft."
  - q: "What is the offset on the Titleist 718 AP2?"
    a: "Titleist published 718 offsets in millimetres: 4.1mm at the 3-iron tapering to 1.6mm at the gap wedge, which is roughly .161 to .063 inches."
