description: >
  The 718 AP2 is the sixth and final AP2 before the line became the T-Series.
  It retains the co-forged 1025 carbon steel construction with high-density
  tungsten in the heel and toe, and carries the same lofts as the 714 and 716
  before it: a 34 degree 7-iron and a 46 degree pitching wedge across a 3-iron
  to 50 degree gap wedge set. Titleist published the 718 offsets in
  millimetres rather than inches, running 4.1mm at the 3-iron down to 1.6mm at
  the gap wedge. Stock steel was the ascending-mass True Temper AMT Tour
  White.
