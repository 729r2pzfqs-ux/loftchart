faq:
  - q: "What is the loft of a Titleist 695.CB 7-iron?"
    a: "The Titleist 695.CB 7-iron has a loft of 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "When did the Titleist 695.CB irons come out?"
    a: "Titleist announced the Forged 695.CB in April 2006, alongside the 695.MB and 775.CB, though tour staff had played prototypes since mid-2005."
