description: >
  The Forged 695.CB was Titleist's shallow-cavity players iron, launched
  alongside the 695.MB muscleback and the 775.CB. Both 695 models were forged
  from 1025 mild carbon steel and used a Z-Cavity design that removed mass from
  the heel to move the centre of gravity closer to the centre of the face.
  Lofts are traditional, with a 34 degree 7-iron and a 46 degree pitching
  wedge. Note that although the model is often associated with the 2004-2005
  era because Titleist staff players used prototypes on tour from mid-2005,
  the retail launch was April 2006.
