faq:
  - q: "What is the loft of a 2023 Titleist T200 7-iron?"
    a: "The 2023 Titleist T200 7-iron is 30.5 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Is the 2023 T200 stronger or weaker than the 2019 T200?"
    a: "Slightly weaker in the middle of the set. The 7-iron moves from 30 to 30.5 degrees and the 8-iron from 34 to 34.5, while the 4-iron and pitching wedge are unchanged."
  - q: "What is the offset on the 2023 Titleist T200?"
    a: "Offset runs from .122 inches at the 4-iron down to .051 inches at the 48 degree wedge, with .091 inches at the 7-iron."
