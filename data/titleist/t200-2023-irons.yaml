description: >
  The second-generation T200 arrived in 2023 with a slimmer profile and a
  reworked hollow-body build, keeping the forged face and Max Impact internal
  support of the original but tightening the shaping toward the T150. Lofts
  move half a degree weaker through the middle irons compared with the 2019
  T200, giving a 30.5 degree 7-iron, while the pitching wedge stays at 43
  degrees. Unlike the 2019 model, Titleist published offset figures for this
  generation, running .122 inches at the 4-iron down to .051 inches at the 48
  degree wedge.
