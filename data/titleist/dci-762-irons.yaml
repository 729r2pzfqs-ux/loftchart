faq:
  - q: "What is the loft of a Titleist DCI 762 7-iron?"
    a: "The Titleist DCI 762 7-iron is 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How do the DCI 762 lofts compare with the DCI 990?"
    a: "The DCI 762 is two degrees stronger through the middle of the set: its 7-iron is 34 degrees against 36 degrees on the DCI 990, and its pitching wedge is 46 degrees against 49."
