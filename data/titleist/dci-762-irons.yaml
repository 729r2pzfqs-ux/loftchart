description: >
  The DCI 762 is the 2001 dual-cavity iron that replaced the DCI 990 at the
  game-improvement end of the Titleist range. It is investment cast in 17-4
  stainless with a dual-cavity back that pushes weight low and to the
  perimeter, and it runs noticeably stronger than the 990 it replaced: the
  7-iron is 34 degrees against 36, and the set carries a half-degree 3-iron
  loft of 21.5 degrees. Offset tapers from .180 inches at the 1-iron to .099
  inches at the gap wedge, and every club is built to D2 swing weight.
