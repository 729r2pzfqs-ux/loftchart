faq:
  - q: "What is the loft of a Titleist T100 (2021) 7-iron?"
    a: "The 2021 Titleist T100 7-iron is 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Did the 2021 T100 change lofts from the 2019 T100?"
    a: "No. The loft, lie and length ladders are identical, from a 21 degree 3-iron to a 46 degree pitching wedge and a 50 degree gap wedge."
  - q: "What is different about the 2021 T100?"
    a: "The tungsten weighting is denser D18 tungsten brazed into the head rather than welded, and the 3 and 4 irons gain a muscle channel that lowers the centre of gravity."
  - q: "How does the T100 compare with the T100S?"
    a: "The T100S is built two degrees stronger by design across the set: its 7-iron is 32 degrees against 34 on the T100."
