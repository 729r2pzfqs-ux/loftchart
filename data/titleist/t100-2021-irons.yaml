description: >
  The second-generation T100 was announced in August 2021 and reached retail on
  26 August. It keeps the forged dual cavity shape of the 2019 T100 but changes
  how the tungsten is fixed: denser D18 tungsten is brazed into the heel and
  toe of the 3 through 7 irons at around 2000 degrees, removing the weld points
  and allowing tighter control of centre-of-gravity placement. A new muscle
  channel in the 3 and 4 irons lowers the centre of gravity to raise peak
  height. Lofts, lies and lengths are unchanged from the 2019 T100, with a 34
  degree 7-iron and a 46 degree pitching wedge. Titleist replaced it with a
  third T100 generation in 2023.
