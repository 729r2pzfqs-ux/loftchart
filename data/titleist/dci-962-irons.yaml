description: >
  The DCI 962 is the 1997 model that moved the DCI name toward the better
  player, and it is the direct ancestor of the DCI 990. It is investment cast
  with perimeter weighting but a much tighter offset ladder than the DCI Gold
  that preceded it: .160 inches at the 1-iron and .100 inches at the 7-iron,
  against .380 and .180. Lofts are traditional, with a 36 degree 7-iron and a
  48 degree pitching wedge, and the wedges are built progressively heavier, up
  to D8 at the sand wedge. Titleist catalogued it from a 1-iron through a 60
  degree lob wedge. A lower-offset DCI 962B was offered alongside it.
