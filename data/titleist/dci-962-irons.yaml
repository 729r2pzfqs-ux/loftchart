faq:
  - q: "What is the loft of a Titleist DCI 962 7-iron?"
    a: "The Titleist DCI 962 7-iron is 36 degrees, with a 63 degree lie and a 36.75 inch standard steel length."
  - q: "How do the DCI 962 and DCI 990 compare?"
    a: "They are very close. Both have a 36 degree 7-iron and near-identical offset, .100 inches against .103 inches at the 7-iron. The main loft difference is at the bottom of the set: the 962 pitching wedge is 48 degrees, the 990 is 49."
  - q: "What is the difference between the DCI 962 and the DCI 962B?"
    a: "The 962B is the reduced-offset version aimed at the better player; the standard 962 carries .160 inches of offset at the 1-iron down to .070 inches at the pitching wedge."
