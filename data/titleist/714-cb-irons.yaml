description: >
  The 714 CB is the compact forged cavity back in Titleist's 2014 range,
  sitting between the AP2 and the MB. It is forged from 1025 carbon steel with
  constant blade lengths, a thin topline and minimal progressive offset, from
  .150 inches at the 2-iron down to .075 inches at the pitching wedge. Lofts
  are traditional where the AP2 of the same generation had moved stronger: the
  7-iron is 35 degrees against 34, and the pitching wedge is 47 degrees against
  46. The stock set ran 2-iron through pitching wedge with no gap wedge, and
  the 716 CB that replaced it carried exactly the same loft ladder.
