faq:
  - q: "What is the loft of a Titleist 714 CB 7-iron?"
    a: "The Titleist 714 CB 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the difference between the Titleist 714 CB and the 714 AP2?"
    a: "The CB is the more compact forged cavity back with less offset, and it is one degree weaker through the set: a 35 degree 7-iron and a 47 degree pitching wedge against 34 and 46 on the AP2."
  - q: "Are the Titleist 714 CB and 716 CB lofts the same?"
    a: "Yes. Both run an 18 degree 2-iron through a 47 degree pitching wedge with a 35 degree 7-iron, and neither set included a gap wedge."
