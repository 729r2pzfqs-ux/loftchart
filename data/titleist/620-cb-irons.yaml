description: >
  The 620 CB was announced in August 2019 alongside the T-Series and the 620
  MB, and replaced the 718 CB as Titleist's compact forged cavity back. It
  carries reduced offset and a thinner topline than the 718 CB, a progressive
  blade length through the set, co-forged tungsten in the 3 and 4 irons, and a
  tour-refined sole. Lofts are unchanged from the 718 CB, a 21 degree 3-iron
  through a 47 degree pitching wedge with a 35 degree 7-iron, but the stock set
  is 3-iron to pitching wedge rather than starting at the 2-iron. Titleist did
  not publish an offset table for the 620 models, so no offset figures are
  recorded here.
