faq:
  - q: "What is the loft of a Titleist 620 CB 7-iron?"
    a: "The Titleist 620 CB 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Are the Titleist 620 CB and 620 MB lofts the same?"
    a: "Yes. Titleist published one loft row for both: 21 degrees at the 3-iron through 47 degrees at the pitching wedge, with a 35 degree 7-iron."
  - q: "How does the 620 CB differ from the 718 CB it replaced?"
    a: "The lofts, lies and lengths match, but the 620 CB has less offset and a thinner topline, adds co-forged tungsten in the 3 and 4 irons, and is catalogued from the 3-iron rather than the 2-iron."
