faq:
  - q: "What is the loft of a Titleist 681 Forged 7-iron?"
    a: "The Titleist 681 Forged 7-iron is 36 degrees, with a 62 degree lie and a 36.75 inch standard steel length."
  - q: "How much offset does the Titleist 681 Forged have?"
    a: "A constant .080 inches from the 2-iron through the pitching wedge. Titleist did not publish an offset figure for the 1-iron."
  - q: "How do the 681 Forged lofts compare with the 690.MB that replaced it?"
    a: "The lofts match exactly from the 2-iron through the 9-iron, including a 36 degree 7-iron. The only loft change is the pitching wedge, 48 degrees on the 690.MB against 49 on the 681, and the 690.MB lies are up to half a degree flatter."
