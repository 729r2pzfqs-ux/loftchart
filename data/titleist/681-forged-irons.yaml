description: >
  The 681 Forged is the 2001 blade that reopened Titleist's forged players line
  and led directly to the 690 family. It is forged from soft 1030 mild carbon
  steel with a thin sole of moderate camber and a constant .080 inches of
  offset from the 2-iron down, which is the least progressive offset ladder in
  the Titleist archive. Lofts are traditional, with a 36 degree 7-iron and a 49
  degree pitching wedge, and lies are notably flat: 62 degrees at the 7-iron
  against 63 on most later Titleist sets. The 1-iron was catalogued but
  Titleist published no offset or bounce figure for it, so neither is recorded
  here. A tour-only 681 "T" variant was offered alongside it.
