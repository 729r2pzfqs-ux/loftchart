faq:
  - q: "What is the loft of a Titleist 710 MB 7-iron?"
    a: "The Titleist 710 MB 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How do the 710 MB lofts compare with the 695.MB?"
    a: "The long irons match, but the 710 MB is one degree stronger from the 6-iron down: a 35 degree 7-iron against 36 and a 47 degree pitching wedge against 48."
  - q: "How much offset does the Titleist 710 MB have?"
    a: "Very little. Titleist published .125 inches at the 3-iron tapering to .075 inches at the pitching wedge, against .160 to .085 inches on the 710 AP2 of the same generation."
