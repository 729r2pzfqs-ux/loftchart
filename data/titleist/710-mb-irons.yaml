description: >
  The 710 MB is the forged muscleback Titleist introduced in the autumn of
  2009 for the 2010 season, alongside the 710 CB, AP1 and AP2. It is forged
  from 1025 carbon steel with a uniform muscle behind the face, constant blade
  length, a thin topline and minimal progressive offset running from .125
  inches at the 3-iron to .075 inches at the pitching wedge. Against the
  695.MB it replaced, the loft ladder moved one degree stronger from the
  6-iron down: the 7-iron is 35 degrees against 36, and the pitching wedge is
  47 degrees against 48. The stock set was a 3-iron through pitching wedge with
  no gap wedge.
