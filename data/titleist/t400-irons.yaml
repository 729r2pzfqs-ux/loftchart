description: >
  The T400 is the most forgiving iron Titleist has built, sitting below the
  T300 as the super game-improvement option in the 2019 T-Series. It uses a
  hollow cast body with a split-sole design and up to 100 grams of extreme
  high-density tungsten to drive the centre of gravity as low as possible.
  Lofts are the strongest in the range by a wide margin: the 7-iron is 26
  degrees, three degrees stronger than the T300 and eight stronger than the
  T100. The set starts at a 5-iron and runs through three wedges to 55
  degrees.
