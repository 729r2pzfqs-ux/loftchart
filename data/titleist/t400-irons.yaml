faq:
  - q: "What is the loft of a Titleist T400 7-iron?"
    a: "The Titleist T400 7-iron is 26 degrees, with a 63 degree lie and a 37 inch standard steel length. It is the strongest-lofted iron Titleist has made."
  - q: "Why does the Titleist T400 set start at a 5-iron?"
    a: "The T400 lofts are strong enough that a 5-iron at 20 degrees covers the ground a conventional 4-iron would, so Titleist built the set from the 5-iron down through three wedges at 43, 49 and 55 degrees."
  - q: "How does the Titleist T400 compare with the T300?"
    a: "The T400 is three degrees stronger through the set, with a 26 degree 7-iron against 29, and uses a wider split-sole head with more tungsten for a lower centre of gravity."
