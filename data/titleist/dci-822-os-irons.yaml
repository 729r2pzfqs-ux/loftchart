faq:
  - q: "What is the loft of a Titleist DCI 822 OS 7-iron?"
    a: "The Titleist DCI 822 OS 7-iron is 33.5 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How does the DCI 822 OS differ from the DCI 762?"
    a: "The 822 OS is the oversize model: it is half a degree to one degree stronger through the set, carries far more offset at .205 inches at the 7-iron against .109 inches, and has roughly twice the bounce."
  - q: "What is the pitching wedge loft on the Titleist DCI 822 OS?"
    a: "The DCI 822 OS pitching wedge is 46 degrees, with a 50 degree gap wedge and a 55.5 degree sand wedge completing the stock set."
