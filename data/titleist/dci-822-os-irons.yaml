description: >
  The DCI 822 OS is the oversize, maximum-forgiveness member of the 2001 DCI
  range and the most offset-heavy iron Titleist has catalogued: .320 inches at
  the 1-iron, still .175 inches at the 9-iron. Lofts are the strongest in the
  DCI family, with a 33.5 degree 7-iron, and the set is built with markedly
  more bounce than its stablemates, from 6 degrees at the 1-iron to 12 degrees
  through the scoring clubs, so it resists digging out of soft turf. It sits
  alongside the DCI 762 in the range as the higher-launch, wider-soled option.
