faq:
  - q: "What is the loft of a Titleist 718 AP3 7-iron?"
    a: "The Titleist 718 AP3 7-iron is 31 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Where does the 718 AP3 sit between the AP1 and AP2?"
    a: "In the middle. Its 31 degree 7-iron is one degree weaker than the AP1 at 30 degrees and three degrees stronger than the AP2 at 34 degrees, and its head shape is closer to the AP2."
  - q: "What replaced the Titleist 718 AP3?"
    a: "The T200, launched in 2019 as part of the first T-Series, took over the player's distance slot the AP3 created."
