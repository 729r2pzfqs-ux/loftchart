description: >
  The 718 AP3 was a new model for Titleist's 2018 range and the first club the
  company badged a player's distance iron, positioned between the AP1 and the
  AP2. It uses a hollow-blade construction with a thin unsupported L-Face
  insert and high-density tungsten weighting, in a head shape closer to the
  AP2 than the AP1. Lofts sit between the two: a 31 degree 7-iron against 30
  on the AP1 and 34 on the AP2, over a 3-iron to 48 degree gap wedge set. It
  carries the most offset of any 718 model in the long irons, 5.5mm at the
  3-iron, which Titleist published in millimetres rather than inches. The T200
  replaced it in 2019.
