description: >
  The AP2 is the first generation of Titleist's Advanced Performance players
  iron, announced in January 2008 and at retail from March that year alongside
  the cast AP1. Titleist described it as a multi-material, dual cavity forged
  iron: a forged carbon steel body carrying high-density tungsten-nickel
  weighting in the heel and toe and an elastomer cushion behind the face.
  Lofts are traditional, with a 35 degree 7-iron and a 47 degree pitching
  wedge, and the stock set ran 3-iron through a 51 degree gap wedge. Titleist
  retained these lofts unchanged in the 710 AP2 that replaced it.
