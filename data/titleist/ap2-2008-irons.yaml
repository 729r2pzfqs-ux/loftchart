faq:
  - q: "What is the loft of a Titleist AP2 (2008) 7-iron?"
    a: "The 2008 Titleist AP2 7-iron is 35 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "How do the 2008 AP2 lofts compare with the 710 AP2 that replaced it?"
    a: "They are identical. Both run a 21 degree 3-iron, a 35 degree 7-iron and a 47 degree pitching wedge, and both offer a gap wedge, 51 degrees on the 2008 model."
  - q: "What was the stock set composition of the first AP2 irons?"
    a: "Titleist catalogued the 2008 AP2 from a 3-iron through a pitching wedge, with a 51 degree gap wedge badged W available to extend the set."
