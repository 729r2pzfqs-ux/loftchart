faq:
  - q: "What is the loft of a Titleist 714 AP2 7-iron?"
    a: "The Titleist 714 AP2 7-iron has a loft of 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "What is the pitching wedge loft on the Titleist 714 AP2?"
    a: "The 714 AP2 pitching wedge is 46 degrees, and the matching gap wedge, badged W, is 50 degrees."
