construction: forged, multi-material dual cavity
material: forged 1025 carbon steel with high-density tungsten weighting in the heel and toe
successor: Titleist 716 AP2
predecessor: Titleist 712 AP2
description: >
  The 714 AP2 is the fourth-generation AP2 and one of the most widely played
  players irons of its era. It is forged from 1025 carbon steel with roughly
  43 grams of high-density tungsten placed in the heel and toe during the
  forging process, which moves the centre of gravity low and toward the
  perimeter without enlarging the head. Compared with the 710 AP2 the lofts
  are one degree stronger from the 6-iron down, giving a 34 degree 7-iron and
  a 46 degree pitching wedge.
