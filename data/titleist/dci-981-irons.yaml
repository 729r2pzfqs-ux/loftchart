faq:
  - q: "What is the loft of a Titleist DCI 981 7-iron?"
    a: "The Titleist DCI 981 7-iron is 35 degrees, with a 63 degree lie and a 36.75 inch standard steel length."
  - q: "How many clubs were in the Titleist DCI 981 set?"
    a: "Titleist catalogued the DCI 981 from a 1-iron through a lob wedge, thirteen clubs in all, though most retail sets were sold as 3-PW."
  - q: "Why does the DCI 981 have so much offset?"
    a: "The DCI 981 was designed as a game-improvement iron and carries .260 inches of offset at the 1-iron, tapering to .040 inches at the wedges, which helps square the face and raise launch."
