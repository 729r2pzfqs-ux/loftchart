description: >
  The DCI 981 is the 1998 perimeter-weighted cast iron that carried the DCI
  name into its most widely played era. It is the most heavily offset set in
  the DCI family, running .260 inches at the 1-iron and still .125 inches at
  the 9-iron, which is what gives it its high, straight ball flight. Lofts are
  traditional by modern standards with a 35 degree 7-iron, and the stock set
  ran unusually deep: a full 1-iron through lob wedge was catalogued, with the
  scoring clubs built heavier at D3 and D5 swing weight.
