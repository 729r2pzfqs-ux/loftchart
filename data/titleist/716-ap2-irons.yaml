description: >
  The 716 AP2 is the fifth-generation AP2 and the first to use co-forged
  construction, with extreme high-density tungsten set low and along the
  perimeter to raise moment of inertia without growing the head. Lofts carry
  over unchanged from the 714 AP2, giving a 34 degree 7-iron and a 46 degree
  pitching wedge, and the offset ladder is trimmed slightly to .110 inches at
  the 7-iron. The sole is a touch wider than the 714 with trailing-edge relief
  for cleaner turf interaction. Stock shaft was the ascending-mass True Temper
  Dynamic Gold AMT.
