faq:
  - q: "What is the loft of a Titleist 716 AP2 7-iron?"
    a: "The Titleist 716 AP2 7-iron is 34 degrees, with a 63 degree lie and a 37 inch standard steel length."
  - q: "Do the 714 AP2 and 716 AP2 have the same lofts?"
    a: "Yes. Both carry a 34 degree 7-iron and a 46 degree pitching wedge across an identical 3-iron to gap wedge ladder; the 716 changed construction rather than loft."
  - q: "What shaft came stock in the Titleist 716 AP2?"
    a: "The stock steel shaft was the True Temper Dynamic Gold AMT in R300 and S300, an ascending-mass shaft running 112g to 130g through the set, with Project X LZ as a no-charge alternative."
