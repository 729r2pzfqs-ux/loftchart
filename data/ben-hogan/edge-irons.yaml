faq:
  - q: "Are Ben Hogan Edge irons stamped with the loft or with a club number?"
    a: "With a club number. The Edge is the model where Ben Hogan stepped back from the loft-stamping convention it used on the Ft. Worth 15 and PTx. The company kept the 4-degree PreciseLoft gapping but reduced the four launch profiles to the single mid-high profile, so the set is simply a 4-iron through pitching wedge running from 22 to 46 degrees."
  - q: "What is the loft of a Ben Hogan Edge 7-iron?"
    a: "The Ben Hogan Edge 7-iron has a loft of 34 degrees, a lie of 62.5 degrees and a length of 37.00 inches. That is markedly weaker than most game-improvement 7-irons of the same era, which were commonly 30 degrees or stronger."
  - q: "What clubs come in a stock Ben Hogan Edge set?"
    a: "Ben Hogan sold the Edge as a 4-PW seven-piece set, a 5-PW six-piece set or a 6-PW five-piece set, priced at $735, $660 and $575 respectively."
