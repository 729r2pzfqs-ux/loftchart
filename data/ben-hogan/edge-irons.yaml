description: >
  The Edge is the most forgiving iron in the relaunched Ben Hogan line and
  revives a name the original company used in the late 1980s. The head is built
  from two forged parts - a hydraulically hammered face laser welded to a
  separately forged back frame and hosel - producing a hollow body that is then
  filled with polycarbonate foam, with a progressively thicker face through the
  scoring irons. Ben Hogan states the heads are on average 12 percent larger
  than its PTx irons and carry noticeably more offset, from 0.210 inches at the
  4-iron down to 0.120 inches at the pitching wedge. It is the model where Ben
  Hogan abandoned the loft-stamping convention: the company kept the 4-degree
  PreciseLoft gapping but dropped the four launch profiles down to the single
  mid-high profile and stamped traditional club numbers, so the set runs 4-iron
  at 22 degrees through pitching wedge at 46 degrees. Stock sets were sold as
  4-PW, 5-PW or 6-PW. It was later replaced in the line-up by the Edge EX, which
  moved to stronger 20-to-44-degree lofts.
