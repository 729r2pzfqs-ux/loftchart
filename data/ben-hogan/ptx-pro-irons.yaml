description: >
  The PTx Pro replaced the PTx in April 2019 and keeps its predecessor's three-piece,
  multi-step, multi-material forging while moving to a slightly larger face profile and
  wider sole. The long irons pair a soft 1025 carbon steel body with an ultra-thin forged
  MS300 face and co-forged tungsten weight out at the toe; the scoring irons swap that
  tungsten for lightweight titanium co-forged between body and face to keep the flight
  low and penetrating. Like the Ft. Worth Black and ICON it abandons the loft-stamped
  PreciseLoft heads of the original PTx and is sold by conventional club number, though
  the 4-degree loft gapping is unchanged: 4-iron at 22 degrees through pitching wedge at
  46 degrees. Stock sets were 4-PW, 5-PW or 6-PW at 770, 690 and 600 USD, in nickel
  chrome or the Diamond Black Metal finish. It is still in the Ben Hogan range alongside
  the later PTx Tour, which is a separate model on stronger 21.5-to-45.5-degree lofts.
