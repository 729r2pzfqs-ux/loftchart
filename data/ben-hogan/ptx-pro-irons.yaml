faq:
  - q: "What is the loft of a Ben Hogan PTx Pro 7-iron?"
    a: "The Ben Hogan PTx Pro 7-iron has a loft of 34 degrees, a lie of 62.5 degrees, a length of 37.00 inches and 0.130 inches of offset."
  - q: "Are Ben Hogan PTx Pro irons stamped with the loft, like the original PTx?"
    a: "No. The original PTx carried its exact loft on the sole under Ben Hogan's PreciseLoft system, with the iron number only on the hosel. The PTx Pro is sold by conventional club number, 4-iron through pitching wedge, while keeping the same 4-degree loft gaps from 22 to 46 degrees."
  - q: "What clubs come in a stock Ben Hogan PTx Pro set?"
    a: "Ben Hogan offered it as a 4-PW seven-piece set at 770 USD, a 5-PW six-piece set at 690 USD or a 6-PW five-piece set at 600 USD, in either a nickel chrome or a Diamond Black Metal finish."
  - q: "How does the PTx Pro differ from the PTx it replaced?"
    a: "It is slightly larger in face profile and sole width, keeps the co-forged multi-material build but revises where the tungsten and titanium sit, uses an updated V-Sole, and is numbered conventionally rather than by loft."
