faq:
  - q: "Are Ben Hogan Ft. Worth Black irons stamped with the loft or with a club number?"
    a: "With a club number. The Ft. Worth Black is the model where Ben Hogan stopped selling the Ft. Worth line by loft number. The company kept its 4-degree PreciseLoft gapping but dropped the four launch profiles down to the mid-high profile alone, so the heads carry traditional numbers 4 through PW covering 22 to 46 degrees."
  - q: "What is the loft of a Ben Hogan Ft. Worth Black 7-iron?"
    a: "The Ben Hogan Ft. Worth Black 7-iron has a loft of 34 degrees, a lie of 62.5 degrees, a length of 37.00 inches and 0.092 inches of offset."
  - q: "What is the difference between the Ft. Worth Black and the Ft. Worth White?"
    a: "Finish only. Both are the same forged head; the Black wears Ben Hogan's Diamond Black Metal finish, which reduces glare and gives better contrast against the ball, and the White wears a traditional nickel chrome."
  - q: "What clubs come in a stock Ben Hogan Ft. Worth Black set?"
    a: "Seven clubs, 4-iron through pitching wedge, at 735 USD. Unlike the Ft. Worth 15 before it, there is only one loft matrix to choose from."
