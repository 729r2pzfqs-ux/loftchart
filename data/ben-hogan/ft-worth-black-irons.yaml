description: >
  The Ft. Worth Black is the second-generation Ft. Worth blade, introduced in May 2018
  on the same single-piece forged chassis as the Ft. Worth 15 but with reshaped
  Depression Cavities, a revised Adaptive Perimeter Weighting System and a V-Sole
  retuned iron by iron - a stronger leading edge on some heads and a softer trailing
  edge on others. It is the model where Ben Hogan retreated from its loft-stamping
  convention: rather than sell heads marked 20 to 47 degrees in four launch profiles,
  the company kept only the mid-high profile and stamped traditional club numbers on
  the sole, so the set is a plain 4-iron at 22 degrees through pitching wedge at 46
  degrees in 4-degree gaps. Black refers to the proprietary Diamond Black Metal finish;
  the identical head in nickel chrome was sold as the Ft. Worth White. The stock set was
  seven clubs, 4-PW, at 735 USD, and the line was replaced by the ICON blade in 2020.
