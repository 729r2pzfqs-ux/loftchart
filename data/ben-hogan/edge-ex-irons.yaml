description: >
  The Edge EX is Ben Hogan's game-improvement iron, announced on 13 April 2021 and
  shipping from late April that year. It replaces the hollow, foam-filled body of the
  Edge with an Open Cavity Design in which weight is pulled out of the area behind the
  face and pushed to the toe, heel and sole, leaving the forged face visually floating
  between the perimeter rails; the head is larger than the Edge's and carries a great
  deal of offset, from 0.230 inches at the 4-iron to 0.160 inches at the pitching wedge.
  Like the Edge it is numbered conventionally rather than by loft, and it keeps Ben
  Hogan's 4-degree gapping, but every loft is 2 degrees stronger than the Edge, ICON and
  PTx Pro: 4-iron at 20 degrees through pitching wedge at 44 degrees, giving a 32-degree
  7-iron. Sets were sold as 4-PW, 5-PW or 6-PW at 800, 720 and 630 USD.
