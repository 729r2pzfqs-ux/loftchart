faq:
  - q: "What is the loft of a Ben Hogan Edge EX 7-iron?"
    a: "The Ben Hogan Edge EX 7-iron has a loft of 32 degrees, a lie of 62.5 degrees, a length of 37.00 inches and 0.195 inches of offset."
  - q: "How do Edge EX lofts compare with the Ben Hogan Edge?"
    a: "Every Edge EX club is 2 degrees stronger. The Edge runs 22 to 46 degrees from 4-iron to pitching wedge; the Edge EX runs 20 to 44. Both keep Ben Hogan's consistent 4-degree gaps, so the shape of the set is unchanged."
  - q: "Are Edge EX irons stamped with the loft rather than a club number?"
    a: "No. Ben Hogan sold its Ft. Worth 15 and PTx irons with the exact loft stamped on the sole, but from the Edge onwards the company reverted to conventional club numbers, and the Edge EX is numbered 4 through PW."
  - q: "What clubs come in a stock Ben Hogan Edge EX set?"
    a: "Ben Hogan offered a 4-PW seven-piece set at 800 USD, a 5-PW six-piece set at 720 USD and a 6-PW five-piece set at 630 USD, all custom built to order."
