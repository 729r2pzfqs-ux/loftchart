faq:
  - q: "Why do Ben Hogan PTx irons say 32 instead of 7-iron?"
    a: "Ben Hogan's PreciseLoft system stamps the actual loft in degrees on the sole of each PTx head rather than selling the set by club number. The traditional iron number is engraved on the hosel as a secondary marking. A set is seven heads in 4-degree gaps covering 20 to 47 degrees depending on which launch profile you order."
  - q: "What is the loft of the middle iron in a Ben Hogan PTx set?"
    a: "The fourth club of the seven-piece set is 32 degrees in the low-launch profile, with a 62.5-degree lie and a 37.00-inch steel length. That club is the 7-iron equivalent, and it is 33, 34 or 35 degrees in the mid, mid-high and high profiles respectively."
  - q: "Is the Ben Hogan PTx a players iron or a game-improvement iron?"
    a: "Ben Hogan positioned it as a transitional iron between the two - a forged, multi-material head with tungsten weighting and hollow long irons, a slightly larger profile and a little more offset than the Ft. Worth 15 blade, but far more compact and weaker-lofted than a true game-improvement iron."
