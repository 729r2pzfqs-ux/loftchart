description: >
  The PTx was Ben Hogan Golf's second iron after the Ft. Worth 15 and was
  introduced in January 2016 as a more forgiving, technology-led companion to
  the blade. Ben Hogan describes it as a transitional iron: the long irons are
  hollow, with a 1025 carbon steel frame and an ultra-thin MS300 steel face plus
  low tungsten weighting, while the scoring irons are co-forged with a
  lightweight titanium core in place of steel. Like the Ft. Worth 15 it uses the
  PreciseLoft system of 4-degree loft gaps, and each head carries its exact loft
  stamped on the sole, with the traditional iron number on the hosel. A stock
  set is seven clubs in one of four launch profiles - low 20/24/28/32/36/40/44,
  mid 21/25/29/33/37/41/45, mid-high 22/26/30/34/38/42/46 or high
  23/27/31/35/39/43/47 - and the rows below are the low-launch profile, since
  length and lie are set by the loft band rather than by the profile. It was
  succeeded by the PTx Pro.
