description: >
  The ICON is Ben Hogan Golf's traditional forged muscle-back blade, announced
  in March 2020 as the better-player iron in the range alongside the PTx Pro. It
  is individually forged from 1025 carbon steel with a thin topline, compact
  head and minimal offset, running from 0.120 inches at the 4-iron to 0.068
  inches at the pitching wedge, and uses the enhanced V-Sole with a high-bounce
  leading edge and a lower-bounce trailing edge. Unlike the Ft. Worth 15 and PTx
  that preceded it, the ICON is sold by conventional club number, with the iron
  number etched in red along the sole, though it keeps Ben Hogan's 4-degree loft
  gapping throughout. The stock set is seven clubs, 4-iron at 22 degrees through
  pitching wedge at 46 degrees, offered in nickel chrome or the darker Diamond
  Black Metal finish. Launch pricing was $770 for the chrome set and $800 for
  the black.
