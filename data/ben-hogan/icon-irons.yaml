faq:
  - q: "Are Ben Hogan ICON irons stamped with the loft or with a club number?"
    a: "With a club number. The ICON has the iron number etched in red along the sole, unlike the earlier Ft. Worth 15 and PTx irons, which the relaunched Ben Hogan company stamped with the loft in degrees instead. The ICON still uses Ben Hogan's consistent 4-degree loft gaps, so the numbers map cleanly onto lofts: 4-iron 22 degrees through pitching wedge 46 degrees."
  - q: "What is the loft of a Ben Hogan ICON 7-iron?"
    a: "The Ben Hogan ICON 7-iron has a loft of 34 degrees, a lie of 62.5 degrees and a length of 37.00 inches, with 0.092 inches of offset."
  - q: "What clubs come in a stock Ben Hogan ICON set?"
    a: "Seven clubs, 4-iron through pitching wedge. It was offered in a nickel chrome finish at $770 and a Diamond Black Metal finish at $800."
