faq:
  - q: "Why are Ben Hogan Ft. Worth 15 irons stamped with a number like 32 instead of a 7-iron?"
    a: "The relaunched Ben Hogan Golf Equipment Company marked each Ft. Worth 15 head with its actual loft in degrees instead of a club number. Heads were made in every loft from 20 to 47 degrees, and a set is seven of them in 4-degree gaps. A 32-degree Ft. Worth 15 is the club that sits where a 7-iron would in a conventional set."
  - q: "What is the loft of the middle iron in a Ben Hogan Ft. Worth 15 set?"
    a: "In the low-launch profile the fourth club of the seven is stamped 32, so its loft is 32 degrees, with a 62.5-degree lie and a 37.00-inch steel length. The equivalent club is 33 degrees in the mid profile, 34 degrees in the mid-high profile and 35 degrees in the high profile."
  - q: "What clubs are in a stock Ben Hogan Ft. Worth 15 set?"
    a: "Seven clubs spanning 20 to 47 degrees in 4-degree gaps, ordered as one of four launch profiles. That is roughly the equivalent of a 4-iron through pitching wedge, though no head carries a club number."
