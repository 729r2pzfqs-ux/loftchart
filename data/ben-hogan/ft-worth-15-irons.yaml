description: >
  The Ft. Worth 15 was the first iron released by the relaunched Ben Hogan Golf
  Equipment Company and is a compact, progressively weighted forged blade. Its
  defining quirk is that it is not numbered: every head is stamped with its
  actual loft, and Ben Hogan built heads in every loft from 20 to 47 degrees.
  A stock set is seven clubs in 4-degree loft gaps, chosen from one of four
  launch profiles - low 20/24/28/32/36/40/44, mid 21/25/29/33/37/41/45,
  mid-high 22/26/30/34/38/42/46, or high 23/27/31/35/39/43/47. The rows below
  use the low-launch profile; length, lie and swing weight are set by the loft
  band, so the 24-27 degree band is always 38.25 inches and 61 degrees
  regardless of which profile you order. The set was replaced in the line-up by
  the Ft. Worth Black and Ft. Worth White irons.
