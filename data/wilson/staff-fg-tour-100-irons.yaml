description: >
  The FG Tour 100 is the commemorative blade Wilson showed at the PGA Merchandise
  Show in early 2014 to mark 100 years since the company was incorporated, and it
  reached shops in mid-February that year. The head is a three-piece forging with
  a milled diamond-pattern face, a medallion badge on the muscle, triple-knurled
  hosel engraving and a Fluid Feel bore-through insert, styled after Wilson's
  1971 Button Back Dynapower. Lofts are traditional, running from a 21-degree
  3-iron to a 47-degree pitching wedge with a 35-degree 7-iron, and offset is
  very small at 0.110 inches in the 3-iron tapering to 0.050 inches at the
  pitching wedge. The stock set is 3-iron through pitching wedge with a
  51-degree gap wedge available to match. The year_discontinued above follows
  this project's convention of recording the year the successor was announced;
  in practice the FG Tour 100 was a short commemorative run and Wilson had no
  direct blade replacement until the 2019 Staff Model Blade. Figures below are
  the standard men's steel-shaft specification.
