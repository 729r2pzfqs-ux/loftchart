faq:
  - q: "What is the loft of a Wilson Staff FG Tour 100 7-iron?"
    a: "The Wilson Staff FG Tour 100 7-iron has a loft of 35 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a Wilson Staff FG Tour 100 set?"
    a: "The stock set is 3-iron through pitching wedge, with a 51-degree gap wedge available to match."
  - q: "Why is it called the FG Tour 100?"
    a: "It was built for Wilson's centenary in 2014, one hundred years after the company was incorporated, and its styling borrows from the 1971 Button Back Dynapower blade."
  - q: "How do the FG Tour 100 lofts compare with the Staff Model Blade?"
    a: "The FG Tour 100 is a degree weaker in the short irons. Its 7-iron is 35 degrees against the Staff Model Blade's 34, and its pitching wedge is 47 degrees against 46."
