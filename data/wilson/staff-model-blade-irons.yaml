faq:
  - q: "What is the loft of a Wilson Staff Model Blade 7-iron?"
    a: "The Wilson Staff Model Blade 7-iron has a loft of 34 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a Wilson Staff Model Blade set?"
    a: "The Blade is built from 2-iron through pitching wedge, and is normally sold as a 3-PW or 4-PW set. There is no gap wedge in the blade range."
  - q: "Do the Staff Model Blade and Staff Model CB share lofts?"
    a: "Yes. Both run 18 degrees at the 2-iron to 46 degrees at the pitching wedge with the same lengths, so the two can be combined in a mixed set. Only the CB adds a 50-degree gap wedge."
