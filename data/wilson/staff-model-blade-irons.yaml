description: >
  The Staff Model Blade is Wilson's muscle-back tour iron, unveiled in January
  2019 after prototype versions were played on tour and carried forward through
  later refreshes alongside the Staff Model CB cavity back. Heads are
  soft-forged from 8620 carbon steel and then precision milled, with a compact
  profile, minimal offset and Wilson's Fluid Feel Hosel, which removes mass from
  the hosel to allow a slightly larger head and wider sole. Lofts are
  traditional, with a 34-degree 7-iron and a 46-degree pitching wedge, matching
  the Staff Model CB through the set. Clubs are built from 2-iron through
  pitching wedge, with 3-PW and 4-PW the usual stock sets. Figures below are the
  standard men's steel-shaft specification.
