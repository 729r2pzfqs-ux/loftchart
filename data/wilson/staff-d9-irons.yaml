description: >
  The D9 replaced the D7 as Wilson's distance game-improvement iron for 2021,
  keeping the cast stainless steel construction and the perimeter Power Hole
  slots but pairing them with a thinner, faster face and a lower centre of
  gravity. Lofts are very strong: the 7-iron is 27 degrees and the pitching
  wedge 42 degrees, a degree stronger through the mid irons than the D7. Offset
  is substantial in the long irons at just over a quarter of an inch on the
  4-iron, tapering to 0.136 inches at the pitching wedge. The set runs 4-iron
  through sand wedge, with 5-PW plus a 47-degree gap wedge the usual stock
  make-up. All figures are the standard men's steel-shaft specification.
