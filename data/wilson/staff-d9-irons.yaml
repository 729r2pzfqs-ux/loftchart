faq:
  - q: "What is the loft of a Wilson Staff D9 7-iron?"
    a: "The Wilson Staff D9 7-iron has a loft of 27 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What clubs come in a stock Wilson Staff D9 set?"
    a: "The D9 was built from 4-iron through sand wedge. The common stock set is 5-iron through pitching wedge plus a 47-degree gap wedge."
  - q: "How do Wilson Staff D9 lofts compare to the D7?"
    a: "The D9 is about a degree stronger through the mid irons: a 27-degree 7-iron versus 28 degrees, and a 42-degree pitching wedge versus 43 degrees."
