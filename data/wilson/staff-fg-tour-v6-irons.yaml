faq:
  - q: "What is the loft of a Wilson Staff FG Tour V6 7-iron?"
    a: "The Wilson Staff FG Tour V6 7-iron has a loft of 35 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a Wilson Staff FG Tour V6 set?"
    a: "Clubs run 3-iron through pitching wedge with a 51-degree gap wedge available. Sets were normally sold as 3-PW or 4-PW."
  - q: "How much tungsten is in the FG Tour V6?"
    a: "Twenty grams, up from eighteen in the FG Tour V4. It is split 12 grams toe and 8 grams heel in the 3 to 5 irons, centred in the sole in the 6 and 7 irons, and absent from the 8-iron down."
  - q: "How do the FG Tour V6 lofts compare with the Staff Model CB that replaced it?"
    a: "The V6 is a degree weaker in the short irons. Its 7-iron is 35 degrees against the Staff Model CB's 34, and its pitching wedge is 47 degrees against 46."
