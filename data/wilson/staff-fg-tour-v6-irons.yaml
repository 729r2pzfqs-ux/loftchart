description: >
  The FG Tour V6 was Wilson's tour cavity back, announced in the autumn of 2016
  and sold as a 2017 model. Heads are forged from soft 8620 carbon steel and
  carry 20 grams of tungsten, up from 18 grams in the FG Tour V4, split 12 grams
  toe and 8 grams heel in the 3 to 5 irons, moved to the centre of the sole in
  the 6 and 7 irons and dropped entirely in the scoring clubs. The profile is a
  players' one, with a thin topline, short blade length and minimal offset, and
  lofts are traditional at 35 degrees for the 7-iron and 47 degrees for the
  pitching wedge. Clubs run 3-iron through pitching wedge with a 51-degree gap
  wedge available, sold most often as a 3-PW or 4-PW set. Figures below are the
  standard men's steel-shaft specification; see sources for how weakly the full
  ladder is corroborated.
