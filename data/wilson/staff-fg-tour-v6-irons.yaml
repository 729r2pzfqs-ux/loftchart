sources:
  - "Qsponge 'What is loft angle of Wilson Staff FG Tour V6 Irons?' — a user-posted specification table (club, loft, lie, length, offset in millimetres, swing weight, 3-iron through GW). This is the only full ladder retrieved for the model and it is a single weak source, which is why confidence is set to low."
  - "Today's Golfer 'Wilson Staff FG Tour V6 Irons Review' and Golf Monthly 'Wilson Staff FG Tour V6 irons' (9 November 2016) — independently confirm the 35-degree 7-iron at 37.25 inches and describe the lofts as very traditional. These two corroborate the Qsponge table at the 7-iron only."
  - "Golfalot 'Wilson Staff Launch FG Tour V6 Irons' (27 September 2016) — announcement date, the 8620 carbon steel forging and tungsten weighting in the 3 to 7 irons. year_introduced records the 2016 announcement even though the model was marketed as a 2017 iron, per this project's convention."
  - "Plugged In Golf 'Wilson Staff FG Tour V6 Irons Review' — True Temper Dynamic Gold AMT stock shaft and the tungsten placement changing through the set."
  - "Offset is omitted deliberately: the Qsponge table gives it in millimetres and a separate listing quotes the same figures as negative values, so the sign and unit could not be resolved. Bounce and swing weight are omitted for lack of a corroborated source."
