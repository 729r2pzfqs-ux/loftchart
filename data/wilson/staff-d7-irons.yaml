description: >
  The D7 was Wilson's distance-oriented game-improvement iron for the 2019
  season, replacing the D300 and using a cast stainless steel head with
  Wilson's Power Hole slots around the perimeter of the sole and toe. The number
  of Power Hole rows is reduced through the set, from three rows in the long
  irons down to one in the pitching wedge, trading speed in the long irons for
  feel in the short ones. Lofts are strong, with a 28-degree 7-iron and a
  43-degree pitching wedge, roughly a degree stronger than the D300 through the
  4 to 8 irons. The stock steel set is 5-iron through pitching wedge with a
  48-degree gap wedge available to match. Figures below are the standard men's
  steel-shaft specification.
