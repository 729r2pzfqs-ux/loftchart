faq:
  - q: "What is the loft of a Wilson Staff Model CB 7-iron?"
    a: "The Wilson Staff Model CB 7-iron has a loft of 34 degrees, with a 62-degree lie and a 37.25-inch steel-shaft length."
  - q: "What clubs come in a stock Wilson Staff Model CB set?"
    a: "The stock set is 4-iron through pitching wedge. The model is built from 2-iron through a 50-degree gap wedge, so longer irons and the gap wedge can be added."
  - q: "How is the Staff Model CB different from the Staff Model Blade?"
    a: "The CB is a forged cavity back with a Tri-Brace stabiliser and tungsten toe weighting for more forgiveness, while the Blade is a muscle-back. They share the same lofts, lies and lengths from the 2-iron through the pitching wedge."
