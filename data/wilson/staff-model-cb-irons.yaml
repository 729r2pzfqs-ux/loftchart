description: >
  The Staff Model CB is Wilson's forged players cavity back, announced in
  October 2020 as the successor to the FG Tour V6 and still in the line through
  later refreshes. The head is soft-forged 8620 carbon steel with a Tri-Brace
  stabiliser bracing the cavity in three places and about twenty grams of
  high-density tungsten in the toe of the long and mid irons. It is a compact
  players shape with a thin topline and very little offset, tapering from 0.12
  inches at the 2-iron to 0.04 inches at the gap wedge. Lofts are traditional
  for a players iron, with a 34-degree 7-iron and a 46-degree pitching wedge.
  Clubs are built from 2-iron through gap wedge, with 4-PW the stock set.
