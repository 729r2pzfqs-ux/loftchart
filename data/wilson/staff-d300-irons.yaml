faq:
  - q: "What is the loft of a Wilson Staff D300 7-iron?"
    a: "The Wilson Staff D300 7-iron has a loft of 29.5 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What clubs come in a Wilson Staff D300 set?"
    a: "The stock set is 4-iron through pitching wedge plus a 48-degree gap wedge. A 54-degree sand wedge was sold to match."
  - q: "What are Power Holes on the Wilson Staff D300?"
    a: "They are slots around the perimeter of the face, filled with TE031 urethane, that let most of the face flex independently of the body. Wilson called the system FLX Face."
  - q: "How do the D300 lofts compare with the D7 that replaced it?"
    a: "The D7 is roughly a degree stronger through the middle of the set. The D7 7-iron is 28 degrees against the D300's 29.5, and the pitching wedge is 43 degrees in both."
