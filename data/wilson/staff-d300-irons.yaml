description: >
  The D300 was Wilson's distance game-improvement iron, announced on 10 January
  2017 and on sale from 23 January. Its FLX Face technology used Power Holes
  filled with TE031 urethane running all the way around the perimeter of the
  face, which Wilson said left about three quarters of the face free to flex,
  and weight pods machined from 17-4 stainless steel sat in the heel and toe of
  a wide, relieved sole. Lofts step in a widening progression from a 20.5-degree
  4-iron to a 43-degree pitching wedge, with a 29.5-degree 7-iron, about a
  degree stronger than the D200 through the middle irons. The stock set is
  4-iron through pitching wedge with a 48-degree gap wedge, and a 54-degree sand
  wedge was sold to match. Figures below are the standard men's steel-shaft
  specification.
