sources:
  - "2nd Swing Golf 'Wilson Staff D300 Iron Set' specification table (club, loft, length, lie, swing weight, 4-iron through SW) — retrieved July 2026. Retailer-published table, not a Wilson spec sheet. Lengths and lofts here are the ones used in this file."
  - "Qsponge 'What is loft angle of Wilson Staff D300 Irons?' — a second user-posted table that matches 2nd Swing on every loft except the 5-iron (23.5 against 23.0) and supplies the 63.0-degree 8-iron lie used here. Its length column is shifted by one club relative to every other source and was discarded; its millimetre offset column was discarded too, so offset is omitted."
  - "Golf Monthly 'Wilson Staff D300 Irons Review' (6 March 2017) and Golfalot 'Wilson Staff D300 Irons Review' — independently confirm the 29.5-degree 7-iron and the 26-degree 6-iron, and the FLX Face, urethane-filled Power Hole and 17-4 weight pod construction."
  - "The Golf News Net 'Wilson Staff D300 irons: preview, photos, specs, release date' (10 January 2017) — announcement date, 23 January 2017 release, the 4-9/PW/GW set composition and the KBS Tour 80 steel and Matrix Speed Rulz A-Type 54g graphite stock shafts."
  - "The 5-iron loft is given as 23.0 following 2nd Swing, which fits the model's regular 2.5/3.0/3.5/4.0/4.5/5.0-degree gap progression; Qsponge's 23.5 would break it. Bounce and offset are omitted for want of a corroborated source."
  - "year_discontinued 2019 is derived: it is the announcement year of the D7, per this project's convention, not a sourced end-of-production date."
