description: >
  DYNAPWR is the 2025 replacement for the cast Dynapower and is a different head,
  not a restyling of it. Wilson dropped the Power Hole slots that had run through
  several generations of its distance irons and moved to a hollow body with an
  Energy Transfer Chassis, a PKR-Cup cup face and a Velocity Optimization
  Channel. Lofts are half a degree to a degree weaker than the 2023 Dynapower
  through most of the set, with a 28-degree 7-iron against the Dynapower's 27 and
  a 42.5-degree pitching wedge against 42, which is unusual for a successor and
  reflects the higher launch the cup face produces. The set runs 4-iron through a
  48-degree gap wedge and was announced on 29 January 2025 alongside a
  super-game-improvement DYNAPWR Max with weaker lofts again. Figures below are
  the standard men's steel-shaft specification.
