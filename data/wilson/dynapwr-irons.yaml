faq:
  - q: "What is the loft of a Wilson DYNAPWR 7-iron?"
    a: "The Wilson DYNAPWR 7-iron has a loft of 28 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What clubs come in a Wilson DYNAPWR set?"
    a: "The set runs 4-iron through pitching wedge plus a 48-degree gap wedge, sold as a six or seven piece set depending on the retailer."
  - q: "Is the DYNAPWR the same iron as the 2023 Dynapower?"
    a: "No. The 2025 DYNAPWR is a different head. It replaced the cast Dynapower's Power Hole sole slots with a hollow body, an Energy Transfer Chassis and a PKR-Cup face, and its lofts are half a degree to a degree weaker through the set."
  - q: "How do DYNAPWR lofts compare with Dynapower lofts?"
    a: "DYNAPWR is slightly weaker. The 7-iron is 28 degrees against the Dynapower's 27, and the pitching wedge is 42.5 degrees against 42. Lengths and lies are unchanged."
