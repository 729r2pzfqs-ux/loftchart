faq:
  - q: "What is the loft of a Wilson Staff Ci11 7-iron?"
    a: "The Wilson Staff Ci11 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "Are the Wilson Staff Ci11 lofts the same as the Ci9?"
    a: "Yes. The Ci11 carries the same loft ladder as the Ci9, from a 20-degree 3-iron to a 44-degree pitching wedge. The lie angles in the short irons differ by half a degree."
  - q: "What is the pitching wedge loft on the Wilson Staff Ci11?"
    a: "The Ci11 pitching wedge is 44 degrees, with a 48-degree gap wedge and 56-degree sand wedge available to match."
