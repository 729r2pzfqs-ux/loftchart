description: >
  The Staff Ci11 replaced the Ci9 as Wilson Staff's cavity-back iron for the
  mid-handicap "control player", and was also sold in a black-finish version.
  It is a cast stainless steel head with a deep undercut cavity and progressive
  sizing through the set. Lofts carry over from the Ci9: a 32-degree 7-iron and
  a 44-degree pitching wedge, which is stronger than most game-improvement sets
  of the period. The set ran 3-iron through sand wedge, with 4-PW the common
  stock make-up and the 48-degree gap wedge and 56-degree sand wedge sold as
  matching add-ons. Figures below are the standard men's steel-shaft
  specification.
