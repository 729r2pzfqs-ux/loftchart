description: >
  The Staff Ci9 was Wilson Staff's mid-handicap cavity-back iron for 2009, sold
  alongside the Fi5 and the FG Tour blades and aimed at what Wilson called the
  "control player". It uses a cast stainless steel head with a deep undercut
  cavity and progressive head sizing, getting more compact through the short
  irons. Lofts are moderately strong for the period, with a 32-degree 7-iron and
  a 44-degree pitching wedge. Clubs were offered from 3-iron through sand wedge,
  with 4-PW the common stock set and gap and sand wedges sold as matching
  add-ons. Lengths run half an inch apart from a 37.5-inch 7-iron. All figures
  are the standard men's steel-shaft specification.
