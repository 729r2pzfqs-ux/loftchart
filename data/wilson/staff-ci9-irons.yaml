faq:
  - q: "What is the loft of a Wilson Staff Ci9 7-iron?"
    a: "The Wilson Staff Ci9 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Wilson Staff Ci9?"
    a: "The Ci9 pitching wedge is 44 degrees. A matching 48-degree gap wedge and 56-degree sand wedge were also offered."
  - q: "What clubs came in a Wilson Staff Ci9 set?"
    a: "The Ci9 was built from 3-iron through sand wedge. The usual stock set was 4-iron through pitching wedge, with the gap and sand wedges available separately."
