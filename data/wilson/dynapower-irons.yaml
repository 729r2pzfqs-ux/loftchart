description: >
  Dynapower revived a historic Wilson name for 2023, replacing the D9 as the
  brand's distance game-improvement iron. The cast stainless steel head moves
  mass to the toe for a higher moment of inertia and keeps the centre of gravity
  low for a high launch and steep descent. Lofts and lengths carry over from the
  D9 unchanged: a 27-degree 7-iron at 37.5 inches and a 42-degree pitching
  wedge, with offset tapering from 0.236 inches at the 5-iron to 0.136 inches at
  the pitching wedge. The stock set is 5-iron through pitching wedge plus a
  47-degree gap wedge, with a 4-iron and a 53-degree sand wedge available to
  match. A separate forged Dynapower model with weaker lofts was sold alongside
  it and is a different head.
