faq:
  - q: "What is the loft of a Wilson Dynapower 7-iron?"
    a: "The Wilson Dynapower 7-iron has a loft of 27 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What clubs come in a stock Wilson Dynapower set?"
    a: "The stock set is 5-iron through pitching wedge plus a 47-degree gap wedge. A 4-iron and a 53-degree sand wedge are available to match."
  - q: "Are the Wilson Dynapower lofts the same as the D9?"
    a: "Yes. The cast Dynapower carries the D9 ladder unchanged, from an 18-degree 4-iron to a 42-degree pitching wedge, with the same lengths, lies and offsets."
  - q: "Is the Dynapower Forged the same iron?"
    a: "No. The forged Dynapower is a separate players-distance head with weaker lofts, including a 30.5-degree 7-iron and a 44-degree pitching wedge."
