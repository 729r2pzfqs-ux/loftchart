description: >
  The ZX7 is the players model in Srixon's first ZX iron line, sitting above the ZX5 and
  ZX4. The head is forged from 1020 carbon steel, with tungsten in the toe of the 3-iron
  through 7-iron to raise MOI without widening the profile, and it carries the narrowest
  sole and least offset in the line. Lofts are traditional for a players iron, with a
  32-degree 7-iron and a 46-degree pitching wedge, and lengths and lies match the rest of
  the ZX line. Individual heads run 3-iron through a 51-degree approach wedge, with 3-PW in
  right and left hand and the approach wedge right hand only. Offsets below are converted
  from Srixon's published millimetre figures (for example the 7-iron is 2.9 mm, or 0.114
  inches).
