faq:
  - q: "What is the loft of a Srixon ZX7 7-iron?"
    a: "The Srixon ZX7 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX7 set?"
    a: "Heads run 3-iron through a 51-degree approach wedge. The 3-iron through pitching wedge are offered in both right and left hand; the approach wedge is right hand only."
  - q: "How much offset does the Srixon ZX7 have?"
    a: "Srixon lists 2.9 mm (0.114 inches) of offset at the 7-iron, ranging from 3.6 mm (0.142 inches) in the 3-iron down to 1.4 mm (0.055 inches) in the approach wedge — the least offset in the ZX line."
