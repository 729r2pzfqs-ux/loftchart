faq:
  - q: "What is the loft of a Srixon ZX7 Mk II 7-iron?"
    a: "The Srixon ZX7 Mk II 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX7 Mk II set?"
    a: "Heads run 3-iron through a 51-degree approach wedge, plus a 57-degree sand wedge. The 3-iron through pitching wedge are offered in both right and left hand; the approach and sand wedges are right hand only."
  - q: "What is PureFrame on the Srixon ZX7 Mk II?"
    a: "PureFrame is a ridge forged into the back of the head directly behind the sweet spot, made as an 80 percent thicker section of 1020 carbon steel to cut unwanted vibration at impact. It was exclusive to the ZX7 Mk II within the ZX Mk II line."
