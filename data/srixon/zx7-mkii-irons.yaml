description: >
  The ZX7 Mk II is the players model in Srixon's second ZX iron generation, announced on
  11 January 2023 and sitting above the ZX5 Mk II and ZX4 Mk II. Its defining feature is
  PureFrame, a ridge forged into the body just behind the sweet spot as an 80 percent
  thicker section of 1020 carbon steel, intended to reduce vibration at impact. Lofts carry
  over unchanged from the original ZX7, with a 32-degree 7-iron and a 46-degree pitching
  wedge, and it has the narrowest sole and least offset in the line at 15.1 mm and 2.8 mm
  at the 7-iron. Heads run 3-iron through a 51-degree approach wedge plus a 57-degree sand
  wedge, with 3-PW in right and left hand and the AW and SW in right hand only. Offsets
  below are converted from Srixon's published millimetre figures (for example the 7-iron is
  2.8 mm, or 0.110 inches).
