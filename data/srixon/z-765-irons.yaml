faq:
  - q: "What is the loft of a Srixon Z 765 7-iron?"
    a: "The Srixon Z 765 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon Z 765 set?"
    a: "The stock range is 3-iron through pitching wedge, available in both right and left hand, plus a 51-degree approach wedge offered in right hand only. The set was offered in steel shafts only."
  - q: "How much offset do the Srixon Z 765 irons have?"
    a: "Very little for the category. Srixon lists 0.104 inches of offset at the 7-iron, falling to 0.073 inches at the pitching wedge, against 0.128 and 0.089 inches on the more forgiving Z 565."
  - q: "Did the lofts change between the Srixon Z 765 and the Z 785?"
    a: "No. The Z 785 carries over the Z 765 lofts unchanged, from a 20-degree 3-iron through a 32-degree 7-iron to a 51-degree approach wedge."
