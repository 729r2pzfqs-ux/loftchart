description: >
  The Z 765 is the muscle-cavity players model in Srixon's 2016 three-model Z Series iron
  line, sitting between the Z 565 cavity back and the Z 965 blade. Srixon describes it as
  ultra-soft 1020 carbon steel combined with a new special heat treatment and precision
  forged, with the revised Tour V.T. sole and grooves five percent larger than the previous
  Z 745 generation. Lofts are traditional for a players iron, with a 32-degree 7-iron and a
  46-degree pitching wedge, and offset is minimal — 0.104 inches at the 7-iron against 0.128
  inches on the Z 565. Those lofts carry over unchanged into the Z 785 that replaced it. The
  stock range is 3-iron through pitching wedge in right and left hand, with a 51-degree
  approach wedge in right hand only, and the set is offered in steel only. Srixon published
  this model's offset figures directly in inches, so no unit conversion was applied. The Tour
  V.T. sole is listed with separate leading- and trailing-edge bounce figures rather than a
  single bounce number, so bounce is omitted here. Srixon announced the club in July 2016 and
  it reached retail on 16 September 2016, so it is often catalogued as a 2017 model.
