description: >
  The ZXi5 is the players-distance model in Srixon's ZXi iron line, which replaced the ZX Mk
  II generation. It is built with Srixon's i-Forged process: Condensed Forging, in which a
  second forging step presses raised features back into the head to add localised strength
  along the topline and high toe, which in turn allows softer steel and softer heat
  treatment elsewhere. Srixon states the ZXi5 face plate is 14 percent softer than the
  previous generation. Behind the face sits the third generation of MainFrame milling, and
  tungsten weighting sets the centre of gravity. Lofts carry over unchanged from the ZX5 Mk
  II, with a 31-degree 7-iron and a 44-degree pitching wedge. The published lengths look a
  quarter-inch longer than the ZX5 Mk II, but they are not: Srixon changed how it measures
  and publishes iron length to match USGA and R&A industry guidelines, and states directly
  that the actual length of the irons has not changed. The figures below are Srixon's
  published ZXi-convention lengths, so comparing them with the pre-ZXi models in this
  database will overstate the difference by about a quarter inch. Heads run 3-iron through a
  56-degree sand wedge, with the 3-iron and one sand wedge variant custom-order only and the
  sand wedges right hand only. Offsets are converted from Srixon's published millimetre
  figures (the 7-iron is 3.2 mm, or 0.126 inches). Swing weights are the S-flex steel column.
  Srixon unveiled the line in late 2024 and it reached retail in January 2025, so it is
  commonly catalogued as a 2025 model.
