faq:
  - q: "What is the loft of a Srixon ZXi5 7-iron?"
    a: "The Srixon ZXi5 7-iron has a loft of 31 degrees, with a 62-degree lie and a published steel-shaft length of 37.25 inches."
  - q: "Why is the Srixon ZXi5 7-iron listed at 37.25 inches when the ZX5 Mk II was 37 inches?"
    a: "Only the measuring convention changed. Srixon altered how it measures and publishes iron length to match USGA and R&A industry guidelines, which added about a quarter inch to the published figures, and states that the actual length of the irons has not changed."
  - q: "What clubs come in a stock Srixon ZXi5 set?"
    a: "Heads run 3-iron through a 56-degree sand wedge, with 4-iron through approach wedge the usual stock range in right and left hand. Srixon lists the 3-iron and one sand wedge variant as custom order only, and the sand wedges as right hand only."
  - q: "Did the lofts change between the Srixon ZX5 Mk II and the ZXi5?"
    a: "No. The ZXi5 carries over the ZX5 Mk II lofts unchanged, from a 20-degree 3-iron through a 31-degree 7-iron to a 50-degree approach wedge."
