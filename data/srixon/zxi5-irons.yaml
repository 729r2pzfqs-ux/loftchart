sources:
  - "Srixon / Dunlop Sports US official ZXi5 irons product page (us.dunlopsports.com/srixon/clubs/irons/zxi5-irons/zxi5-irons/MZXI5IRN.html) — full per-club specification table (head, loft, hand, lie, offset in mm, length, steel S-flex and R-flex swing weight, graphite R-flex and A-flex swing weight, 3-iron through SW), the footnote '3 & SW Iron Offered Custom Only' and the RH/LH availability column showing the sand wedges as right hand only"
  - "Same Dunlop Sports US page, length footnote: 'To match USGA and R&A Industry guidelines, Srixon has modified how club lengths are measured and published. Our published length specifications are now approximately 1/4 inch longer for Irons. Note: The actual length of the Irons has not changed, only how they are measured.' This is why the lengths recorded here sit a quarter inch above the ZX5 Mk II figures despite the club being physically unchanged in length"
  - "Same Dunlop Sports US page, technology copy: i-FORGED and Condensed Forging ('The hydraulic dies which forge red-hot billets into ZXi Irons imprint an array of raised features onto each rough Iron shape. A second forge condenses those protrusions back into the clubhead'), the Ideal Steel note that 'ZXi5 and ZXiU face plates are also 14% softer', Heat Softening, third-generation MainFrame, Tour V.T. Sole, progressive grooves and the players-distance shape description ('a slightly wider sole with moderate blade length and offset')"
  - "Same Dunlop Sports US page, stock shaft tables: True Temper Dynamic Gold Mid 115/100 (S300 115g / R300 105g), KBS TGI Tour Graphite Iron (S 80g / R 60g), UST Mamiya Recoil Dart 65 (A/F2 56g) and UST Helium Nanocore 50 (L/F1 53g), with a Golf Pride Tour Velvet 360 52g grip"
  - "Formal unveiling on 25 November 2024 per Golf Australia Magazine's ZXi launch release, with prototype ZXi5 and ZXi7 heads seeded on tour at the September 2024 Procore Championship (GolfWRX) and US retail availability in January 2025. year_introduced uses the announcement year per the repository convention, which is why it reads 2024 rather than the 2025 model year"
  - "The successor field is set to null because the ZXi5 remains a current model and no successor record exists in this database. A separate GolfSource listing giving the ZXi5 4-iron as 21 degrees was rejected in favour of Srixon's own table, which gives 22 degrees"
