description: >
  The ZX5 Mk II is the distance model in Srixon's second ZX iron generation, announced on
  11 January 2023 and sitting between the ZX7 Mk II and the ZX4 Mk II. It carries the
  second generation of Srixon's MainFrame technology, a variable-thickness pattern of
  grooves, channels and cavities milled into the back of the face to maximise flex at
  impact and shift mass to the toe and sole. Lofts carry over unchanged from the original
  ZX5, with a 31-degree 7-iron and a 44-degree pitching wedge, and lies and lengths match
  the rest of the ZX Mk II line. Heads run 3-iron through a 50-degree approach wedge, with
  4-AW the usual stock set. Offsets below are converted from Srixon's published millimetre
  figures (for example the 7-iron is 3.2 mm, or 0.126 inches); the 3-iron and approach
  wedge offsets are omitted because Srixon's per-club table for this head covers 4-iron
  through pitching wedge only.
