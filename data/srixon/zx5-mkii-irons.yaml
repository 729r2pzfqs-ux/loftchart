faq:
  - q: "What is the loft of a Srixon ZX5 Mk II 7-iron?"
    a: "The Srixon ZX5 Mk II 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX5 Mk II set?"
    a: "Heads run 3-iron through a 50-degree approach wedge, with 4-iron through approach wedge the usual stock set."
  - q: "Did the lofts change between the Srixon ZX5 and the ZX5 Mk II?"
    a: "No. The ZX5 Mk II carries over the ZX5 lofts unchanged, from a 20-degree 3-iron through a 31-degree 7-iron to a 50-degree approach wedge."
