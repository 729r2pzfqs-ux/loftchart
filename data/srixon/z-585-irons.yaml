description: >
  The Z 585 is the distance half of Srixon's 2018 two-model Z Series iron line, sitting
  below the tour-oriented Z 785. It uses a body forged from soft 1020 carbon steel with a
  SUP10 face insert, and adds a Speed Groove — an internal channel behind the face insert
  that increases face flex for ball speed. Lofts are moderately strong for a compact head,
  with a 31-degree 7-iron and a 44-degree pitching wedge. The stock range is 3-iron through
  pitching wedge in right and left hand, with a 50-degree approach wedge in right hand only.
  Srixon published this model's offset figures directly in inches, so no unit conversion was
  applied. The sole is Srixon's Tour V.T. design, for which Srixon lists separate leading-
  and trailing-edge bounce figures rather than a single bounce number, so bounce is omitted here.
