faq:
  - q: "What is the loft of a Srixon Z 585 7-iron?"
    a: "The Srixon Z 585 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon Z 585 set?"
    a: "The stock range is 3-iron through pitching wedge, available in both right and left hand, plus a 50-degree approach wedge offered in right hand only."
  - q: "What is the difference between the Srixon Z 585 and Z 785?"
    a: "The Z 585 is the distance model, with a SUP10 face insert and a Speed Groove for extra face flex and stronger lofts (31-degree 7-iron). The Z 785 is the players model, forged from a single billet of 1020 carbon steel with a tour cavity and weaker lofts (32-degree 7-iron)."
