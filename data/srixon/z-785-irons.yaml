description: >
  The Z 785 is the players model in Srixon's 2018 two-model Z Series iron line, sitting
  above the distance-oriented Z 585. It is forged from a single billet of soft 1020 carbon
  steel and uses a tour cavity that concentrates mass behind the impact area for shot
  shaping. Lofts are traditional for a modern players iron, with a 32-degree 7-iron and a
  46-degree pitching wedge. The stock range is 3-iron through pitching wedge in right and
  left hand, with a 51-degree approach wedge in right hand only. Srixon published this
  model's offset figures directly in inches, so no unit conversion was applied. The sole is
  Srixon's Tour V.T. design, for which Srixon lists separate leading- and trailing-edge
  bounce figures rather than a single bounce number, so bounce is omitted here.
