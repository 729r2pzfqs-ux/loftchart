faq:
  - q: "What is the loft of a Srixon Z 785 7-iron?"
    a: "The Srixon Z 785 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon Z 785 set?"
    a: "The stock range is 3-iron through pitching wedge, available in both right and left hand, plus a 51-degree approach wedge offered in right hand only."
  - q: "Are the Srixon Z 785 irons forged?"
    a: "Yes. The Z 785 head is forged from a single billet of soft 1020 carbon steel, with a tour cavity behind the impact area."
