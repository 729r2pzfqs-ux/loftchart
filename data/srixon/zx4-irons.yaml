faq:
  - q: "What is the loft of a Srixon ZX4 7-iron?"
    a: "The Srixon ZX4 7-iron has a loft of 28.5 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX4 set?"
    a: "The stock set is eight clubs, 4-iron through a 49-degree approach wedge. The 4-iron through pitching wedge are offered in both right and left hand; the approach wedge is right hand only."
  - q: "Are the Srixon ZX4 irons hollow?"
    a: "Yes. The ZX4 is a hollow-body iron with a 431 stainless steel body, a forged HT1770 high-strength steel face and tungsten in the sole of the 4-iron through 7-iron."
