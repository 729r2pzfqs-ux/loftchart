description: >
  The ZX4 is the most forgiving model in Srixon's first ZX iron line, added a season after
  the ZX5 and ZX7. It uses a hollow-body construction with a 431 stainless steel body, a
  forged HT1770 high-strength steel face and Srixon's MainFrame milled pattern behind the
  face, plus tungsten in the sole of the 4-iron through 7-iron to lower the centre of
  gravity. Lofts are the strongest in the ZX line, with a 28.5-degree 7-iron and a
  43-degree pitching wedge, while lies and lengths match the ZX5 and ZX7. The stock set is
  eight clubs, 4-iron through a 49-degree approach wedge, with 4-PW in right and left hand
  and the approach wedge right hand only. Offsets below are converted from Srixon's
  published millimetre figures (for example the 7-iron is 3.7 mm, or 0.146 inches).
