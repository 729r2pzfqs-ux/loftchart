faq:
  - q: "What is the loft of a Srixon ZX5 7-iron?"
    a: "The Srixon ZX5 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX5 set?"
    a: "Heads run 3-iron through a 50-degree approach wedge. The 3-iron through pitching wedge are offered in both right and left hand; the approach wedge is right hand only."
  - q: "What is the difference between the Srixon ZX5 and ZX7?"
    a: "The ZX5 is the distance model, with a forged SUP10 face insert, MainFrame face milling and stronger lofts (31-degree 7-iron). The ZX7 is the players model, with a forged 1020 carbon steel body, a narrower sole and weaker lofts (32-degree 7-iron)."
