description: >
  The ZX5 is the distance model in Srixon's first ZX iron line, sitting between the
  tour-oriented ZX7 and the hollow-body ZX4. It pairs a forged 1020 carbon steel body with
  a forged SUP10 face insert, adds Srixon's MainFrame variable-thickness milled pattern
  behind the face for ball speed, and places tungsten in the toe of the 3-iron through
  7-iron to raise MOI. Lofts are moderately strong, with a 31-degree 7-iron and a
  44-degree pitching wedge, and lengths and lies match the rest of the ZX line. Individual
  heads run 3-iron through a 50-degree approach wedge, with 3-PW in right and left hand and
  the approach wedge right hand only. Offsets below are converted from Srixon's published
  millimetre figures (for example the 7-iron is 3.2 mm, or 0.126 inches).
