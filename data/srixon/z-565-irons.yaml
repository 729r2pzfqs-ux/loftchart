description: >
  The Z 565 is the cavity-back distance model in Srixon's 2016 three-model Z Series iron
  line, sitting below the Z 765 muscle cavity and the Z 965 blade. Srixon describes it as a
  1020 carbon steel body that is precision forged, with a high-strength SUP10 face insert
  for ball speed, a revised Tour V.T. sole and grooves five percent larger than the previous
  Z 545 generation. Lofts are moderately strong for a forged cavity back, with a 31-degree
  7-iron and a 44-degree pitching wedge, and they carry over unchanged into the Z 585 that
  replaced it. The stock range is 3-iron through pitching wedge in right and left hand, with
  a 50-degree approach wedge in right hand only. Srixon published this model's offset
  figures directly in inches, so no unit conversion was applied. The Tour V.T. sole is listed
  with separate leading- and trailing-edge bounce figures rather than a single bounce number,
  so bounce is omitted here. Swing weights below are the steel-shaft column; the graphite
  build is one point lighter throughout. Srixon announced the club in July 2016 and it
  reached retail on 16 September 2016, so it is often catalogued as a 2017 model.
