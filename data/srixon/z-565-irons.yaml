faq:
  - q: "What is the loft of a Srixon Z 565 7-iron?"
    a: "The Srixon Z 565 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon Z 565 set?"
    a: "The stock range is 3-iron through pitching wedge, available in both right and left hand, plus a 50-degree approach wedge offered in right hand only."
  - q: "What is the difference between the Srixon Z 565 and Z 765?"
    a: "The Z 565 is the forged cavity-back distance model, with a SUP10 face insert and stronger lofts (31-degree 7-iron). The Z 765 is the muscle-cavity players model, forged from 1020 carbon steel throughout, with less offset and weaker lofts (32-degree 7-iron)."
  - q: "Did the lofts change between the Srixon Z 565 and the Z 585?"
    a: "No. The Z 585 carries over the Z 565 lofts unchanged, from a 20-degree 3-iron through a 31-degree 7-iron to a 50-degree approach wedge."
