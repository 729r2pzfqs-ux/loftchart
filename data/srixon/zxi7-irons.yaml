faq:
  - q: "What is the loft of a Srixon ZXi7 7-iron?"
    a: "The Srixon ZXi7 7-iron has a loft of 32 degrees, with a 62-degree lie and a published steel-shaft length of 37.25 inches."
  - q: "Why is the Srixon ZXi7 7-iron listed at 37.25 inches when the ZX7 Mk II was 37 inches?"
    a: "Only the measuring convention changed. Srixon altered how it measures and publishes iron length to match USGA and R&A industry guidelines, which added about a quarter inch to the published figures, and states that the actual length of the irons has not changed."
  - q: "What clubs come in a stock Srixon ZXi7 set?"
    a: "The stock sets are 4-iron through pitching wedge and 5-iron through pitching wedge, with the 3-iron and the 51-degree approach wedge sold individually. A 57-degree sand wedge is offered custom order and right hand only."
  - q: "What is the difference between the Srixon ZXi7 and ZXi5?"
    a: "The ZXi7 is the players model, a single-piece forged S15C body with a PureFrame ridge, a thin topline, minimal offset and traditional lofts (32-degree 7-iron). The ZXi5 is the players-distance model, with a softened forged face plate, MainFrame milling, a wider sole, more offset and stronger lofts (31-degree 7-iron)."
