sources:
  - "Srixon / Dunlop Sports US official ZXi7 irons product page (us.dunlopsports.com/srixon/clubs/irons/zxi7-irons/zxi7-irons/MZXI7IRN.html) — full per-club specification table (head, loft, hand, lie, offset in mm, length, swing weight, 3-iron through SW), the footnote 'SW Offered Custom Only', the RH/LH availability column showing the sand wedges as right hand only, and the set-builder options listing 4i-PW and 5i-PW sets with the AW and 3-iron sold individually"
  - "Same Dunlop Sports US page, length footnote: 'To match USGA and R&A Industry guidelines, Srixon has modified how club lengths are measured and published. Our published length specifications are now approximately 1/4 inch longer for Irons. Note: The actual length of the Irons has not changed, only how they are measured.' This is why the lengths recorded here sit a quarter inch above the ZX7 Mk II figures despite the club being physically unchanged in length"
  - "Same Dunlop Sports US page, technology copy: i-FORGED ('Proprietary Condensed Forging inserts added strength in the hosel area, which allows for the use of new, softer S15C steel in the single-piece Iron body'), the Ideal Steel note that S15C 'makes ZXi7 7% softer', Heat Softening, the enlarged PureFrame forged ridge behind the sweet spot, Tour V.T. Sole, progressive grooves and the players-iron shape description ('A thin topline, narrow sole, short blade, and minimal offset')"
  - "Same Dunlop Sports US page, stock shaft table: True Temper Dynamic Gold Mid 115/100 (S300 115g / R114 105g), with a Golf Pride Tour Velvet 360 52g grip. Srixon lists no stock graphite option for this model"
  - "Formal unveiling on 25 November 2024 per Golf Australia Magazine's ZXi launch release, with prototype ZXi5 and ZXi7 heads seeded on tour at the September 2024 Procore Championship (GolfWRX) and US retail availability in January 2025. year_introduced uses the announcement year per the repository convention, which is why it reads 2024 rather than the 2025 model year"
  - "The successor field is set to null because the ZXi7 remains a current model and no successor record exists in this database"
