description: >
  The ZXi7 is the players model in Srixon's ZXi iron line, which replaced the ZX Mk II
  generation. It is built with Srixon's i-Forged process: Condensed Forging inserts extra
  strength in the hosel area, which Srixon says is what allows it to use the softer S15C
  steel in a single-piece body — a head it describes as 7 percent softer than the previous
  generation, the softest steel it has used in an iron. Behind the sweet spot sits an
  enlarged forged PureFrame ridge, and tungsten weighting sets the centre of gravity. Lofts
  carry over unchanged from the ZX7 Mk II, with a 32-degree 7-iron and a 46-degree pitching
  wedge, and offset is the least in the line at 2.8 mm in the 7-iron. The published lengths
  look a quarter-inch longer than the ZX7 Mk II, but they are not: Srixon changed how it
  measures and publishes iron length to match USGA and R&A industry guidelines, and states
  directly that the actual length of the irons has not changed. The figures below are
  Srixon's published ZXi-convention lengths, so comparing them with the pre-ZXi models in
  this database will overstate the difference by about a quarter inch. Heads run 3-iron
  through a 57-degree sand wedge, with 4-PW and 5-PW the stock sets and the 3-iron and
  approach wedge available individually. Offsets are converted from Srixon's published
  millimetre figures (the 7-iron is 2.8 mm, or 0.110 inches). Srixon unveiled the line in
  late 2024 and it reached retail in January 2025, so it is commonly catalogued as a 2025
  model.
