description: >
  The ZX4 Mk II is the most forgiving model in Srixon's second ZX iron generation, announced
  on 11 January 2023 alongside the ZX5 Mk II and ZX7 Mk II. It keeps the hollow head design
  of the original ZX4 and carries the second generation of Srixon's MainFrame technology, a
  variable-thickness pattern of grooves, channels and cavities milled into the back of the
  face that boosts COR and moves mass into the toe and sole. Lofts are the strongest in the
  ZX Mk II line and are unchanged from the original ZX4, with a 28.5-degree 7-iron and a
  43-degree pitching wedge — 2.5 degrees stronger than the ZX5 Mk II at the 7-iron. Srixon's
  own comparison chart gives the ZX4 Mk II the longest blade length in the line (80.9 mm at
  the 7-iron) and the most hosel offset (3.4 mm), with a 20.7 mm sole, but the same 6.0 mm
  topline as the ZX5 and ZX7. Heads run 4-iron through a 56-degree sand wedge, with 4-PW in
  right and left hand and the approach and sand wedges right hand only. Offsets below are
  converted from Srixon's published millimetre figures (for example the 7-iron is 3.4 mm, or
  0.134 inches). Swing weights are the steel-shaft column; the graphite build is roughly
  three points lighter. Srixon does not publish a single bounce figure for the Tour V.T.
  sole, so bounce is omitted.
