faq:
  - q: "What is the loft of a Srixon ZX4 Mk II 7-iron?"
    a: "The Srixon ZX4 Mk II 7-iron has a loft of 28.5 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "What clubs come in a stock Srixon ZX4 Mk II set?"
    a: "Heads run 4-iron through a 56-degree sand wedge. The 4-iron through pitching wedge are offered in both right and left hand; the 49-degree approach wedge and the sand wedge are right hand only."
  - q: "How much stronger are the Srixon ZX4 Mk II lofts than the ZX5 Mk II?"
    a: "By 2.5 degrees at the 7-iron — 28.5 degrees against 31 degrees — and by 1 degree at the pitching wedge, 43 degrees against 44 degrees."
  - q: "Did the lofts change between the Srixon ZX4 and the ZX4 Mk II?"
    a: "No. The ZX4 Mk II carries over the ZX4 lofts unchanged, from a 21-degree 4-iron through a 28.5-degree 7-iron to a 49-degree approach wedge. The Mk II adds a 56-degree sand wedge to the range."
