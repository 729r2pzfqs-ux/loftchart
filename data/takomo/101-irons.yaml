description: >
  The Iron 101 was Takomo's debut iron and the set that established the Finnish direct-to-consumer brand.
  It is a hollow-body game-improvement iron built around a cast stainless body with a thin, heat-treated
  face, sold as a seven-club 4-iron through pitching wedge set. Lofts are strong for the shape, with a
  30-degree 7-iron and a 44-degree pitching wedge, and offset is generous at 3.4 mm in the 7-iron.
  Takomo's own product page describes the body as 431 stainless in the marketing copy while its spec
  table lists a 455 stainless body with a 17-4 face; the table values are used here. The same
  ambiguity is present in the archived 2021 and 2022 pages, which head the section "455 Carpenter
  Steel" / "431 carbon steel" but state in the body copy that the hollow body is "a soft 431 stainless
  steel body welded to a hardened heat-treated 17-4 stainless steel face". Offsets below are
  converted from Takomo's published millimetre figures. Archived manufacturer pages from May 2021 and
  January 2022 carry an identical loft, lie and offset table to the one Takomo publishes today, so
  the specs here describe the club as it was sold at launch as well as in its current listing - the
  101 has not been re-engineered under the same name. It was a cast hollow-body stainless iron from
  the beginning; it was never a forged S20C blade. The set is still listed for sale as the
  "old version" alongside the 2026 101 MKII.
