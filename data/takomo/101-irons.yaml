faq:
  - q: "What is the loft of a Takomo 101 7-iron?"
    a: "The Takomo 101 7-iron has a loft of 30 degrees, with a 62.5-degree lie and 3.4 mm of offset."
  - q: "What clubs come in a Takomo 101 set?"
    a: "The stock Iron 101 set is seven clubs, 4-iron through pitching wedge. The pitching wedge is 44 degrees."
  - q: "Is the Takomo 101 forged?"
    a: "No. The 101 is a cast, hollow-body game-improvement iron in stainless steel, and it has been since it launched in 2021 - Takomo's own 2021 product page already described it as a hollow body with a 431 stainless body and a 17-4 stainless face. Takomo's forged S20C models are the 201 and the 301 CB/MB."
