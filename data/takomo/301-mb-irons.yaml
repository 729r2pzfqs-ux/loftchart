faq:
  - q: "What is the loft of a Takomo 301 MB 7-iron?"
    a: "The Takomo 301 MB 7-iron has a loft of 34 degrees, with a 62.5-degree lie and a 37-inch steel-shaft length."
  - q: "Are the Takomo 301 MB irons forged?"
    a: "Yes. The 301 MB is a one-piece forging in soft S20C carbon steel, with the back of the head precision-milled after forging."
  - q: "What clubs come in a Takomo 301 MB set?"
    a: "Seven clubs, 4-iron through pitching wedge, with a 47-degree pitching wedge. Takomo also sells a 301 Combo set with 301 CB long irons and 301 MB short irons."
