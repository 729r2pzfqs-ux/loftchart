description: >
  The Iron 301 MB is Takomo's muscle-back blade, one-piece forged from soft S20C carbon steel with
  precision milling across the back of the head. It carries the same head weights, lofts, lies and
  offsets as the 301 CB cavity back, in a shorter blade with minimal offset and traditional muscle-back
  weight distribution. The 7-iron is 34 degrees and the pitching wedge 47 degrees, and the stock set
  is seven clubs, 4-iron through pitching wedge, with KBS Tour shafts and Lamkin Crossline grips.
  Takomo aims it at low single-figure and scratch players. Offsets below are converted from Takomo's
  published millimetre figures.
