description: >
  The Iron 201 is Takomo's forged players cavity back, one-piece forged from soft S20C carbon steel
  with a precision-milled face and back cavity. It is the brand's value forged set, sitting between
  the cast 101 family and the tour-shaped 301 CB and MB. Lofts match the 101T at a 32-degree 7-iron
  and a 46-degree pitching wedge, but lie angles are half a degree flatter through the set. The stock
  set is seven clubs, 4-iron through pitching wedge, with KBS Tour steel shafts and Lamkin Crossline
  grips. The 201 arrived in autumn 2021, not 2023 as Takomo's current brand timeline implies - it was
  on sale on the company's original WooCommerce site by October 2021, a few months after the 101.
  Takomo revised the set once, very early in its life. The launch table archived in October 2021
  listed lofts of 22/24/27/31/35/39/44 with slightly different head weights; by January 2022 the
  table had settled on the 22/25/28/32/36/41/46 lofts shown below, and those have been unchanged
  from then through the current listing. Lie angles and the forged S20C construction were the same
  in both tables. The specs here are the settled 2022-onward set, which covers all but the first few
  months of production.
