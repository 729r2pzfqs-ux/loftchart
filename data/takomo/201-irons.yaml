faq:
  - q: "What is the loft of a Takomo 201 7-iron?"
    a: "The Takomo 201 7-iron has a loft of 32 degrees, with a 62-degree lie and a 37-inch steel-shaft length."
  - q: "Are the Takomo 201 irons forged?"
    a: "Yes. The 201 is a one-piece forging in soft S20C carbon steel, with the face and back cavity precision-milled after forging."
  - q: "What clubs come in a Takomo 201 set?"
    a: "Seven clubs, 4-iron through pitching wedge. The pitching wedge is 46 degrees."
  - q: "When did the Takomo 201 come out?"
    a: "Autumn 2021. Takomo's own site listed the 201 for sale in October 2021, a few months after the 101, although the brand's current timeline dates it to 2023. The set was re-specced once shortly after launch: the original listing showed a 31-degree 7-iron and a 44-degree pitching wedge, and by January 2022 those had become the 32 and 46 degrees the set has carried ever since."
