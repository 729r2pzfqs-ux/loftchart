description: >
  The Iron 201T MKII is a new model in Takomo's January 2026 MKII launch and the brand's most compact
  hollow-body iron. It uses a cast 17-4 body with a machined variable-thickness face plate and a
  tungsten weight bar in the 4- through 7-irons, switching to a flat cast face and steel weighting in
  the 8-iron through pitching wedge. Against the 201 MKII it has a trimmed topline, a thinner tapered
  sole, a shorter blade length, roughly 0.3 mm less offset and lofts two degrees weaker at the 7-iron.
  The 7-iron is 33 degrees and the pitching wedge 47 degrees, in a 4-iron through pitching wedge set.
  Offsets below are converted from Takomo's published millimetre figures.
