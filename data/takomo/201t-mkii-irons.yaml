faq:
  - q: "What is the loft of a Takomo 201T MKII 7-iron?"
    a: "The Takomo 201T MKII 7-iron has a loft of 33 degrees, with a 62.5-degree lie and 2.46 mm of offset."
  - q: "How does the 201T MKII differ from the 201 MKII?"
    a: "The 201T MKII has a shorter blade length, thinner sole and topline, about 0.3 mm less offset and a tungsten weight bar in the long irons. Its lofts are two degrees weaker at the 7-iron (33 versus 31 degrees)."
  - q: "What clubs come in a Takomo 201T MKII set?"
    a: "Seven clubs, 4-iron through pitching wedge, with a 47-degree pitching wedge."
