faq:
  - q: "What is the loft of a Takomo 301 CB 7-iron?"
    a: "The Takomo 301 CB 7-iron has a loft of 34 degrees, with a 62.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the difference between the Takomo 301 CB and 301 MB?"
    a: "They share identical lofts, lies, head weights and offsets. The CB is a cavity back with perimeter weighting, a lower centre of gravity and a slightly wider sole; the MB is a muscle-back blade."
  - q: "What clubs come in a Takomo 301 CB set?"
    a: "Seven clubs, 4-iron through pitching wedge. The pitching wedge is 47 degrees."
