description: >
  The Iron 301 CB is Takomo's players cavity back, one-piece forged from S20C carbon steel and sharing
  its head weights, lofts, lies and offsets with the 301 MB muscle back. Compared with the MB it has a
  lower centre of gravity, perimeter weighting and a slightly wider sole, while keeping a short blade
  length and minimal offset. Lofts are traditional for a modern players iron, with a 34-degree 7-iron
  and a 47-degree pitching wedge, in a seven-club 4-iron through pitching wedge set. Takomo also sells
  a 301 Combo set pairing 301 CB long irons with 301 MB short irons. Offsets below are converted from
  Takomo's published millimetre figures.
