description: >
  The Iron 101 MKII is the second-generation Takomo 101, released on 7 January 2026 alongside the
  201 MKII and 201T MKII. It keeps the hollow-body game-improvement formula but adds a variable-face-
  thickness plate in the 5- through 8-irons, a flat cast face in the 9-iron through gap wedge, and a
  reworked perimeter weighting system. The stock set is seven clubs, 5-iron through gap wedge, rather
  than the 4-PW makeup of the original 101. Lofts are strong, with a 29-degree 7-iron, a 43-degree
  pitching wedge and a 48-degree gap wedge. Offsets below are converted from Takomo's published
  millimetre figures.
