faq:
  - q: "What is the loft of a Takomo 101 MKII 7-iron?"
    a: "The Takomo 101 MKII 7-iron has a loft of 29 degrees, with a 62.5-degree lie and 3.4 mm of offset."
  - q: "What clubs come in a Takomo 101 MKII set?"
    a: "Seven clubs, 5-iron through gap wedge. The pitching wedge is 43 degrees and the gap wedge is 48 degrees."
  - q: "How is the 101 MKII different from the original Takomo 101?"
    a: "The MKII adds a variable-thickness face in the 5- through 8-irons, a two-tone finish and a thinner topline, changes the set makeup from 4-PW to 5-GW, and runs one degree weaker at the 7-iron (29 versus 30 degrees)."
