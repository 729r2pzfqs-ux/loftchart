faq:
  - q: "What is the loft of a Takomo 201 MKII 7-iron?"
    a: "The Takomo 201 MKII 7-iron has a loft of 31 degrees, with a 62-degree lie and 2.77 mm of offset."
  - q: "Are the Takomo 201 MKII irons forged?"
    a: "No. Unlike the forged S20C 201 it replaces, the 201 MKII is a cast 17-4 stainless hollow body with a machined 17-4 variable-thickness face plate in the 4- through 7-irons."
  - q: "What clubs come in a Takomo 201 MKII set?"
    a: "Seven clubs, 4-iron through pitching wedge, with a 46-degree pitching wedge."
