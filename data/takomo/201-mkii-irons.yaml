description: >
  The Iron 201 MKII replaced Takomo's forged 201 on 7 January 2026 and changes the model's character:
  where the original 201 was a one-piece S20C forging, the MKII is a cast 17-4 hollow body with a
  machined variable-thickness face plate in the 4- through 7-irons and a flat cast face in the 8-iron
  through pitching wedge. It is positioned as a players-distance iron with a shorter blade length,
  thinner sole and trimmed topline compared with the 101 MKII. The 7-iron is 31 degrees and the
  pitching wedge 46 degrees, and the stock set is 4-iron through pitching wedge. Offsets below are
  converted from Takomo's published millimetre figures.
