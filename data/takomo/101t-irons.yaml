faq:
  - q: "What is the loft of a Takomo 101T 7-iron?"
    a: "The Takomo 101T 7-iron has a loft of 32 degrees, with a 62.5-degree lie and 2.4 mm of offset."
  - q: "What is the difference between the Takomo 101 and the 101T?"
    a: "The 101T has a thinner topline, shorter blade length and about 1 mm less offset, and its lofts are two degrees weaker through most of the set - 32 degrees at the 7-iron versus 30 degrees for the 101."
  - q: "What clubs come in a Takomo 101T set?"
    a: "Seven clubs, 4-iron through pitching wedge, with a 46-degree pitching wedge."
  - q: "Is the Takomo 101T forged?"
    a: "No. The 101T is a cast hollow-body iron with a 431 stainless steel body, as Takomo's own 2022 launch page described it. The forged S20C models in the range are the 201 and the 301 CB/MB."
