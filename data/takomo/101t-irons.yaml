description: >
  The Iron 101T is the compact version of Takomo's debut 101 iron, launched in mid-2022 as the brand's
  players-distance model. It keeps the hollow-body construction of the 101 but pairs a 431 stainless
  body with a 450 stainless face in a head with a thinner topline, shorter blade length and roughly
  a millimetre less offset. Lofts are two degrees weaker than the 101 through most of the set, with a
  32-degree 7-iron and a 46-degree pitching wedge, and the stock set is 4-iron through pitching wedge.
  Offsets below are converted from Takomo's published millimetre figures. An archived manufacturer
  page from June 2022, within days of launch, carries the same lofts, lies and offsets Takomo
  publishes today, so this table describes the club as originally sold as well as in its current
  listing. Like the 101, the 101T was a cast hollow-body stainless iron from the start rather than a
  forged S20C blade.
