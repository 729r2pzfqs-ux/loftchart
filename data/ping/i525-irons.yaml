description: >
  The i525 replaced the i500 as Ping's hollow-body players-distance iron, pairing a
  forged maraging steel face with a 17-4 stainless body, an internal sole undercut and
  tungsten weighting. It keeps the i500's lofts, lies and lengths exactly — the 7-iron
  is 30.5 degrees at 62.0 lie and 37 inches, four degrees stronger than the i230 of the
  same era — while cutting offset in the mid and short irons, to 0.08 inches at the
  7-iron. The set runs 3-iron through pitching wedge plus a 50-degree utility wedge.
  Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat,
  brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2
  upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the
  BLACK (standard) lies.
