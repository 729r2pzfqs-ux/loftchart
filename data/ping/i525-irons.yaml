faq:
  - q: "What is the loft of a Ping i525 7-iron?"
    a: "The Ping i525 7-iron has a loft of 30.5 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping i525 irons made?"
    a: "The i525 was announced in February 2022 and reached retail in March that year, replacing the i500."
  - q: "What is the difference between the Ping i500 and the i525?"
    a: "Lofts, lies and lengths are identical club for club. The i525 changes the body to 17-4 stainless with an internal sole undercut, adds tungsten weighting, and reduces offset through the mid and short irons — 0.08 inches at the 7-iron against the i500's 0.09, and 0.02 at the 9-iron against 0.05."
  - q: "Is the Ping i525 a distance iron?"
    a: "Yes. It is a hollow-body players-distance model. Its 7-iron is 30.5 degrees, 2.5 degrees stronger than the players-iron i230 of the same period and 1.5 degrees weaker than the game-improvement G430."
