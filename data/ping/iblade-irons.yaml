faq:
  - q: "What is the loft of a Ping iBlade 7-iron?"
    a: "The Ping iBlade 7-iron has a loft of 34 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping iBlade irons made?"
    a: "The iBlade was introduced in 2016 and was succeeded by the Blueprint in 2019."
  - q: "Is the Ping iBlade a blade?"
    a: "No, despite the name. It is a compact cast 431 stainless cavity back with tungsten toe weighting. Ping's actual muscle-back blade is the Blueprint, which followed it and has roughly half the iBlade's offset at the 7-iron — 0.05 inches against 0.09."
  - q: "What is the difference between the Ping iBlade and the i200?"
    a: "The i200 is a degree stronger through the long and mid irons — its 3-iron is 19 degrees against the iBlade's 20 — carries noticeably more offset in the long irons, and adds a utility wedge to the set."
