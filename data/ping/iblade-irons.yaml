description: >
  The iBlade was Ping's tour-players iron between the end of the S series and the
  arrival of the Blueprint, a compact cast 431 stainless head with a thin top rail, a
  straight leading edge, a high toe and nearly pure tungsten weights pressed into every
  toe to raise MOI. Lofts sit a degree weaker than the i200 of the following year — the
  7-iron is 34 degrees — with offset of 0.09 inches at that club and added bounce and a
  heel grind for turf interaction. It runs 3-iron through pitching wedge. Ping's
  colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3
  flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright,
  white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK
  (standard) lies.
