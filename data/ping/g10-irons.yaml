faq:
  - q: "What is the loft of a Ping G10 7-iron?"
    a: "The Ping G10 7-iron has a loft of 34 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping G10 irons made?"
    a: "The G10 was introduced in 2007 and was replaced by the G15 in 2009."
  - q: "What is the difference between the Ping G5 and G10?"
    a: "Lofts and lengths are identical. The G10 differs in offset — more in the long irons, less in the wedges — and in sole and cavity design."
