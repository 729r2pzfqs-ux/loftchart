description: >
  The G10 carried the G5's lofts and lengths unchanged — the 7-iron stays at 34
  degrees — while widening the sole and reworking the cavity. Offset is slightly
  greater in the long irons (0.34 inches at the 2-iron against 0.32) and slightly
  less in the wedges. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
