faq:
  - q: "What is the loft of a Ping ISI 7-iron?"
    a: "The Ping ISI 7-iron has a loft of 34.5 degrees, a standard (black dot) lie of 63.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "What wedges came with the Ping ISI set?"
    a: "Ping offered six wedge options: W at 47 degrees, W2 at 49.5, S at 52, S2 at 54.5, S3 at 57 and L at 61 degrees."
  - q: "What replaced the Ping ISI?"
    a: "The Ping i3 O-Size took over as Ping's mainstream game-improvement iron in 2000."
