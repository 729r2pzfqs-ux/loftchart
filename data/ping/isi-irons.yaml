description: >
  The ISI replaced the Zing 2 as Ping's mainstream cavity-back iron in 1998 and
  was offered alongside the larger, more forgiving ISI-K. Lofts are noticeably
  stronger than the Eye 2 of a decade earlier — the 7-iron moved from 36 to
  34.5 degrees — while lie angles became more upright. Ping offered an unusually
  deep wedge matrix for the set: W (47), W2 (49.5), S (52), S2 (54.5), S3 (57)
  and L (61); the table below lists W, W2, S and L. As with all Ping irons of the
  era, the coloured dot in the cavity encodes lie angle relative to standard —
  gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue
  1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright.
  The lie angles below are the BLACK (standard) lies.
