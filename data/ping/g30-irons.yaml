faq:
  - q: "What is the loft of a Ping G30 7-iron?"
    a: "The Ping G30 7-iron has a loft of 30.5 degrees, a standard (black dot) lie of 61.88 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G30 irons made?"
    a: "The G30 was introduced in 2014 and was replaced by the G in 2016."
  - q: "Are Ping G30 lofts stronger than the G25?"
    a: "Yes. The G30 7-iron is 30.5 degrees against 32 for the G25, and the G30 set starts at the 4-iron rather than the 3-iron."
