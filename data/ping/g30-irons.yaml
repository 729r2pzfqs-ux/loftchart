description: >
  The G30 dropped the 3-iron from the stock set and strengthened the middle irons
  again, putting the 7-iron at 30.5 degrees. Lengths were re-cut on a new
  progression — the 4-iron is 38.875 inches and the 7-iron 37.0 — and offset was
  reduced across the board against the G25. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
