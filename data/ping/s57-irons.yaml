faq:
  - q: "What is the loft of a Ping S57 7-iron?"
    a: "The Ping S57 7-iron has a loft of 34.25 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping S57 irons made?"
    a: "The S57 was introduced in 2007 and was replaced by the S56 in 2010."
  - q: "How much offset do Ping S57 irons have?"
    a: "Very little by game-improvement standards: 0.20 inches at the 2-iron, 0.09 at the 7-iron and 0.03 at the pitching wedge."
