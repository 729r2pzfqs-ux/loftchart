description: >
  The S57 was Ping's tour-oriented cast iron of the late 2000s, with a compact head,
  minimal offset — 0.09 inches at the 7-iron against 0.24 for the contemporary G10 —
  and a tungsten toe weight for stability. Lofts are traditional for a players iron,
  with the 7-iron at 34.25 degrees and the set running 2-iron through pitching wedge. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
