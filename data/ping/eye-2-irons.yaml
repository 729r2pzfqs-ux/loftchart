description: >
  The Eye 2 is the best-selling iron model in golf history and the club that
  established Ping's perimeter-weighted, heel-toe balanced cavity back as the
  standard game-improvement shape. Lofts are traditional by modern standards —
  the 7-iron sits at 36 degrees, roughly four degrees weaker than a 2010s
  game-improvement 7-iron. Ping fitted the Eye 2 with its colour-code (dot)
  system, in which the coloured dot in the cavity denotes the lie angle relative
  to standard: gold is 4 degrees flat, brown 3 flat, orange 2 flat, red 1 flat,
  BLACK is standard, blue 1 upright, green 2 upright, white 3 upright, silver
  4 upright and maroon 5 upright. The lie angles listed below are the BLACK
  (standard) lies. The square-groove Eye 2 was also the subject of the long-running
  USGA/PGA Tour groove dispute of the late 1980s.
