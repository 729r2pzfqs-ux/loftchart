faq:
  - q: "What is the loft of a Ping G410 7-iron?"
    a: "The Ping G410 7-iron has a loft of 30 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G410 irons made?"
    a: "The G410 was introduced in 2019 and was replaced by the G425 in 2021."
  - q: "What is the difference between the Ping G400 and G410?"
    a: "Lofts, lengths and bounce are identical. The G410 has less offset through the set and flatter long-iron lie angles."
