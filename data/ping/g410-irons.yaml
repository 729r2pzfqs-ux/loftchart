description: >
  The G410 kept the G400's lofts, lengths and bounce but reduced offset noticeably
  through the set — the 7-iron drops from 0.20 inches to 0.18 — and flattened the
  long-iron lie angles, with the 4-iron moving from 59.2 to 60.5 degrees. The
  7-iron remains 30 degrees. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
