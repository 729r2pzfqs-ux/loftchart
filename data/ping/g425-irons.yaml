description: >
  The G425 is dimensionally identical to the G410 — every published loft, length,
  lie, offset, bounce and swing weight matches through the set, with the 7-iron at
  30 degrees. The changes are to the face, which moves to a variable-thickness
  design, rather than to the geometry. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
