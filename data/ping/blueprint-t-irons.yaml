description: >
  The Blueprint T is the muscle-back half of the pair that replaced the original
  Blueprint, launched alongside the cavity-back Blueprint S. It is a one-piece 8620
  carbon steel forging with a thin top line, a compact profile and very little offset —
  0.06 inches at the 7-iron, dropping to 0.03 at the pitching wedge, a hundredth more
  than the original Blueprint at each of those clubs.
  Lofts are a degree stronger than the original Blueprint at the 7-iron, 33 against 34,
  and every 3 to 9 iron is a quarter of an inch shorter than the matching Blueprint S
  to promote a lower flight. The set runs 3-iron through pitching wedge. Ping's
  colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3
  flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright,
  white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK
  (standard) lies.
