sources:
  - "Ping's own Blueprint T product page, Specifications table (https://ping.com/en-us/golf-clubs/irons/blueprint-t-iron, cross-checked against the archived copy at http://web.archive.org/web/2020/https://ping.com/en-us/clubs/irons/blueprint-t) — supplied every length, loft, lie, offset, bounce and swing weight above, the stock shaft list, the single-piece 8620 carbon steel forging, and the note that lie is based on the black colour code at standard length. The pitching wedge swing weight is published as D3 1/8 and is recorded verbatim."
  - "Ping's own Blueprint S product page, Specifications table — used as a cross-check: the S runs 39, 38.5, 38, 37.5, 37, 36.5, 36 and 35.5 inches, exactly a quarter inch longer than the T at every club from 3 to 9, with the pitching wedges matched at 35.5. This confirms Ping's stated design intent and confirms the T chart was read correctly."
  - "golf.com 'Ping's Blueprint T and S forged irons: 4 things you need to know' and golfwrx.com 'Ping adds Blueprint T and Blueprint S to Blueprint irons lineup' — the two models were revealed in July 2023, went to fitting and pre-order on 9 January 2024 and to retail on 25 January 2024. year_introduced records the 2023 announcement per this database's convention; golflink.com's 'PING Irons by Year' lists it as a 2024 model on the retail basis, so both dates appear in the wild."
  - "Note: golfsource.org publishes a Blueprint T table with a 21.5-degree 4-iron and a 31-degree 7-iron. It contradicts Ping's own chart and the Blueprint S cross-check, and is not used."
  - "Note: year_discontinued is null — the Blueprint T had no announced successor as of the sources retrieved."
