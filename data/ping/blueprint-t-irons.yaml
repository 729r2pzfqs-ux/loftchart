faq:
  - q: "What is the loft of a Ping Blueprint T 7-iron?"
    a: "The Ping Blueprint T 7-iron has a loft of 33 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping Blueprint T irons made?"
    a: "The Blueprint T was revealed in July 2023 and reached retail in January 2024, replacing the original Blueprint alongside the Blueprint S."
  - q: "What is the difference between the Ping Blueprint T and Blueprint S?"
    a: "They share lofts and lies club for club. The T is a one-piece muscle-back forging, the S a forged cavity back; the T's 3 to 9 irons are a quarter of an inch shorter for a lower flight, and the T carries slightly less offset in the long irons — 0.14 inches at the 3-iron against 0.17."
  - q: "How much offset does the Ping Blueprint T have?"
    a: "Very little: 0.14 inches at the 3-iron, 0.06 at the 7-iron and 0.03 at the pitching wedge."
