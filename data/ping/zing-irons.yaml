description: >
  The Zing replaced the Eye 2 as Ping's mainstream game-improvement iron and
  moved the line about 1.5 degrees stronger through the middle of the set — the
  7-iron went from 36 degrees in the Eye 2 to 34.5 degrees here. Ping did not
  publish per-club offset or bounce figures for the Zing, so those columns are
  omitted rather than guessed. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
