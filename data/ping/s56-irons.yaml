description: >
  The S56 carried over the S57's lofts, lies, lengths and offset unchanged, with the
  7-iron at 34.25 degrees and 0.09 inches of offset. It is a cast players iron with a
  tungsten toe weight, running 2-iron through pitching wedge and holding a D1 swing
  weight through the irons. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
