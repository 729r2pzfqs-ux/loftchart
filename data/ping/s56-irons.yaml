faq:
  - q: "What is the loft of a Ping S56 7-iron?"
    a: "The Ping S56 7-iron has a loft of 34.25 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping S56 irons made?"
    a: "The S56 was introduced in 2010, following the S57, and was later replaced by the S55."
  - q: "What is the difference between the Ping S57 and S56?"
    a: "Lofts, lies, lengths and offset are identical through the set. The published charts differ in which columns they record — bounce for the S57, swing weight for the S56."
