faq:
  - q: "What is the loft of a Ping G440 7-iron?"
    a: "The Ping G440 7-iron has a loft of 29 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G440 irons made?"
    a: "The G440 was introduced in 2025, replacing the G430."
  - q: "What is the difference between the Ping G440 and the G440 HL?"
    a: "They share the head design, lofts and lies. The HL is a lighter overall build for slower swing speeds, using lighter toe and tip weights, the ultralight Ping Alta Quick graphite shaft and a Lamkin UTx Lite grip, so its swing weights are lighter than the standard G440 figures listed here."
  - q: "What is the difference between the Ping G430 and G440 irons?"
    a: "Lofts are unchanged from the 4-iron to the 9-iron. The G440 lengthens the 4, 5 and 6 irons by an eighth of an inch, weakens the pitching wedge from 41 to 42 degrees and the utility wedge from 45.5 to 47, and replaces the G430's 50 and 54 degree wedges with 52 and 56."
  - q: "What wedges come with the Ping G440 irons?"
    a: "A 42-degree pitching wedge, a 47-degree utility wedge, and loft-numbered 52 and 56 degree wedges. The 56 uses an Eye 2 inspired bounce and sole profile."
