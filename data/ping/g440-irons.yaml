description: >
  There are two G440 iron builds, and the chart below is the standard G440 in its
  steel-shaft specification. The other build is the G440 HL (High Launch), which shares
  the same head design, lofts and lies but uses lighter toe and tip weights, the
  ultralight Ping Alta Quick graphite shaft and a Lamkin UTx Lite grip, so its swing
  weights are lighter than those listed here. The standard G440 keeps the G430's lofts
  through the irons — the 7-iron stays at 29 degrees — but lengthens the 4, 5 and 6
  irons by an eighth of an inch each for more speed and higher launch, and reweakens
  the bottom of the bag: the pitching wedge goes from 41 to 42 degrees and the utility
  wedge from 45.5 to 47, with loft-numbered 52 and 56 degree wedges completing the set.
  The 56 borrows its bounce and sole profile from the Eye 2. Ping's colour-code (dot)
  system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat,
  red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver
  4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
