sources:
  - "Ping's own G440 product page, Specifications table (https://ping.com/en-us/clubs/irons/g440, verified against the archived copy at http://web.archive.org/web/20250604164404/https://ping.com/en-us/clubs/irons/g440) — supplied every length, loft, lie, offset, bounce and swing weight above, the AWT 3.0 and ALTA CB Blue engineered shafts, the 4-iron through 56-degree set composition, and the note that lie is based on the black colour code at standard length. Power Spec and Retro Spec lofts appear on the same chart as fitting alternatives and are not recorded here."
  - "Sub-model: the specs above are the standard G440 iron, not the G440 HL. Ping's own G440 page describes the HL build as using lighter toe and tip weights, the ultralight Ping Alta Quick shaft and the Lamkin UTx Lite grip to produce a lighter overall build and lighter swing weights; mygolfspy.com 'Breaking down the PING G440 lineup' confirms the two builds share the same face and PurFlex badge and the same 4-9, PW (42), UW (47), 52 and 56 loft offering. Because the HL differs in swing weight and stock shaft, only the standard build is recorded here."
  - "Ping's G440 page also supplies the design notes used in the description: the 4, 5 and 6 iron shafts are 1/8 inch longer than the G430's, and the 56-degree wedge takes its bounce profile, sole design and slimmer hosel from the Eye 2."
  - "Earliest archived Ping G440 iron page is dated 17 January 2025, consistent with a January 2025 announcement and with the year_discontinued of 2025 already recorded in ping/g430-irons.yaml. golflink.com 'PING Irons by Year' also dates the G440 to 2025."
  - "Note: year_discontinued is null — the G440 is the current Ping game-improvement iron in the sources retrieved."
  - "Note: Ping's G440 page does not state the head alloy, so the material field records only the construction and the PurFlex cavity badge rather than repeating the G430's 'Hyper 17-4' marketing term without a source."
