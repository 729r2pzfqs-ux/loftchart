description: >
  Ping named the 2016 generation simply G. Lofts, lengths, offsets and bounce carry
  over from the G30 unchanged, with the 7-iron at 30.5 degrees; the change is the
  COR-Eye face technology and slightly revised lie angles through the set. The sand
  and lob wedge swing weights are lighter than the G30's. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
