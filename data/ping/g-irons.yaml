faq:
  - q: "What is the loft of a Ping G 7-iron?"
    a: "The Ping G 7-iron has a loft of 30.5 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G irons made?"
    a: "The G was introduced in 2016 and was replaced by the G400 in 2017."
  - q: "What is the difference between the Ping G30 and G irons?"
    a: "Lofts, lengths, offset and bounce are identical. The G adds the COR-Eye face, revises lie angles slightly and uses lighter wedge swing weights."
