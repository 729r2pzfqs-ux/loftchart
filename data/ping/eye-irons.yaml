faq:
  - q: "What is the loft of a Ping Eye 7-iron?"
    a: "The Ping Eye 7-iron is listed at 36 degrees, with a standard (black dot) lie of 62.5 degrees and a steel-shaft length of 36.75 inches. Only one secondary spec table for this model could be found, so treat the figure as indicative rather than definitive."
  - q: "When were Ping Eye irons made?"
    a: "The Eye was introduced in 1978 and ran until September 1982, when the Eye 2 replaced it. Some sources date the Eye to 1979."
  - q: "What is the difference between the Ping Eye and the Eye 2?"
    a: "The Eye 2 has a longer blade, a taller face, a thinner top line and a refined eye-shaped cavity. Published lofts, lies and lengths for the Eye match the pre-1998 Eye 2 chart, so the change was in head shape and forgiveness rather than in the loft progression."
  - q: "What does the black dot on a Ping Eye mean?"
    a: "Black is Ping's standard lie angle. The other dot colours shift the lie flatter (gold, brown, orange, red) or more upright (blue, green, white, silver, maroon) in one-degree steps."
