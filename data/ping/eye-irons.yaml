sources:
  - "qsponge.com 'What is loft angle of Ping Eye Irons?' spec table (https://qsponge.com/questions/53877821/) — supplied every loft, lie and length listed above. This is the ONLY retrieved spec table for the original Eye."
  - "Note on confidence: the qsponge Eye table is identical, club for club, to the pre-January-1998 Ping Eye 2 chart already recorded in ping/eye-2-irons.yaml. That is plausible — Ping ran one standard iron loft/lie/length progression across the Eye and early Eye 2 — but it could equally mean the table was copied from the Eye 2. No second source was found to separate the two, so confidence is set to low."
  - "Ping's own archived Classics irons index (http://web.archive.org/web/2006/http://www.ping.com/irons_classics.html) was checked directly: it carries spec charts for the Eye 2, Zing, Zing 2, ISI, i3, S59 and G2, but Ping never published a Classics chart for the original Eye. There is therefore no manufacturer source for this model."
  - "thebrassie.com Ping iron history and sportsrec.com 'The History of Ping Iron Sets' — the Eye was introduced in 1978, was more compact than the Karsten irons it replaced, added a perimeter-weighted eye-shaped cavity, and used progressive hosel offset and sole contours. Note that golflink.com's 'PING Irons by Year' gives 1979 rather than 1978; 1978 is used here as the more commonly reported date."
  - "Ping's archived Classics Eye 2 page — the Eye 2 was introduced in September 1982, which is the basis for year_discontinued."
  - "Note: no source gives per-club offset, bounce or swing weight for the Eye, so those keys are omitted rather than guessed."
