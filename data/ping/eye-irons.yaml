description: >
  The Eye was the first Ping iron to use the eye-shaped cavity that gave the family its
  name, replacing the Karsten models with a more compact head, more weight pushed to the
  perimeter and progressive hosel offset and sole camber through the set. It lasted only
  four years before the longer-bladed, thinner-toplined Eye 2 replaced it in September
  1982 and went on to become the best-selling iron in golf. Ping's colour-code (dot)
  system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat,
  red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver
  4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies, and they
  are identical to the pre-1998 Eye 2 chart — see the note in sources, because the
  numbers here rest on a single secondary table and are the least well corroborated
  figures in this Ping set.
