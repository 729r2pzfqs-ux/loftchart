faq:
  - q: "What is the loft of a Ping i230 7-iron?"
    a: "The Ping i230 7-iron has a loft of 33 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping i230 irons made?"
    a: "The i230 was announced in 2022, following the i210, and reached retail in early 2023."
  - q: "What is the difference between the Ping i210 and the i230?"
    a: "Lofts, lies and lengths are identical club for club. The i230 shortens the blade in the 3 to 5 irons, trims offset there by 0.01 inches at each of those clubs, adds tungsten tip weighting alongside the toe weight, and switches to MicroMax grooves."
  - q: "How strong are Ping i230 lofts?"
    a: "Traditional for a players iron. The 7-iron is 33 degrees against 29 for the game-improvement G430 of the same period — four degrees, or roughly one club, weaker."
