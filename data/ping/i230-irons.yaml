description: >
  The i230 is a multi-material cast players iron: a 431 stainless body with tungsten
  toe and tip weights, a multi-part cavity badge and a concealed activated elastomer
  insert, plus tighter-spaced MicroMax grooves. It keeps the i210's loft, lie and
  length chart exactly — the 7-iron is 33 degrees at 62.0 lie and 37 inches — but
  shortens the blade in the 3 to 5 irons and trims offset there, from 0.21 to 0.20 at
  the 3-iron and 0.15 to 0.14 at the 5-iron. Ping's colour-code (dot) system sets lie
  angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat,
  BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright,
  maroon 5 upright. The lies below are the BLACK (standard) lies.
