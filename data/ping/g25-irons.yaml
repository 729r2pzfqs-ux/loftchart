faq:
  - q: "What is the loft of a Ping G25 7-iron?"
    a: "The Ping G25 7-iron has a loft of 32 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "Are Ping G25 lofts stronger than the G15?"
    a: "No — the two sets share identical lofts, lies and lengths through the bag. The G25 differs mainly in sole width, offset profile and bounce, which was reduced in the long irons."
  - q: "What shafts came stock in the Ping G25 irons?"
    a: "Ping CFS steel in SR, R, S and X flexes (94-114 grams) or Ping TFC 189I graphite in SR, R and S flexes (70-86 grams)."
