predecessor: Ping G20
description: >
  The G25 refined the G-series formula with a Custom Tuning Port and progressive
  geometry: wider soles and more offset in the long irons for higher launch,
  thinner soles and less offset in the scoring clubs for control. Lofts are
  identical to the 2009 G15 through the set, with the 7-iron at 32 degrees, but
  bounce was softened in the long irons (the 3-iron moved from -2 to 0 degrees).
  Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat,
  brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green
  2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below
  are the BLACK (standard) lies.
