faq:
  - q: "What is the loft of a Ping G430 7-iron?"
    a: "The Ping G430 7-iron has a loft of 29 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G430 irons made?"
    a: "The G430 was introduced in 2023 and was replaced by the G440 in 2025."
  - q: "What wedges come with the Ping G430 irons?"
    a: "The G430 pitching wedge is 41 degrees, followed by loft-numbered 45 and 50 degree wedges, then a 54-degree sand wedge and a 58-degree lob wedge."
