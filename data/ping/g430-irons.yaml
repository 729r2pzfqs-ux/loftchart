description: >
  The G430 strengthened the set by a full degree at the 7-iron, to 29 degrees, and
  restructured the bottom of the bag: the pitching wedge is 41 degrees and Ping
  fills the gap with loft-numbered 45 and 50 degree wedges rather than a single
  utility wedge. A PurFlex cavity badge replaces the earlier damping insert.
  Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
