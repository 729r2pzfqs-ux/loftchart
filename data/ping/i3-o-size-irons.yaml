faq:
  - q: "What is the loft of a Ping i3 O-Size 7-iron?"
    a: "The Ping i3 O-Size 7-iron has a loft of 34.5 degrees, a standard (black dot) lie of 62.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "What is the difference between the Ping i3 O-Size and the i3 Blade?"
    a: "They were released together in 2000; the O-Size has the larger, more forgiving head, while the Blade is the compact players' version. The O-Size is the game-improvement model."
  - q: "Are Ping i3 O-Size lofts the same as the Ping ISI?"
    a: "Through the irons, yes — both run 20.5 degrees at the 3-iron to 47 degrees at the pitching wedge. The i3 differs in its wedge line-up, using a 52-degree U, 56-degree S and 60-degree L."
