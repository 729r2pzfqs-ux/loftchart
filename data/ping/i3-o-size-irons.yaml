description: >
  The i3 arrived in 2000 in two head sizes — the compact i3 Blade and the larger,
  more forgiving i3 O-Size documented here. Both used Ping's Custom Tuning Port
  in the back cavity to move discretionary weight low and to the perimeter.
  Lofts carry over almost unchanged from the ISI it replaced, with the 7-iron at
  34.5 degrees, but the wedge matrix was simplified to a conventional PW / U / S / L
  progression. Ping's colour-code (dot) system sets lie angle relative to standard:
  gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue
  1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright.
  The lies listed below are the BLACK (standard) lies.
