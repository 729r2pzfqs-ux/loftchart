description: >
  The G20 moved the G-series two degrees stronger at the 7-iron, from 34 degrees
  in the G15 to 32, and dropped the 2-iron from the stock line-up. The set uses a
  Custom Tuning Port to shift mass low and back. Published bounce figures were not
  part of the archived G20 chart and are omitted here. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
