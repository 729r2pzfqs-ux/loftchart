faq:
  - q: "What is the loft of a Ping G20 7-iron?"
    a: "The Ping G20 7-iron has a loft of 32 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping G20 irons made?"
    a: "The G20 was introduced in 2011 and was replaced by the G25 in 2013."
  - q: "Are Ping G20 lofts stronger than the G15?"
    a: "Yes, by two degrees through most of the set. The G20 7-iron is 32 degrees against 34 for the G15."
