description: >
  A naming note first, because this model is easy to confuse. Ping never used the badge
  "Anser V2". On Ping's own site this club is listed simply as the "Anser" iron, and it
  is the second-generation version of the forged Anser — retailers and the golf press
  almost always call it the "Anser Forged 2013" to separate it from the first-generation
  Anser Forged that preceded it. "Anser V2" is the disambiguating label used here for
  that second generation. Mechanically it is a re-engineered 8620 carbon steel forging
  with a dense tungsten sole weight, an internal cavity above the sole and stabilizing
  bars that sit low and flat in the long irons and thicker and more vertical in the
  short irons. Lofts, lies and lengths are unchanged from the first Anser Forged — the
  7-iron is 33.5 degrees — but the heads get progressively smaller, offset comes down
  by 0.02 to 0.03 inches at almost every club, and the long-iron soles are wider with
  markedly more bounce: 4 degrees at the 3-iron where the previous model was minus 3.
  Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat,
  brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2
  upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the
  BLACK (standard) lies.
