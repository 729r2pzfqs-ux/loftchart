sources:
  - "Ping's own Anser iron product page, Specifications tab (http://web.archive.org/web/2014/http://ping.com/clubs/ironsdetail.aspx?id=13993) — supplied every loft, length, offset, lie, bounce and swing weight above, the Project X / TFC 800i / TFC 80i shaft table, the 8620 steel body with dense tungsten sole weight and stabilizing bars, and the note that lie is based on the black colour code at standard length. This page is Ping's live 2014 listing, i.e. the second-generation model."
  - "Naming: the same Ping page titles the product 'Anser' with no generation suffix; Ping's site navigation lists it under Irons as 'ANSER'. 2ndswing.com catalogues it as 'Ping Anser Forged 2013' and golfwrx.com as the '2013 Ping Anser Forged'. No source uses 'Anser V2' — that string is this database's label for the second generation."
  - "mygolfway.com 'Here are the new Ping Anser Forged irons with dual performance', published 6 September 2012 — announcement of this model, 3-PW set composition, and the Project X and TFC 800i shaft options, which match the shaft table on Ping's own page. year_introduced uses this announcement date; the club was sold as the 2013 Anser Forged and is catalogued by that model year almost everywhere."
  - "golfwrx.com 2013 Anser Forged review — the second generation was re-engineered with progressively smaller heads, less offset through the set and wider long-iron soles; Miguel Angel Jimenez won the UBS Hong Kong Open with them in November 2012."
  - "Distinguishing it from the predecessor: ping/anser-forged-irons.yaml records the first-generation chart (offsets 0.23 to 0.07, bounce minus 3 to 9). The chart above is materially different in offset and bounce at every club while sharing lofts, lies and lengths, which is what confirms the two files describe different products."
  - "Note: year_discontinued is null — Ping did not announce a third forged Anser iron; the forged line was later resumed under the Blueprint and i59 names."
