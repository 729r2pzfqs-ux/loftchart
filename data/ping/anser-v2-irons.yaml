faq:
  - q: "What is the loft of a Ping Anser V2 7-iron?"
    a: "The second-generation forged Anser 7-iron has a loft of 33.5 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "Is 'Anser V2' the real name of these irons?"
    a: "No. Ping listed this club simply as the 'Anser' iron. It is the second generation of the forged Anser, announced in September 2012 and sold as a 2013 model, and it is normally catalogued as the 'Anser Forged 2013'. 'Anser V2' is only a label used here to keep the two generations apart."
  - q: "What is the difference between the Ping Anser Forged and the Anser V2?"
    a: "Lofts, lies and lengths are identical. The second generation cuts offset — 0.21 inches at the 3-iron against 0.23, and 0.10 at the 7-iron against 0.12 — shrinks the heads progressively through the set, and widens the long-iron soles, taking the 3-iron from minus 3 degrees of bounce to plus 4."
  - q: "What clubs come in a Ping Anser V2 set?"
    a: "3-iron through pitching wedge, in both right- and left-handed models."
