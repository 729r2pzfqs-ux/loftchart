description: >
  The G5 followed the G2 and kept the same 34-degree 7-iron, but published a full
  set of per-club offset and bounce figures. Offset runs progressively from 0.32
  inches at the 2-iron down to 0.15 at the lob wedge, and bounce climbs from -3
  degrees to 14 across the same span. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
