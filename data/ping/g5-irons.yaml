faq:
  - q: "What is the loft of a Ping G5 7-iron?"
    a: "The Ping G5 7-iron has a loft of 34 degrees, a standard (black dot) lie of 62.28 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping G5 irons made?"
    a: "The G5 was introduced in 2005 and was replaced by the G10 in 2007."
  - q: "How much offset do Ping G5 irons have?"
    a: "Offset is progressive: 0.32 inches at the 2-iron, 0.25 at the 7-iron and 0.15 at the lob wedge."
