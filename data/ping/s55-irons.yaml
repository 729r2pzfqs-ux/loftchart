description: >
  The S55 was the last of Ping's counting-down S series and the first of them to move
  off the long-running S57/S56 loft chart: the 7-iron is 33 degrees rather than 34.25,
  and the 6- and 8-irons move to round numbers, giving even four-degree gaps from the
  4-iron down. Offset is cut slightly against the S56, to 0.09 inches at the 7-iron,
  and a tungsten toe weight stabilises the head. The set runs 3-iron through pitching
  wedge at D1 swing weight. Ping's colour-code (dot) system sets lie angle relative to
  standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue
  1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The
  lies below are the BLACK (standard) lies.
