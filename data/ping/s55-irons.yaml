faq:
  - q: "What is the loft of a Ping S55 7-iron?"
    a: "The Ping S55 7-iron has a loft of 33 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping S55 irons made?"
    a: "The S55 was introduced in 2013, following the S56. It was the last model in Ping's S series — no S54 followed, and the tour-players role passed to the iBlade in 2016."
  - q: "What is the difference between the Ping S56 and S55?"
    a: "The S55 is 1.25 degrees stronger at the 7-iron (33 against 34.25) and a degree or more stronger through the mid and short irons, with slightly less offset at the 3-iron. Lies and lengths are unchanged."
  - q: "How much offset does the Ping S55 have?"
    a: "0.17 inches at the 3-iron, 0.09 at the 7-iron and 0.03 at the pitching wedge."
