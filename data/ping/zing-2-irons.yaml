description: >
  The Zing 2 was a light refresh of the 1992 Zing, carrying identical lofts and
  lengths through the set. The only published differences are the 5-iron lie
  (62.0 degrees against 61.5) and the lob wedge loft, listed at 61.0 degrees
  against the Zing's 57.0. As with the Zing, Ping published no per-club offset
  or bounce figures. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
