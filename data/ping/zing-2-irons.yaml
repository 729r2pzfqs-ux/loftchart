sources:
  - "Official Ping specification chart for the Zing 2 irons, Classics page (http://web.archive.org/web/20050308061211id_/http://www.ping.com/classics/irons/zing2.html)"
  - "Note: Ping revised this page during 2004. The April 2004 capture lists the 9-iron lie at 65.0 and the pitching wedge at 64.5; the October 2004 and March 2005 captures list 64.5 and 65.0. The later, monotonic figures are used here. Earlier revisions of this file carried the superseded April 2004 values."
  - "Note: Ping did not publish per-club offset or bounce for this model; those keys are omitted."
  - "Note: the Zing 2 chart is a 13-club chart listing both a 57.0-degree LS and a 61.0-degree LW. The Zing chart lists only a 57.0-degree LW. Both are reproduced as published; the archived charts do not resolve whether the Zing's 57.0 lob wedge was itself a duplication of its LS row."
  - "Note: year_discontinued is taken as the year the successor model was introduced, per the Ping model chronology."
faq:
  - q: "What is the loft of a Ping Zing 2 7-iron?"
    a: "The Ping Zing 2 7-iron has a loft of 34.5 degrees, a standard (black dot) lie of 63.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping Zing 2 irons made?"
    a: "The Zing 2 was introduced in 1994 and was replaced by the ISI in 1996."
  - q: "What is the difference between the Ping Zing and Zing 2?"
    a: "Lofts and lengths are identical through the set. The published charts differ in the lie column and the wedges: the 5-iron lie is 62.0 against 61.5 degrees, the 9-iron and pitching wedge lies are 64.5 and 65.0 against the Zing's 65.0 and 64.5, and the Zing 2 adds a 57-degree LS wedge alongside a 61-degree lob wedge where the Zing lists only a 57-degree lob wedge."
