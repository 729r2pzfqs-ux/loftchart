faq:
  - q: "What is the loft of a Ping Zing 2 7-iron?"
    a: "The Ping Zing 2 7-iron has a loft of 34.5 degrees, a standard (black dot) lie of 63.5 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping Zing 2 irons made?"
    a: "The Zing 2 was introduced in 1994 and was replaced by the ISI in 1996."
  - q: "What is the difference between the Ping Zing and Zing 2?"
    a: "Lofts and lengths are identical through the set. The published charts differ only at the 5-iron lie (62.0 against 61.5 degrees) and the lob wedge loft."
