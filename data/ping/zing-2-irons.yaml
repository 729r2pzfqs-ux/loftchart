description: >
  The Zing 2 was a light refresh of the 1992 Zing, carrying identical lofts and
  lengths through the set. The published differences sit in the lie column and
  the wedges: the 5-iron lie is 62.0 degrees against 61.5, the 9-iron and
  pitching wedge lies are 64.5 and 65.0 where the Zing chart lists 65.0 and
  64.5, and the Zing 2 chart carries a 57-degree LS wedge alongside a 61-degree
  lob wedge where the Zing lists only a 57-degree lob wedge. As with the Zing,
  Ping published no per-club offset or bounce figures. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
