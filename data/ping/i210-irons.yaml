faq:
  - q: "What is the loft of a Ping i210 7-iron?"
    a: "The Ping i210 7-iron has a loft of 33 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping i210 irons made?"
    a: "The i210 was introduced in 2018, following the i200, and was later replaced by the i230."
  - q: "Are Ping i210 irons players irons or game-improvement irons?"
    a: "They are players irons. The 7-iron is 33 degrees against 30 degrees for the game-improvement G410 of the same era, with roughly half the offset."
