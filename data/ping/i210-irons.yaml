description: >
  The i210 is a cast 431 stainless players iron with a softer elastomer insert in the
  Custom Tuning Port. Lofts sit between Ping's blade and game-improvement lines, with
  the 7-iron at 33 degrees, and offset is tight through the scoring clubs — 0.09 inches
  at the 7-iron falling to 0.02 at the utility wedge. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
