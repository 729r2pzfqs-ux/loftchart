description: >
  The G400 strengthened the G by half a degree through the set, putting the 7-iron
  at 30.0 degrees, and switched to a thinner Hyper 17-4 stainless face. Lengths,
  lies and bounce are unchanged from the G; offset is marginally tighter in the
  scoring clubs. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
