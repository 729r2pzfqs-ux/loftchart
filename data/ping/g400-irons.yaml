faq:
  - q: "What is the loft of a Ping G400 7-iron?"
    a: "The Ping G400 7-iron has a loft of 30 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping G400 irons made?"
    a: "The G400 was introduced in 2017 and was replaced by the G410 in 2019."
  - q: "Are Ping G400 lofts stronger than the G?"
    a: "Yes, by half a degree through most of the set. The G400 7-iron is 30 degrees against 30.5 for the G."
