description: >
  The S58 is the middle model of Ping's counting-down S series, a compact cast players
  iron with a dual-depth cavity, a tuning pocket and a vertical stabilising bar. Ping
  moved the centre of gravity progressively through the set — further back in the long
  irons for a higher launch, further forward in the short irons for a flatter, more
  controlled flight. It runs 2-iron through pitching wedge with the 7-iron at 34.25
  degrees and only 0.09 inches of offset, and the long irons carry negative bounce.
  Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat,
  brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2
  upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the
  BLACK (standard) lies.
