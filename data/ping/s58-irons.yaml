faq:
  - q: "What is the loft of a Ping S58 7-iron?"
    a: "The Ping S58 7-iron has a loft of 34.25 degrees, a standard (black dot) lie of 62.28 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping S58 irons made?"
    a: "The S58 was introduced in 2006 and was replaced by the S57 in 2007. It sits between the S59 of 2003 and the S57 in Ping's counting-down S series."
  - q: "What is the difference between the Ping S58 and the S57?"
    a: "The two share the 34.25-degree 7-iron and 0.09 inches of offset at that club, but the S57 rounds its lies to the nearest quarter degree (62.25 at the 7-iron against the S58's 62.28) and adds a tungsten toe weight."
  - q: "How much offset does the Ping S58 have?"
    a: "Very little: 0.21 inches at the 2-iron falling to 0.09 at the 7-iron and 0.04 at the pitching wedge."
