faq:
  - q: "What is the loft of a Ping Blueprint 7-iron?"
    a: "The Ping Blueprint 7-iron has a loft of 34 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping Blueprint irons made?"
    a: "The Blueprint was introduced in 2019, following the iBlade, and was succeeded by the Blueprint T and Blueprint S."
  - q: "How much offset does the Ping Blueprint have?"
    a: "It has the least offset of any Ping iron: 0.14 inches at the 2-iron, 0.05 at the 7-iron and 0.02 at the pitching wedge."
