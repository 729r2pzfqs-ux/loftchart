description: >
  The Blueprint is Ping's tour blade: a one-piece 8620 carbon steel forging with a
  tungsten toe screw, built from 2-iron through pitching wedge. Offset is the
  tightest in the Ping range at 0.05 inches in the 7-iron, and lofts are traditional
  with that club at 34 degrees — four degrees weaker than the G410 of the same year. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
