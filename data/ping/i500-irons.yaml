description: >
  The i500 was Ping's first hollow-body players-distance iron, pairing a thin maraging
  steel face with a compact forged body. It launched alongside the i210 and is four
  degrees stronger at the 7-iron — 30.5 against 33 — while keeping players-iron offset
  of 0.09 inches at the same club. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
