description: >
  The i200 is a cast 431 stainless players iron with a thinned face, a deeper Custom
  Tuning Port and weight moved to the hosel region and toe to raise MOI. Its loft, lie
  and length chart carried over unchanged into the i210 that replaced it a year later —
  the 7-iron is 33 degrees at 62.0 lie and 37 inches — but the i200 runs slightly more
  offset through the long irons, 0.19 inches at the 4-iron and 0.17 at the 5-iron
  against the i210's 0.18 and 0.15. The set is 3-iron through pitching wedge plus a
  50-degree utility wedge. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4
  flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green
  2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are
  the BLACK (standard) lies.
