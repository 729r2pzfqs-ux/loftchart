faq:
  - q: "What is the loft of a Ping i200 7-iron?"
    a: "The Ping i200 7-iron has a loft of 33 degrees, a standard (black dot) lie of 62.0 degrees and a steel-shaft length of 37.0 inches."
  - q: "When were Ping i200 irons made?"
    a: "The i200 was introduced in 2017 and was replaced by the i210 in 2018 — one of the shortest runs of any Ping iron."
  - q: "What is the difference between the Ping i200 and the i210?"
    a: "Lofts, lies and lengths are identical club for club. The i210 adds a softer elastomer insert in the Custom Tuning Port and trims the long-iron offset slightly, from 0.19 to 0.18 inches at the 4-iron and 0.17 to 0.15 at the 5-iron."
  - q: "What clubs come in a Ping i200 set?"
    a: "3-iron through pitching wedge, plus a 50-degree utility wedge that shares the pitching wedge's 64.1-degree lie and 35.5-inch length."
