sources:
  - "Ping's own i200 product page, Specifications table (http://web.archive.org/web/2018/https://ping.com/en-us/clubs/irons/i200) — supplied every length, loft, lie, offset, bounce and swing weight above except where noted below, plus the confirmation that lie is based on the black colour code at standard length."
  - "IMPORTANT note on the 6-iron: Ping's own published chart is faulty in that row. Across every archived snapshot checked, the i200 6-iron repeats the 7-iron's lie (62.0), offset (0.09) and bounce (9.0) verbatim, which cannot be right for a set whose other rows follow Ping's standard 0.7-0.8 degree lie progression. The 6-iron lie of 61.3 recorded here comes from the qsponge.com i200 spec table, which matches Ping's chart on every other club and matches the identical 59.0 / 59.8 / 60.5 / 61.3 / 62.0 / 62.8 / 63.5 / 64.1 progression Ping publishes for the iBlade, i210, i230 and i525. The 6-iron offset and bounce are deliberately OMITTED: qsponge gives 0.14 and 8.0, but that is a single secondary source for a row already known to be corrupt in the manufacturer chart, so those keys are left out rather than guessed."
  - "Note: 2ndswing.com's i200 spec table was checked and rejected — it lists the i210's lie progression (60.0 / 60.5 / 61.0 / 61.5 / 62.0) and the i210's offsets, and contradicts Ping's own chart on the clubs where that chart is sound."
  - "golflink.com 'PING Irons by Year' — the i200 is dated 2017 and the i210 2018."
  - "Note: year_discontinued is taken as the year the successor i210 was introduced, per the chronology recorded in ping/i210-irons.yaml."
