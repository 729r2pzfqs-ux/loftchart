description: >
  The G2 launched the G-series that has been Ping's game-improvement line ever
  since; it reached most retail shelves for the 2004 season. It kept the Custom
  Tuning Port of the i3 while widening the sole and adding progressive offset,
  and it was also sold in G2 EZ (slower swing speed), G2 HL (higher loft) and
  G2 L (ladies) variants. Lofts are only marginally stronger than the i3 O-Size,
  with the 7-iron at 34.3 degrees. Ping's colour-code (dot) system sets lie angle
  relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat,
  BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver
  4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
