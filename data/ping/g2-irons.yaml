faq:
  - q: "What is the loft of a Ping G2 7-iron?"
    a: "The Ping G2 7-iron has a loft of 34.3 degrees, a standard (black dot) lie of 62.28 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were the Ping G2 irons released?"
    a: "Ping introduced the G2 in 2003 and it was the company's headline game-improvement iron through the 2004 season, before the G5 replaced it in 2005."
  - q: "What variants of the Ping G2 iron were available?"
    a: "Besides the standard G2, Ping offered the G2 EZ for slower swing speeds, the G2 HL with higher lofts and the G2 L ladies model."
