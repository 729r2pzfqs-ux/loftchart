description: >
  The Anser Forged was Ping's first modern forged iron, built from 8620 carbon steel
  with a tungsten toe weight and a Custom Tuning Port. It runs 3-iron through pitching
  wedge with a 33.5-degree 7-iron — half a degree stronger than the cast S56 of the
  same era — and holds a D1 swing weight through the irons. Ping's colour-code (dot) system sets lie angle relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat, BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver 4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
