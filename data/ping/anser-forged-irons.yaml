faq:
  - q: "What is the loft of a Ping Anser Forged 7-iron?"
    a: "The Ping Anser Forged 7-iron has a loft of 33.5 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "When were Ping Anser Forged irons made?"
    a: "The Anser Forged was introduced in 2012 and was succeeded by the Anser V2."
  - q: "Was the Ping Anser Forged Ping's first forged iron?"
    a: "It was Ping's first modern forged iron, made from 8620 carbon steel rather than the investment-cast stainless Ping had used across its earlier lines."
