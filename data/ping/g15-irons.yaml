faq:
  - q: "What is the loft of a Ping G15 7-iron?"
    a: "The Ping G15 7-iron has a loft of 32 degrees, a standard (black dot) lie of 62.25 degrees and a steel-shaft length of 36.75 inches."
  - q: "What are the Ping G15 wedge lofts?"
    a: "The pitching wedge is 45 degrees, the utility wedge 50, the sand wedge 54 and the lob wedge 58 degrees."
  - q: "How much offset do Ping G15 irons have?"
    a: "Offset is progressive, running from 0.32 inches in the 3-iron down to 0.10 inches in the lob wedge, with 0.24 inches at the 7-iron."
