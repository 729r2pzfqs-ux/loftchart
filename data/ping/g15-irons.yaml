description: >
  The G15 is a wide-soled, high-launch game-improvement iron with a Custom Tuning
  Port and heavily progressive offset — 0.32 inches in the 3-iron tapering to
  0.10 inches in the lob wedge. Lofts are strong for the era: the 7-iron is
  32 degrees, four degrees stronger than the 1980s Ping Eye 2 and 2.3 degrees
  stronger than the 2003 G2. Ping's colour-code (dot) system sets lie angle
  relative to standard: gold 4 flat, brown 3 flat, orange 2 flat, red 1 flat,
  BLACK standard, blue 1 upright, green 2 upright, white 3 upright, silver
  4 upright, maroon 5 upright. The lies below are the BLACK (standard) lies.
  Graphite-shafted clubs run one swing-weight point lighter than the steel values
  shown.
