faq:
  - q: "What is the loft of a Mizuno MP-29 7-iron?"
    a: "The Mizuno MP-29 7-iron has a loft of 35 degrees, with a 60.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What year did the Mizuno MP-29 come out?"
    a: "Mizuno's own irons timeline lists the MP-29 as a 1992 model, produced through 2000. Some spec databases label it 1999 because that is the catalogue year they transcribed."
  - q: "How do the MP-29 lofts compare with the MP-14?"
    a: "The MP-29 is roughly 2 degrees stronger through the set: a 35-degree 7-iron and 48-degree pitching wedge against the MP-14's 36 and 50 degrees."
