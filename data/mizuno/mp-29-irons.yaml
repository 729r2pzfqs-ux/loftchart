description: >
  The MP-29 is a Grain Flow Forged muscle-back blade with a curved muscle pad, produced
  for most of the 1990s and best known as the long-iron half of the combo set Tiger Woods
  used at the 1997 Masters. It runs stronger than the MP-14 throughout, with a 35-degree
  7-iron and a 48-degree pitching wedge, and keeps a 4-degree gap through the short irons.
  The set was catalogued from a 1-iron through pitching wedge with a matching 56-degree sand wedge.
  Lengths and lofts listed are the standard men's steel-shaft specification.
