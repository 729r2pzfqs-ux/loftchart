description: >
  The JPX-921 Hot Metal moved from the Chromoly 4140M of the JPX-919 to Nickel
  Chromoly 4335, a stronger alloy that let Mizuno thin the face to 2.0 mm and
  add a seamless cup-face design. It is the wide-soled, high-offset member of
  the 2020 JPX family, with offset from 0.224 inches in the 4-iron down to
  0.063 inches in the lob wedge, and was sold as a 4-iron through lob wedge set.
  Lofts are two degrees stronger than the JPX-921 Forged of the same generation:
  the 7-iron is 29 degrees and the pitching wedge 44 degrees.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
