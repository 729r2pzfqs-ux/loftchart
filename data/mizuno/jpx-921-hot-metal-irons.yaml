faq:
  - q: "What is the loft of a Mizuno JPX-921 Hot Metal 7-iron?"
    a: "The Mizuno JPX-921 Hot Metal 7-iron has a loft of 29 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How much stronger are JPX-921 Hot Metal lofts than JPX-921 Forged?"
    a: "Two degrees through the set. The Hot Metal 7-iron is 29 degrees against 31 degrees for the Forged, and the Hot Metal pitching wedge is 44 degrees against 45 degrees."
  - q: "What is the pitching wedge loft on the Mizuno JPX-921 Hot Metal?"
    a: "The JPX-921 Hot Metal pitching wedge is 44 degrees. The stock set continues with a 49-degree gap wedge, 54-degree sand wedge and 59-degree lob wedge."
