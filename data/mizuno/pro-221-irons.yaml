description: >
  The Mizuno Pro 221 is the one-piece muscle-back of the 2022 Mizuno Pro series,
  replacing the MP-20 MB and sitting alongside the cavity-backed Pro 223 and the
  hollow-body Pro 225. It is Grain Flow Forged HD from a single billet of 1025E
  Pure Select mild carbon steel in Hiroshima, with a soft copper underlay beneath
  the nickel chrome plating. Lofts are traditional for a blade, with a 34-degree
  7-iron and a 46-degree pitching wedge, and offset is the smallest of the three
  2022 models at 0.087 inch in the 7-iron. The stock set is 3-PW in right hand.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
