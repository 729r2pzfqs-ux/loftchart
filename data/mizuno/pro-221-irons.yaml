faq:
  - q: "What is the loft of a Mizuno Pro 221 7-iron?"
    a: "The Mizuno Pro 221 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno Pro 221?"
    a: "The Mizuno Pro 221 pitching wedge is 46 degrees. The stock right-handed set runs 3-PW, so there is no gap wedge in the set."
  - q: "How do Mizuno Pro 221 lofts compare to the Pro 223 and Pro 225?"
    a: "The Pro 221 is the weakest lofted of the three 2022 models at 34 degrees in the 7-iron, against 32 degrees in the Pro 223 and 30 degrees in the Pro 225."
