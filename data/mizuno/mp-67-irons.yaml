description: >
  The MP-67 is a Grain Flow Forged split muscle-back blade sold in a 3-iron through
  pitching wedge range. It reverted to the traditional loft ladder of the MP-33 rather
  than the stronger MP-37 numbers, with a 36-degree 7-iron, a 48-degree pitching wedge
  and a consistent 4-degree gap from the 6-iron down. Lie angles run from 59.5 degrees
  in the 3-iron to 63 degrees at the wedge.
  Lengths and lofts listed are the standard men's steel-shaft specification.
