faq:
  - q: "What is the loft of a Mizuno MP-67 7-iron?"
    a: "The Mizuno MP-67 7-iron has a loft of 36 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "Why are the Mizuno MP-67 lofts weaker than the MP-68?"
    a: "The MP-67 uses the traditional MP-33 loft ladder, one degree weaker than the MP-68 through the set: 36 degrees at the 7-iron and 48 at the pitching wedge, against 35 and 47."
  - q: "What clubs came in the Mizuno MP-67 set?"
    a: "The published stock range is a 3-iron through pitching wedge. A 2-iron was catalogued at 19 degrees but its standard length was not published."
