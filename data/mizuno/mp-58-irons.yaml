sources:
  - "Note: the MP-58 was announced on 4 September 2009 alongside the MP-68 (Golf Monthly, 'New Mizuno irons: MX-300, MX-1000, MP-58 and MP-68'); Mizuno's own irons timeline windows it 2010-2011. This file previously recorded 2008, which no source supports and which made the MP-58 predate the MP-63 it was recorded as succeeding. Corrected to 2009."
