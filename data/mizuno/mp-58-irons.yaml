description: >
  The MP-58 is a Grain Flow Forged cavity back that uses a titanium muscle insert in place
  of steel behind the face, freeing weight that Mizuno redistributed to the heel and toe.
  It is the largest and most forgiving MP iron of its generation and carries the most
  offset in the range, 0.161 inches at the 3-iron falling to 0.114 inches at the wedge.
  Lofts follow the traditional MP progression with a 35-degree 7-iron and a 47-degree
  pitching wedge, and the stock set was 3-PW or 4-PW.
  Lengths and lofts listed are the standard men's steel-shaft specification.
