faq:
  - q: "What is the loft of a Mizuno MP-58 7-iron?"
    a: "The Mizuno MP-58 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the titanium muscle in the Mizuno MP-58?"
    a: "Mizuno replaced the steel muscle pad behind the face with a lighter titanium insert. The weight saved was moved out to the heel and toe, which is why the MP-58 is the most forgiving iron in that MP range."
  - q: "How does the MP-58 compare with the MP-63?"
    a: "The MP-58 is the larger head with a full degree more loft in the mid and short irons - 35 degrees at the 7-iron against 34 on the MP-63 - and roughly 0.04 inches more offset through the long irons."
