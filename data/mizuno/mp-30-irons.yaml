description: >
  The MP-30 is a Grain Flow Forged players iron sold from the 2-iron through pitching wedge.
  It carries noticeably more offset than the blades either side of it in the MP line,
  running 0.154 inches in the 2-iron and tapering to 0.118 inches at the pitching wedge.
  Lofts follow Mizuno's standard MP progression of the period, with a 35-degree 7-iron,
  a 47-degree pitching wedge and a 4-degree gap through the short irons.
  Lengths and lofts listed are the standard men's steel-shaft specification.
