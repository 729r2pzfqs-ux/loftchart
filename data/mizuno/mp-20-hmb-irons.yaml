description: >
  The MP-20 HMB is a hollow-body iron sold as a full 2-iron through pitching wedge set rather
  than as a long-iron replacement only. A Grain Flow Forged Chromoly face and neck section is
  fused to a multi-material body, with high-density tungsten placed in both the toe and the
  heel. It shares the loft and lie progression of the MP-20 MMC, with a 32-degree 7-iron and
  a 46-degree pitching wedge, but carries slightly more offset at 0.126 inches in the 7-iron
  and less bounce in the long irons, which are listed at 0 degrees in the 2- and 3-iron.
  All figures are the men's standard steel-shaft specification.
