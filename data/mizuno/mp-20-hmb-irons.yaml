faq:
  - q: "What is the loft of a Mizuno MP-20 HMB 7-iron?"
    a: "The Mizuno MP-20 HMB 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "Are the MP-20 HMB lofts the same as the MP-20 MMC?"
    a: "Yes. Both run 22 degrees at the 4-iron, 32 at the 7-iron and 46 at the pitching wedge. The HMB adds a 2-iron at 16 degrees and a 3-iron at 19 degrees, and carries about 0.004 inches more offset per club."
  - q: "Is the MP-20 HMB a hollow iron?"
    a: "Yes. It uses a Grain Flow Forged Chromoly face and neck fused to a multi-material body, with tungsten in the toe and heel, across the whole 2-iron to pitching wedge range."
