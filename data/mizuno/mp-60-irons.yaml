description: >
  The MP-60 is a Grain Flow Forged cavity back built on Mizuno's Cut Muscle design, in
  which a reinforcing pad sits behind a cavity rather than filling it. Mizuno described
  the head as about 4 percent larger than the MP-32 it was drawn from, with a
  correspondingly larger hitting area and slightly more offset. Lofts follow the
  traditional MP progression, with a 35-degree 7-iron and a 47-degree pitching wedge.
  The set was sold 3-PW with a 2-iron available; lengths and lofts listed are the
  standard men's steel-shaft specification.
