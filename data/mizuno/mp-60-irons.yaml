faq:
  - q: "What is the loft of a Mizuno MP-60 7-iron?"
    a: "The Mizuno MP-60 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What year did the Mizuno MP-60 come out?"
    a: "The MP-60 was introduced in 2006 and was replaced by the MP-52 the following year. It is often mislabelled as a 2011 model because it shares a spec chart layout with later MP irons."
  - q: "How does the MP-60 differ from the MP-32?"
    a: "The MP-60 uses the same Cut Muscle idea but on a head Mizuno rated as roughly 4 percent larger, and it carries more offset - 0.126 inches at the 7-iron against 0.110 inches on the MP-32 - while keeping identical lofts and lies."
