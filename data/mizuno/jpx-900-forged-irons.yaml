description: >
  The JPX-900 Forged is Grain Flow Forged from a boron-infused 1025E carbon steel,
  which Mizuno used to build a thinner, stronger face while keeping a bendable hosel
  for loft and lie adjustment. It is a compact players-distance iron with a modest
  cavity and moderate offset, sold as a 4-PW plus gap wedge set.
  Lofts are stronger than Mizuno's MP line of the same period, with a 31-degree 7-iron.
  Lengths and lofts listed are the standard men's steel-shaft specification.
