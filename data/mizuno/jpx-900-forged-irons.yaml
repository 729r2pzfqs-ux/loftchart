faq:
  - q: "What is the loft of a Mizuno JPX-900 Forged 7-iron?"
    a: "The Mizuno JPX-900 Forged 7-iron has a loft of 31 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the JPX-900 Forged made of?"
    a: "It is Grain Flow Forged from 1025E carbon steel infused with boron, which lets Mizuno use a thinner, stronger face while keeping the hosel bendable for loft and lie adjustment."
  - q: "How strong are the JPX-900 Forged lofts?"
    a: "They are stronger than Mizuno's MP irons of the same era: 31 degrees at the 7-iron and 45 degrees at the pitching wedge, versus 35 and 47 degrees on the MP-57."
