description: >
  The MP-15 sat above the MP-4 as the more forgiving players iron of the pair,
  reintroducing the titanium muscle insert Mizuno had used in the MP-59 and pairing
  it with a slightly larger head. Removing mass from the muscle pad allowed weight to
  be pushed toward the toe and sole while the head stays Grain Flow Forged from 1025E
  mild carbon steel. The stock 3-PW set shares the MP-4 loft ladder, 21 degrees in the
  3-iron to 46 degrees in the pitching wedge with a 34-degree 7-iron, but carries more
  offset. Specs below are the men's standard steel-shaft build.
