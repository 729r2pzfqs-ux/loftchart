faq:
  - q: "What is the loft of a Mizuno MP-15 7-iron?"
    a: "The Mizuno MP-15 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-15?"
    a: "The MP-15 pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "What is the difference between the Mizuno MP-15 and the MP-4?"
    a: "They share identical lofts, lies and lengths. The MP-15 uses a titanium muscle insert and a slightly larger head with more offset, roughly 0.028 inches more in the 3-iron, making it the more forgiving of the two."
