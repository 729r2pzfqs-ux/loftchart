description: >
  The MP-4 followed the MP-64 and moved the line further toward a traditional shape,
  with a thin topline, narrow sole and the least offset of any MP iron of its
  generation. It is Grain Flow Forged from a single billet of 1025E mild carbon steel
  and was sold as a 3-PW set. Lofts match the MP-64 exactly, running 21 degrees in the
  3-iron to 46 degrees in the pitching wedge with a 34-degree 7-iron, but offset is
  reduced through the short irons. Specs below are the men's standard steel-shaft build.
