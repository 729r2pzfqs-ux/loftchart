faq:
  - q: "What is the loft of a Mizuno MP-4 7-iron?"
    a: "The Mizuno MP-4 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-4?"
    a: "The MP-4 pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "How much offset do the Mizuno MP-4 irons have?"
    a: "Very little. Offset runs from 0.102 inches in the 3-iron down to 0.075 inches in the pitching wedge, less than the MP-64 it replaced."
