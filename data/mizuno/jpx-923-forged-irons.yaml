description: >
  The JPX-923 Forged split the set by material for the first time in the line,
  using third-generation Chromoly 4120 forging in the 4- through 7-iron for ball
  speed and 1025E Pure Select mild carbon steel in the 8-iron through gap wedge
  for feel. Face thickness behind impact dropped to 2.2 mm from 2.6 mm on the
  JPX-921 Forged, and a new V-Chassis allowed a thinner topline.
  The stock set is 4-iron through gap wedge with offset from 0.155 inches down
  to 0.094 inches, and the 7-iron is 30 degrees against 28.5 degrees on the
  matching JPX-923 Hot Metal.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
