faq:
  - q: "What is the loft of a Mizuno JPX-923 Forged 7-iron?"
    a: "The Mizuno JPX-923 Forged 7-iron has a loft of 30 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How do JPX-923 Forged lofts compare with JPX-923 Hot Metal?"
    a: "The Forged is weaker by 1.5 degrees through most of the set. Its 7-iron is 30 degrees against 28.5 degrees for the Hot Metal, and its pitching wedge is 44 degrees against 42.5 degrees."
  - q: "Are the JPX-923 Forged irons made from one material?"
    a: "No. The 4- through 7-iron are Grain Flow Forged from Chromoly 4120 for ball speed, while the 8-iron through gap wedge are forged from 1025E Pure Select mild carbon steel."
