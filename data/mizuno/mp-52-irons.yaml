description: >
  The MP-52 is a Grain Flow Forged cavity back and was the widest-sole, most forgiving
  iron in the MP line when it launched. It keeps the MP loft progression of its predecessor the MP-60, with a
  35-degree 7-iron and a 47-degree pitching wedge, and carries slightly less offset than
  the MP-60 through the long irons. The stock set was 3-PW with a double nickel chrome
  finish. Lengths and lofts listed are the standard men's steel-shaft specification.
