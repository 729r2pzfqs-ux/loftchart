faq:
  - q: "What is the loft of a Mizuno MP-52 7-iron?"
    a: "The Mizuno MP-52 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-52?"
    a: "The MP-52 pitching wedge is 47 degrees at 35.5 inches, which is several degrees weaker than a modern game-improvement pitching wedge."
  - q: "How does the MP-52 compare with the MP-57?"
    a: "They share identical lofts, lies and lengths, and both were sold as 3-PW sets. The MP-57 carries noticeably more offset, 0.161 inches at the 3-iron against 0.142 inches on the MP-52."
