faq:
  - q: "What is the loft of a Mizuno MP-37 7-iron?"
    a: "The Mizuno MP-37 7-iron has a loft of 35 degrees, with a 61-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the Mizuno MP-37 and MP-33 lofts compare?"
    a: "The MP-37 is one degree stronger through the mid and short irons: a 35-degree 7-iron and 47-degree pitching wedge against the MP-33's 36 and 48 degrees."
  - q: "How much offset do the Mizuno MP-37 irons have?"
    a: "Offset is 0.110 inches from the 2-iron through the 7-iron and 0.120 inches in the 8-iron, 9-iron and pitching wedge."
