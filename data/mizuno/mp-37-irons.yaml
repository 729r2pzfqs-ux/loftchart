description: >
  The MP-37 is a Grain Flow Forged players iron sold alongside the MP-32 and MP-33,
  covering the 2-iron through pitching wedge. It shares the loft ladder of the MP-30
  before it, with a 35-degree 7-iron and a 47-degree pitching wedge, but cuts offset
  to a flat 0.11 inches through the long and mid irons. Bounce is comparatively high
  for a blade, starting at 4 degrees in the 2-iron and reaching 7 degrees at the wedge.
  Lengths and lofts listed are the standard men's steel-shaft specification.
