faq:
  - q: "What is the loft of a Mizuno JPX-919 Forged 7-iron?"
    a: "The Mizuno JPX-919 Forged 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How do JPX-919 Forged lofts compare with JPX-919 Hot Metal?"
    a: "The Forged is about two degrees weaker through the set. Its 7-iron is 32 degrees against 30 degrees for the Hot Metal, and its pitching wedge is 46 degrees against 45 degrees."
  - q: "What clubs came in the stock JPX-919 Forged set?"
    a: "The stock range was 4-iron through gap wedge. The pitching wedge is 46 degrees and the gap wedge 51 degrees; sand and lob wedges were not part of the set."
