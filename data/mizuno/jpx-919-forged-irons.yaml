description: >
  The JPX-919 Forged replaced the JPX-900 Forged and was the first Mizuno iron
  Grain Flow Forged in one piece from Chromoly 4120, a harder alloy that allowed
  a thinner reverse-milled face than the 1025E carbon steel used in the MP line.
  It was sold as a 4-iron through gap wedge set with a compact players' cavity
  head and modest offset of 0.161 inches falling to 0.093 inches.
  Lofts are about a degree stronger than the JPX-900 Forged through the mid
  irons, giving a 32-degree 7-iron and a 46-degree pitching wedge, which is
  still notably weaker than the matching JPX-919 Hot Metal.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
