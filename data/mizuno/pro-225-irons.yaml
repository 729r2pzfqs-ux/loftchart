description: >
  The Mizuno Pro 225 is the players-distance model of the 2022 Mizuno Pro series and the
  replacement for the MP-20 HMB. The 2-iron through 8-iron use a Grain Flow Forged 4135
  Chromoly face and neck over a hollow body, with a 28.5-gram tungsten weight in the 2-7
  irons, while the 9-iron through gap wedge are 1025E Pure Select mild carbon steel with
  a 431 stainless back weight. Lofts are the strongest of the three 2022 models, with a
  30-degree 7-iron and a 44-degree pitching wedge. The stock right-handed set is 2-GW.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
