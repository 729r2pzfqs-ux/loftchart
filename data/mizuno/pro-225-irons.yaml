faq:
  - q: "What is the loft of a Mizuno Pro 225 7-iron?"
    a: "The Mizuno Pro 225 7-iron has a loft of 30 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno Pro 225?"
    a: "The Mizuno Pro 225 pitching wedge is 44 degrees and the matching gap wedge is 49 degrees."
  - q: "How much stronger are the Mizuno Pro 225 lofts than the Pro 221?"
    a: "Four degrees through most of the set. The Pro 225 7-iron is 30 degrees against 34 in the Pro 221, and the pitching wedge is 44 degrees against 46."
