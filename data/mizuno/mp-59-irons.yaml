description: >
  The MP-59 is a Grain Flow Forged cavity back that replaced the MP-58 in Mizuno's
  players line. It uses a titanium insert in the muscle pad, allowing weight to be
  redistributed to the perimeter for a larger effective hitting area than the MP-58
  while keeping a compact head and minimal offset. The set was sold 3-PW with lofts
  running from 21 degrees in the 3-iron to 46 degrees in the pitching wedge, and a
  34-degree 7-iron. Specs below are the men's standard steel-shaft build.
