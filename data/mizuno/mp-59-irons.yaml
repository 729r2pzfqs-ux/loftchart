faq:
  - q: "What is the loft of a Mizuno MP-59 7-iron?"
    a: "The Mizuno MP-59 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-59?"
    a: "The MP-59 pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "How does the MP-59 differ from the MP-58?"
    a: "Both share the same lofts and lengths, but the MP-59 adds a titanium insert in the muscle pad so mass can be moved to the perimeter, giving it a larger effective hitting area than the MP-58."
