faq:
  - q: "What is the loft of a Mizuno MP-18 MMC 7-iron?"
    a: "The Mizuno MP-18 MMC 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "Why are the MP-18 MMC lofts different from the MP-18 MB and SC?"
    a: "The MMC is built as a separate spec that runs about 2 degrees stronger than the MB and SC from the 4-iron through the 9-iron, though both lines finish at a 46-degree pitching wedge. It also carries more offset, from 0.138 inches in the 4-iron down to 0.098 inches in the pitching wedge."
  - q: "What clubs came in the stock Mizuno MP-18 MMC set?"
    a: "The MMC was sold as a 4-PW set. Long-iron replacements came from the separate MP-18 MMC Fli-Hi models rather than a 3-iron in the same head shape."
