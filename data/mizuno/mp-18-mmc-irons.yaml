description: >
  The MP-18 MMC is the multi-material model in Mizuno's MP-18 family, combining an
  HD Grain Flow Forged 1025E mild carbon steel body with a titanium insert and
  tungsten toe weighting in the longer irons. It is the most forgiving of the three
  MP-18 heads and runs a separate spec from the MB and SC, roughly 2 degrees stronger
  through most of the set with a 32-degree 7-iron and noticeably more offset. The
  stock set was 4-PW, with Fli-Hi models covering the long irons. Specs below are the
  men's standard steel-shaft build.
