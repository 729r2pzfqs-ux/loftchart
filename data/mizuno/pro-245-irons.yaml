faq:
  - q: "What is the loft of a Mizuno Pro 245 7-iron?"
    a: "The Mizuno Pro 245 7-iron has a loft of 30 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno Pro 245?"
    a: "The Mizuno Pro 245 pitching wedge is 43 degrees and the matching gap wedge is 48 degrees, each a degree stronger than the Pro 225."
  - q: "Are the Mizuno Pro 245 irons hollow?"
    a: "The 2-iron through 8-iron are hollow bodied with a forged 4135 Chromoly face and neck and an internal tungsten weight in the 2-7 irons. The 9-iron through gap wedge use a partial hollow 1025E mild carbon steel body."
