description: >
  The Mizuno Pro 245 is the players-distance model of the 2024 Mizuno Pro series,
  replacing the Pro 225. The 2-iron through 8-iron are hollow bodied with a Grain Flow
  Forged 4135 Chromoly face and neck, a laser-welded 431 stainless back piece and a
  46-gram internally suspended tungsten weight in the 2-7 irons, while the 9-iron
  through gap wedge use a partial hollow 1025E Pure Select body with a 17-4 back piece.
  The 7-iron is 30 degrees, unchanged from the Pro 225, but the 9-iron, pitching wedge
  and gap wedge were each strengthened by a degree. The stock set is 2-GW in right hand
  and 4-GW in left. Lofts, lies and lengths listed are the men's standard steel-shaft
  build.
