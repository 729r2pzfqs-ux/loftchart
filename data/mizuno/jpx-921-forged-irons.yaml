faq:
  - q: "What is the loft of a Mizuno JPX-921 Forged 7-iron?"
    a: "The Mizuno JPX-921 Forged 7-iron has a loft of 31 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How do JPX-921 Forged lofts compare with JPX-921 Hot Metal?"
    a: "The Forged is two degrees weaker across the set. Its 7-iron is 31 degrees against 29 degrees for the Hot Metal, and its pitching wedge is 45 degrees against 44 degrees."
  - q: "Are the JPX-921 Forged irons stronger-lofted than the JPX-919 Forged?"
    a: "Yes, by one degree through most of the set. The 7-iron went from 32 degrees to 31 degrees and the pitching wedge from 46 degrees to 45 degrees."
