description: >
  The JPX-921 Forged is a one-piece Grain Flow Forged Chromoly 4120 iron with a
  face thinned to 2.6 mm and a redesigned sole and topline compared with the
  JPX-919 Forged. It was sold as a 4-iron through gap wedge set with a players'
  cavity profile and offset running from 0.150 inches down to 0.091 inches.
  Lofts were strengthened by one degree through most of the set relative to the
  JPX-919 Forged, giving a 31-degree 7-iron and a 45-degree pitching wedge,
  which is still two degrees weaker than the JPX-921 Hot Metal.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
