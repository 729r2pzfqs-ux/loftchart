faq:
  - q: "What is the loft of a Mizuno MP-68 7-iron?"
    a: "The Mizuno MP-68 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How much offset do the Mizuno MP-68 irons have?"
    a: "Very little. Offset is 0.110 inches from the 3-iron through the 7-iron, 0.102 inches in the 8-iron and 9-iron, and 0.094 inches at the pitching wedge."
  - q: "What is the pitching wedge loft on the Mizuno MP-68?"
    a: "The MP-68 pitching wedge is 47 degrees, with a 63-degree lie, 6 degrees of bounce and a 35.5-inch steel-shaft length."
