description: >
  The MP-68 is a Grain Flow Forged muscle-back blade with a scalloped muscle pad and a
  shortened hosel, sold in a 3-iron through pitching wedge range. It runs one degree
  stronger than the MP-67 it replaced, with a 35-degree 7-iron and a 47-degree pitching
  wedge, and carries very little offset: 0.110 inches through the 7-iron, tapering to
  0.094 inches at the pitching wedge. Bounce climbs from 2 degrees in the long irons to
  6 degrees at the wedge.
  Lengths and lofts listed are the standard men's steel-shaft specification.
