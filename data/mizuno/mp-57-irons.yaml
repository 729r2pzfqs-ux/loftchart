faq:
  - q: "What is the loft of a Mizuno MP-57 7-iron?"
    a: "The Mizuno MP-57 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What makes the MP-57 different from the MP-32?"
    a: "Both use Mizuno's Cut Muscle design and share the same lofts, but the MP-57 is a fuller cavity back with substantially more offset, making it the more forgiving of the two."
  - q: "Are the Mizuno MP-57 irons forged?"
    a: "Yes. They are Grain Flow Forged from a single billet of 1025E mild carbon steel."
