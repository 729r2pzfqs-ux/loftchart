description: >
  The MP-57 was the most forgiving MP iron of its era, combining Mizuno's Grain Flow
  Forged construction with a Cut Muscle design in which a reinforcing muscle pad sits
  behind a full cavity. It carries noticeably more offset than the MP-32 while keeping
  the same loft progression, and was sold as a 3-PW or 4-PW set.
  Lengths and lofts listed are the standard men's steel-shaft specification.
