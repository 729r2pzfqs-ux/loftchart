description: >
  The MP-69 is a one-piece muscle-back blade Grain Flow Forged from a single billet of
  1025E Pure Select mild carbon steel at Mizuno's Hiroshima plant. It replaced the MP-68
  and introduced Mizuno's 4D Muscle design, which shifts muscle-pad mass progressively
  through the set rather than holding one profile across every head. Lofts are a degree
  stronger than the MP-68 from the 6-iron down, giving a 34-degree 7-iron, and offset is
  minimal at 0.110 inches through the long and mid irons.
  Lengths and lofts listed are the standard men's steel-shaft specification.
