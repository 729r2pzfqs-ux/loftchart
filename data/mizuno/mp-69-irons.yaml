faq:
  - q: "What is the loft of a Mizuno MP-69 7-iron?"
    a: "The Mizuno MP-69 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the MP-69 lofts compare with the MP-68?"
    a: "They match through the 5-iron at 21, 24 and 27 degrees, but the MP-69 is one degree stronger from the 6-iron down: a 34-degree 7-iron and a 46-degree pitching wedge against 35 and 47 degrees on the MP-68."
  - q: "Are the Mizuno MP-69 irons forged?"
    a: "Yes. Each head is Grain Flow Forged from a single billet of 1025E Pure Select mild carbon steel."
