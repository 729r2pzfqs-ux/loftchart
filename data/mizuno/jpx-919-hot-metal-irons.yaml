faq:
  - q: "What is the loft of a Mizuno JPX-919 Hot Metal 7-iron?"
    a: "The Mizuno JPX-919 Hot Metal 7-iron has a loft of 30 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "Is the JPX-919 Hot Metal stronger-lofted than the JPX-919 Forged?"
    a: "Yes. The Hot Metal is two degrees stronger in the 4-, 5-, 6- and 7-irons and one degree stronger from the 8-iron down, so its 30-degree 7-iron sits against the Forged model's 32 degrees."
  - q: "What wedges were in the JPX-919 Hot Metal set?"
    a: "The stock range was 4-iron through lob wedge, with a 45-degree pitching wedge, 50-degree gap wedge, 55-degree sand wedge and 60-degree lob wedge."
