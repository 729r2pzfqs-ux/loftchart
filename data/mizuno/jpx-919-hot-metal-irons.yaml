description: >
  The JPX-919 Hot Metal is the cast, distance-oriented member of the 2018 JPX
  family, built from Chromoly 4140M with a face milled down to 2.0 mm behind
  impact. It carried a wider sole, a thicker topline and considerably more
  offset than the JPX-919 Forged, running from 0.230 inches in the 4-iron to
  0.102 inches in the wedges. Lofts are materially stronger than the Forged
  model of the same generation: the 7-iron is 30 degrees and the pitching wedge
  45 degrees, against 32 and 46 degrees on the Forged.
  The stock set ran 4-iron through lob wedge.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
