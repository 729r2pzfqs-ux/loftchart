description: >
  The MP-14 is a Grain Flow Forged muscle-back blade from Mizuno's mid-1990s MP line,
  sold as a long 1-iron through sand wedge range. Its lofts are weak even by the
  standards of its own era, with a 36-degree 7-iron and a 50-degree pitching wedge,
  and the loft gap widens to 5 degrees between the 8-iron and the wedges.
  Lie angles start unusually flat at 55 degrees in the 1-iron.
  Lengths and lofts listed are the standard men's steel-shaft specification.
