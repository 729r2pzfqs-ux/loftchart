faq:
  - q: "What is the loft of a Mizuno MP-14 7-iron?"
    a: "The Mizuno MP-14 7-iron has a loft of 36 degrees, with a 60.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-14?"
    a: "The MP-14 pitching wedge is 50 degrees, about 6 to 8 degrees weaker than a modern game-improvement pitching wedge. The stock sand wedge is 56 degrees."
  - q: "What clubs came in the Mizuno MP-14 set?"
    a: "The published range runs from a 1-iron through the pitching wedge, with a matching 56-degree sand wedge."
