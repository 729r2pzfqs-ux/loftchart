sources:
  - "Note: Mizuno's official irons timeline (https://mizunogolf.com/us/irons-timeline/) windows the MP-29 at 1992-2000 and the MP-14 at 1994-1998, so the MP-29 came first and the two were concurrent rather than sequential. Tiger Woods's 1997 Masters set combined them, MP-29 in the long irons and MP-14 in the short. This file previously recorded the MP-29 as the MP-14's successor, inverting the chronology; the two are now cross-linked as concurrent models rather than a succession."
