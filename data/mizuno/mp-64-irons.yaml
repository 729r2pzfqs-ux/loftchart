description: >
  The MP-64 replaced the MP-59 as Mizuno's players cavity back and was Grain Flow
  Forged from a single billet of 1025E mild carbon steel at the Hiroshima plant.
  It dropped the titanium insert used in the MP-59 in favour of a one-piece forging
  with a shallower cavity, a thinner topline and slightly less offset. The stock set
  was 3-PW, running 21 degrees in the 3-iron to 46 degrees in the pitching wedge with
  a 34-degree 7-iron. Specs below are the men's standard steel-shaft build.
