faq:
  - q: "What is the loft of a Mizuno MP-64 7-iron?"
    a: "The Mizuno MP-64 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-64?"
    a: "The MP-64 pitching wedge is 46 degrees, which is around 2 degrees weaker than a typical players-distance pitching wedge of the same era."
  - q: "Are the Mizuno MP-64 irons forged?"
    a: "Yes. The MP-64 is Grain Flow Forged from a single billet of 1025E mild carbon steel, with no inserts or multi-material construction."
