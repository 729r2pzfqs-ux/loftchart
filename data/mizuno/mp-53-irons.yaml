description: >
  The MP-53 is a Grain Flow Forged players cavity back using a Diamond Muscle shape and a
  V-shaped milled pocket that removes roughly 14 grams from behind the face and moves it
  around the cavity. It is the larger and more forgiving of the pair Mizuno launched
  alongside the MP-63, while keeping a comparatively thin topline and modest offset. Lofts
  run 21 degrees at the 3-iron to 46 degrees at the pitching wedge, with a 34-degree
  7-iron, and the stock set was 3-PW. Lengths and lofts listed are the standard men's
  steel-shaft specification.
