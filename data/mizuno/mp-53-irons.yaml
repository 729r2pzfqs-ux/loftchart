faq:
  - q: "What is the loft of a Mizuno MP-53 7-iron?"
    a: "The Mizuno MP-53 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How do the MP-53 and MP-63 differ?"
    a: "They share identical lofts, lies and lengths. The MP-53 is the larger head of the two and carries more offset, 0.142 inches at the 3-iron against 0.122 inches on the MP-63."
  - q: "What is the pitching wedge loft on the Mizuno MP-53?"
    a: "The MP-53 pitching wedge is 46 degrees at 35.5 inches, one degree stronger than the 47-degree wedge in the earlier MP-52 and MP-62 sets."
