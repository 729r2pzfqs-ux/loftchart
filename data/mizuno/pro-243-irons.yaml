description: >
  The Mizuno Pro 243 is the players cavity-back of the 2024 Mizuno Pro series, replacing
  the Pro 223. The 4-7 irons use a 4120 Chromoly face with a wider, longer flow micro
  slot, while the 8-iron through gap wedge are 1025E Pure Select mild carbon steel Grain
  Flow Forged HD from a single billet. Compared with the Pro 223 the short irons were
  strengthened: the 9-iron went from 41 to 40 degrees, the pitching wedge from 46 to 44
  and the gap wedge from 51 to 48, while the 7-iron stayed at 32 degrees. Bounce was
  raised by one degree in the long irons and two in the scoring irons, and the set is
  right-hand only in 4-GW. Lofts, lies and lengths listed are the men's standard
  steel-shaft build.
