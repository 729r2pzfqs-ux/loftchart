faq:
  - q: "What is the loft of a Mizuno Pro 243 7-iron?"
    a: "The Mizuno Pro 243 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno Pro 243?"
    a: "The Mizuno Pro 243 pitching wedge is 44 degrees and the matching gap wedge is 48 degrees, both 2 to 3 degrees stronger than the Pro 223 they replaced."
  - q: "Are the Mizuno Pro 243 irons forged?"
    a: "Yes. The 8-iron through gap wedge are Grain Flow Forged HD from a single billet of 1025E mild carbon steel, and the 4-7 irons combine a forged body with a 4120 Chromoly face and micro slot."
