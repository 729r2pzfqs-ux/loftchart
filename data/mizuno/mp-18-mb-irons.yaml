faq:
  - q: "What is the loft of a Mizuno MP-18 MB 7-iron?"
    a: "The Mizuno MP-18 MB 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-18 MB?"
    a: "The MP-18 MB pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "Do the MP-18 MB and MP-18 SC share the same lofts?"
    a: "Yes. The MB and SC have identical lofts, lies, lengths and offsets, which is why Mizuno sold them as a combo set. The MP-18 MMC is a separate spec, running 2 degrees stronger through most of the set."
