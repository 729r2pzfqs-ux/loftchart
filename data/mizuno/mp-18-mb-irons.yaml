description: >
  The MP-18 MB is the muscle back of Mizuno's three-model MP-18 family, sold
  alongside the MP-18 SC split cavity and the multi-material MP-18 MMC. It is
  HD Grain Flow Forged from 1025E mild carbon steel and uses the thinnest topline
  and least offset of the three, running 0.102 inches in the 3-iron down to 0.075
  inches in the pitching wedge. The stock set was 3-PW with a 34-degree 7-iron and a
  46-degree pitching wedge. Specs below are the men's standard steel-shaft build.
