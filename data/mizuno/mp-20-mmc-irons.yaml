faq:
  - q: "What is the loft of a Mizuno MP-20 MMC 7-iron?"
    a: "The Mizuno MP-20 MMC 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How do MP-20 MMC lofts compare with the MP-20 MB?"
    a: "The MMC is two degrees stronger through the mid-irons, 32 degrees at the 7-iron against 34 degrees for the MB, and both share a 46-degree pitching wedge."
  - q: "What is inside the MP-20 MMC head?"
    a: "A forged titanium muscle plate is bonded into the carbon steel body and a high-density tungsten weight sits low in the toe, which lets Mizuno redistribute mass for more forgiveness than the muscle-back MB."
