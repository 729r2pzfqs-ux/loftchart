description: >
  The MP-20 MMC is the second generation of Mizuno's multi-material concept iron, built on
  the same chassis and set flow as the MP-20 MB but with a forged titanium muscle plate and
  a tungsten toe weight to move mass away from the centre of the head. The body is Grain Flow
  Forged HD from 1025E Pure Select mild carbon steel and plated with copper under nickel
  chrome. Lofts sit between the MB and HMB models, with a 32-degree 7-iron and a 46-degree
  pitching wedge, and offset is moderate at 0.122 inches in the 7-iron.
  The stock set is 4-PW, and all figures are the men's standard steel-shaft specification.
