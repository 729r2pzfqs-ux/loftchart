description: >
  The JPX-900 Hot Metal is the cast, distance-oriented member of Mizuno's 2016 JPX-900 family,
  made from Chromoly 4140M so the face could be thinned for ball speed while the head stayed
  strong enough to be bent for loft and lie. It carries noticeably more offset than the forged
  JPX-900, at 0.179 inches in the 7-iron against 0.132 inches, and the long irons are listed
  with zero bounce. Lofts are strong, with a 31-degree 7-iron and a 45-degree pitching wedge.
  The set runs 4-iron through gap wedge with matching sand and lob wedges available.
  All figures are the men's standard steel-shaft specification.
