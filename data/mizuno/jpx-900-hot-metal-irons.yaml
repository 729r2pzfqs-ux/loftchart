faq:
  - q: "What is the loft of a Mizuno JPX-900 Hot Metal 7-iron?"
    a: "The Mizuno JPX-900 Hot Metal 7-iron has a loft of 31 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the difference between the JPX-900 Hot Metal and the JPX-900 Forged?"
    a: "They share the same lofts, lies and lengths, but the Hot Metal is cast from Chromoly 4140M and carries much more offset, 0.179 inches at the 7-iron against 0.132 inches for the forged model."
  - q: "Can JPX-900 Hot Metal irons be bent for loft and lie?"
    a: "Yes. Mizuno chose Chromoly 4140M partly because the cast head can still be bent for loft and lie adjustment, which is unusual for a cast game-improvement iron."
