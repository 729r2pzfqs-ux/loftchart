description: >
  The Mizuno Pro 241 is the muscle-back of the 2024 Mizuno Pro series and the direct
  replacement for the Pro 221. It is one-piece Grain Flow Forged HD from 1025E Pure
  Select mild carbon steel in Hiroshima, with mass gathered centrally behind impact,
  a soft copper underlay and a full satin brush finish. Lofts carry over unchanged
  from the Pro 221 at 34 degrees in the 7-iron and 46 degrees in the pitching wedge,
  but bounce was raised by one degree in the long irons and two degrees in the
  scoring irons, and the 3-iron lie is half a degree more upright. The stock set is
  3-PW in right hand and 4-PW in left. Lofts, lies and lengths listed are the men's
  standard steel-shaft build.
