faq:
  - q: "What is the loft of a Mizuno Pro 241 7-iron?"
    a: "The Mizuno Pro 241 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What changed from the Mizuno Pro 221 to the Pro 241?"
    a: "Lofts, lengths and offset are unchanged. Bounce went up by one degree in the long irons and two degrees in the scoring irons, the 3-iron lie moved from 59 to 59.5 degrees, and the head was retooled with more central mass and a thinner topline."
  - q: "What is the pitching wedge loft on the Mizuno Pro 241?"
    a: "The Mizuno Pro 241 pitching wedge is 46 degrees. The set runs 3-PW, so gapping below the pitching wedge is covered by separate wedges."
