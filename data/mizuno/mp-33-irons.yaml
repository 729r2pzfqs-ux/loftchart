description: >
  The MP-33 is a pure muscle-back blade and one of the most copied shapes in modern
  golf, produced using Mizuno's Grain Flow Forged process at the Hiroshima plant.
  It was offered in a long 1-iron through pitching wedge range with a thin topline,
  minimal offset and a traditional 4-degree loft gap through the short irons.
  Lofts are notably weak by current standards, with a 36-degree 7-iron.
  Lengths and lofts listed are the standard men's steel-shaft specification.
