faq:
  - q: "What is the loft of a Mizuno MP-33 7-iron?"
    a: "The Mizuno MP-33 7-iron has a loft of 36 degrees, with a 61-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-33?"
    a: "The MP-33 pitching wedge is 48 degrees, which is roughly 4 to 6 degrees weaker than a modern game-improvement pitching wedge."
