description: >
  The MP-18 SC is the split cavity model in Mizuno's MP-18 family, sitting between
  the MP-18 MB muscle back and the multi-material MP-18 MMC. It is HD Grain Flow
  Forged from 1025E mild carbon steel and shares the MB's lofts, lies, lengths and
  offsets exactly, so the two were commonly built as a combo set. The stock set was
  3-PW with a 34-degree 7-iron and a 46-degree pitching wedge, and offset stays under
  0.102 inches throughout. Specs below are the men's standard steel-shaft build.
