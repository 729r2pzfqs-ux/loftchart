faq:
  - q: "What is the loft of a Mizuno MP-18 SC 7-iron?"
    a: "The Mizuno MP-18 SC 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-18 SC?"
    a: "The MP-18 SC pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "Can you combo the MP-18 SC with the MP-18 MB?"
    a: "Yes. The SC and MB share identical lofts, lies, lengths and offsets, so a combo set such as MB short irons with SC long irons keeps a consistent gapping and offset progression."
