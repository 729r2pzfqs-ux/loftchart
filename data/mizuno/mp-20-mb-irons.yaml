description: >
  The MP-20 MB is Mizuno's muscle-back blade for 2019-2020, Grain Flow Forged HD from a
  single billet of 1025E Pure Select mild carbon steel and finished with a soft copper
  underlay beneath nickel chrome plating. It uses a flow-tapered blade profile, so the long
  irons sit slightly lower in centre of gravity than the scoring irons, and offset is minimal
  throughout at 0.087 inches in the 7-iron. Lofts are traditional rather than strengthened,
  with a 34-degree 7-iron and a 46-degree pitching wedge, and the stock set runs 3-PW.
  All figures are the men's standard steel-shaft specification.
