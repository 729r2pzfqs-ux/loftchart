faq:
  - q: "What is the loft of a Mizuno MP-20 MB 7-iron?"
    a: "The Mizuno MP-20 MB 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How much offset does the MP-20 MB have?"
    a: "Very little. Offset runs from 0.102 inches in the 3-iron down to 0.075 inches in the pitching wedge, with 0.087 inches at the 7-iron."
  - q: "What clubs come in an MP-20 MB set?"
    a: "The stock range is 3-iron through pitching wedge. Mizuno sold the heads individually as well, so many players combined MP-20 MB short irons with MP-20 MMC or HMB long irons."
