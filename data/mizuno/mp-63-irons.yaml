faq:
  - q: "What is the loft of a Mizuno MP-63 7-iron?"
    a: "The Mizuno MP-63 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How much offset do the Mizuno MP-63 irons have?"
    a: "Very little. Offset runs from 0.122 inches at the 3-iron down to 0.102 inches at the pitching wedge, close to Mizuno's MP-68 blade of the same period."
  - q: "What is the difference between the MP-63 and the MP-53?"
    a: "The lofts, lies and lengths are identical. The MP-63 is the more compact head with less offset, while the MP-53 is larger and carries roughly 0.02 inches more offset through the long irons."
