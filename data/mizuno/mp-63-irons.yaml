description: >
  The MP-63 is a Grain Flow Forged players cavity back and the smaller, lower-offset half
  of the pair Mizuno released with the MP-53. It shares that model's lofts, lies and
  lengths exactly but is built on a more compact head with offset of 0.122 inches or less
  through the set. The 7-iron is 34 degrees and the pitching wedge 46 degrees, and the
  stock set was 3-PW with True Temper Dynamic Gold shafts.
  Lengths and lofts listed are the standard men's steel-shaft specification.
