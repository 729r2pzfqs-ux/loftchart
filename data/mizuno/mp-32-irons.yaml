faq:
  - q: "What is the loft of a Mizuno MP-32 7-iron?"
    a: "The Mizuno MP-32 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "How much offset do the Mizuno MP-32 irons have?"
    a: "Very little. Offset runs 0.120 inches in the long irons and drops to 0.110 inches from the 7-iron through the pitching wedge."
  - q: "Is the MP-32 a blade or a cavity back?"
    a: "It is a cavity blade: a blade-sized head with a shallow cavity and a Cut Muscle pad behind the impact area."
