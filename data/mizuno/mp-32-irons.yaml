description: >
  The MP-32 is a Grain Flow Forged cavity blade that pairs a blade-like profile and
  very small offset with a shallow cavity and a Cut Muscle pad behind the hitting
  area. It sits between the MP-33 blade and Mizuno's larger cavity irons, keeping
  the same 4-degree loft gapping through the short irons but running one degree
  stronger than the MP-33 in the mid and short irons.
  Lengths and lofts listed are the standard men's steel-shaft specification.
