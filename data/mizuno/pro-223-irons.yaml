description: >
  The Mizuno Pro 223 is the players cavity-back of the 2022 Mizuno Pro series and the
  replacement for the MP-20 MMC. The 4-7 irons use a forged Chromoly face with a flow
  micro slot for ball speed, while the 8-iron through gap wedge are one-piece 1025E
  Pure Select mild carbon steel built the same way as the Pro 221. Lofts sit between
  the Pro 221 and Pro 225, with a 32-degree 7-iron and a 46-degree pitching wedge, and
  offset matches the Pro 225 at 0.122 inch in the 7-iron. The stock set is 4-GW in both
  right and left hand. Lofts, lies and lengths listed are the men's standard steel-shaft
  build.
