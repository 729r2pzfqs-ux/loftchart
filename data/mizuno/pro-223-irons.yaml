faq:
  - q: "What is the loft of a Mizuno Pro 223 7-iron?"
    a: "The Mizuno Pro 223 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno Pro 223?"
    a: "The Mizuno Pro 223 pitching wedge is 46 degrees and the matching gap wedge is 51 degrees, which is a 5-degree gap."
  - q: "Are the Mizuno Pro 223 irons forged?"
    a: "Yes. The 8-iron through gap wedge are one-piece Grain Flow Forged HD 1025E mild carbon steel, and the 4-7 irons pair a forged Chromoly face and micro slot with a forged body."
