description: >
  The MP-5 launched alongside the MP-25 in September 2015 as Mizuno's compact
  players cavity, described by the company as a blade profile with a hollowed-out
  back rather than a full cavity design. It is Grain Flow Forged from 1025E mild
  carbon steel and was sold as a 3-PW set. Lofts match the MP-4 and MP-15 of the same
  period, running 21 degrees in the 3-iron to 46 degrees in the pitching wedge with a
  34-degree 7-iron. Specs below are the men's standard steel-shaft build.
