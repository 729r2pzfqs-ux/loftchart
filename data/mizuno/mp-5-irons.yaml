faq:
  - q: "What is the loft of a Mizuno MP-5 7-iron?"
    a: "The Mizuno MP-5 7-iron has a loft of 34 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Mizuno MP-5?"
    a: "The MP-5 pitching wedge is 46 degrees, with a 63-degree lie and a 35.5-inch length."
  - q: "Are the Mizuno MP-5 irons blades?"
    a: "Not strictly. The MP-5 keeps a blade-like profile and topline but hollows out the back of the head, placing it between the MP-4 muscle back and the fuller MP-15 cavity."
