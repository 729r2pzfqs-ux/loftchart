faq:
  - q: "What is the loft of a Mizuno JPX-850 Forged 7-iron?"
    a: "The Mizuno JPX-850 Forged 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is boron steel in the JPX-850 Forged?"
    a: "Mizuno added boron to its 1025E carbon steel to raise tensile strength, which allowed a thinner forged face without losing the ability to bend the hosel for loft and lie adjustment."
  - q: "How do JPX-850 Forged lofts compare with the JPX-900 Forged?"
    a: "The JPX-850 Forged is one degree weaker through the long and mid irons: 22 degrees at the 4-iron and 32 at the 7-iron, against 21 and 31 for the JPX-900 Forged. Both share a 45-degree pitching wedge."
