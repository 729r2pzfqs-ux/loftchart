description: >
  The JPX-850 Forged was the first Mizuno iron to use boron-infused 1025E carbon steel, which
  raised the strength of the material enough for Mizuno to thin the face while keeping the
  Grain Flow Forged process and a bendable hosel. It is a moderate cavity-back players iron
  with a 0.130-inch 7-iron offset, sold as a 4-iron through gap wedge set. Lofts sit one
  degree weaker than the JPX-900 Forged that followed it, with a 32-degree 7-iron and a
  45-degree pitching wedge.
  All figures are the men's standard steel-shaft specification.
