faq:
  - q: "What is the loft of a Mizuno MP-62 7-iron?"
    a: "The Mizuno MP-62 7-iron has a loft of 35 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the set makeup of the Mizuno MP-62?"
    a: "The stock set was 3-iron through pitching wedge, eight clubs, with lofts running from 21 to 47 degrees."
  - q: "Are the Mizuno MP-62 irons forged?"
    a: "Yes. The heads are Grain Flow Forged from 1025E mild carbon steel and use a dual muscle back rather than a full cavity."
