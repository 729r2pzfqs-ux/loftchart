description: >
  The MP-62 is a Grain Flow Forged players cavity back built around a dual muscle design,
  with mass split between a low bar and an upper pad to keep the centre of gravity central
  in a blade-sized head. It has a thin topline, minimal offset and a rounded sole grind,
  and was played on tour by Luke Donald among others. Lofts run 21 degrees at the 3-iron
  to 47 degrees at the pitching wedge, with a 35-degree 7-iron, and the stock set was
  3-PW. Lengths and lofts listed are the standard men's steel-shaft specification.
