faq:
  - q: "What is the loft of a Mizuno JPX-923 Hot Metal 7-iron?"
    a: "The Mizuno JPX-923 Hot Metal 7-iron has a loft of 28.5 degrees, with a 61.5-degree lie and a 37-inch steel-shaft length."
  - q: "How do JPX-923 Hot Metal lofts compare with JPX-923 Forged?"
    a: "The Hot Metal is 1.5 degrees stronger through most of the set. Its 7-iron is 28.5 degrees against 30 degrees for the Forged, and its pitching wedge is 42.5 degrees against 44 degrees."
  - q: "What is the difference between JPX-923 Hot Metal, Hot Metal Pro and Hot Metal HL?"
    a: "All three share the same head material. Hot Metal Pro is a more compact head with less offset at the same lofts, while Hot Metal HL is weaker-lofted for higher launch, with a 31-degree 7-iron against 28.5 degrees on the standard Hot Metal."
  - q: "What wedges were in the JPX-923 Hot Metal set?"
    a: "The stock range was 4-iron through lob wedge, with a 42.5-degree pitching wedge, 48-degree gap wedge, 54-degree sand wedge and 60-degree lob wedge."
