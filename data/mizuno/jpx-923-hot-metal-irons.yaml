description: >
  The JPX-923 Hot Metal is the cast, distance-oriented model of the 2022 JPX
  family, using a Nickel Chromoly 4335 body with a face thinned to 1.8 mm and a
  redesigned V-Chassis sole. It was sold alongside narrower Hot Metal Pro and
  weaker-lofted Hot Metal HL variants; the specs here are the standard Hot Metal.
  It carries the most offset in the family, from 0.233 inches in the 4-iron to
  0.065 inches in the lob wedge, and the strongest lofts, with a 28.5-degree
  7-iron and a 42.5-degree pitching wedge against 30 and 44 degrees on the
  JPX-923 Forged. The stock set is 4-iron through lob wedge.
  Lofts, lies and lengths listed are the men's standard steel-shaft build.
