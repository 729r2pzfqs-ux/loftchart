faq:
  - q: "What is the loft of a Mizuno JPX-825 7-iron?"
    a: "The Mizuno JPX-825 7-iron has a loft of 32 degrees, with a 61.5-degree lie and a 36.75-inch steel-shaft length."
  - q: "What is the difference between the JPX-825 and the JPX-825 Pro?"
    a: "The JPX-825 is the cast, wider-soled game-improvement model. The JPX-825 Pro is a forged, more compact iron with lofts about one degree weaker through the long and mid irons."
  - q: "What clubs come in a JPX-825 set?"
    a: "The stock range is 4-iron through gap wedge, with the pitching wedge at 45 degrees and the gap wedge at 50 degrees."
