description: >
  The JPX-825 was Mizuno's cast game-improvement iron for 2013 and 2014, sitting below the
  forged JPX-825 Pro in the same family. It uses a deep pocket cavity and a thin, high-strength
  face, with a wide sole and a low centre of gravity in the long irons. Lofts are strong for
  the period, with a 32-degree 7-iron and a 45-degree pitching wedge, and the long irons carry
  negative measured bounce. The stock set is 4-iron through gap wedge.
  Lofts, lies and lengths listed are the men's standard steel-shaft specification.
