  - "2nd Swing Golf 'Nike Victory Red Pro Combo Iron Set' specification table (retrieved July 2026) - supplied loft, lie, length and bounce for 3-iron through PW."
  - "Cross-checked against golfclubspec.com's Nike Forged Pro Combo (2002) entry, which lists an identical loft/lie/length ladder - Nike carried the same progression across both combo sets, so the match is genuine rather than a mis-attribution."
