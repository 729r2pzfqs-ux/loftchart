faq:
  - q: "What is the loft of a Nike VR Pro Combo 7-iron?"
    a: "The Nike VR Pro Combo 7-iron has a loft of 35 degrees, with a 62.5-degree lie and a 37-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Nike VR Pro Combo?"
    a: "The VR Pro Combo pitching wedge is 47 degrees. That is a traditional loft, around 3 to 5 degrees weaker than a game-improvement pitching wedge of the same period."
  - q: "Are the Nike VR Pro Combo irons blades?"
    a: "Only partly. It is a combo set: the 3- through 5-irons use a pocket cavity, the 6- and 7-irons a split cavity, and the 8-iron through pitching wedge are full muscle-back blades."
