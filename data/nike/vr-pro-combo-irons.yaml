description: >
  The VR Pro Combo is Nike's forged combo set, built around three head shapes that
  change through the bag: a pocket-cavity design in the 3- to 5-irons for launch, a
  split-cavity mid-iron, and a full muscle-back blade from the 8-iron down. Lofts are
  traditional throughout, with a 35-degree 7-iron and a 47-degree pitching wedge — far
  weaker than the distance irons of the same era. The stock set is 3-iron through
  pitching wedge, and the sole carries progressive bounce that grows from 2 degrees in
  the 3-iron to 9 degrees in the wedge. It was the iron Tiger Woods and Rory McIlroy
  played versions of during Nike's tour-staff era. Offset is not published for this set
  and is omitted below rather than inferred.
