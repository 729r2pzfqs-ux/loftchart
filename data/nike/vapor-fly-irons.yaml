description: >
  The Vapor Fly was the game-improvement iron in Nike's final iron family, released in
  2016 shortly before Nike exited club manufacturing altogether. The 4- through 7-irons
  use a hollow cavity to raise launch, while the 8-iron, 9-iron and pitching wedge switch
  to an RZN-filled pocket for stability and feel. It has a thick topline, a wide sole and
  more offset than the Vapor Fly Pro sold alongside it. Lofts are strong for the period,
  with a 32-degree 7-iron and a 44-degree pitching wedge. The set listed here is 4-iron
  through pitching wedge plus a 54-degree sand wedge; note the 10-degree gap between PW
  and SW, which is how the set was sold rather than an error in the table. Offset, bounce
  and swing weight were not published in the source and are omitted rather than inferred.
