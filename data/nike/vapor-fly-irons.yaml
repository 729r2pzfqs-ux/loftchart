faq:
  - q: "What is the loft of a Nike Vapor Fly 7-iron?"
    a: "The Nike Vapor Fly 7-iron has a loft of 32 degrees, with a 62.5-degree lie and a 37.75-inch steel-shaft length."
  - q: "What is the difference between the Nike Vapor Fly and Vapor Fly Pro?"
    a: "The Vapor Fly is the game-improvement model with a thicker topline, wider sole and more offset. The Vapor Fly Pro is the compact version with weaker lofts, aimed at better players."
  - q: "Were the Nike Vapor Fly irons the last Nike irons?"
    a: "Effectively yes. Nike announced its exit from golf club and ball manufacturing in August 2016, and the 2016 Vapor family was the final iron line it brought to market."
