description: >
  The Vapor Pro is the most compact iron in Nike's 2015 Vapor family, sitting below the
  Vapor Pro Combo, Vapor Speed and Vapor Fly. It is a forged players iron with a thin
  topline, a narrow sole and minimal offset — 0.080 inches at the 7-iron — built around
  a modified muscle-back profile rather than a deep cavity. Lofts are fully traditional,
  with a 35-degree 7-iron and a 47-degree pitching wedge, unchanged from the VR Pro
  Combo it replaced. The stock set is 3-iron through pitching wedge with progressive
  bounce running from 3 degrees to 10 degrees, built to D3.5 swing weight with Dynamic
  Gold shafts.
