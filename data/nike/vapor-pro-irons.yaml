faq:
  - q: "What is the loft of a Nike Vapor Pro 7-iron?"
    a: "The Nike Vapor Pro 7-iron has a loft of 35 degrees, with a 62.5-degree lie and a 37.25-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Nike Vapor Pro?"
    a: "The Vapor Pro pitching wedge is 47 degrees, a traditional loft that leaves a clean gap to a 51 or 52-degree gap wedge."
  - q: "How do the Nike Vapor Pro lofts compare to the VR Pro Combo?"
    a: "They are identical through the set, from a 21-degree 3-iron to a 47-degree pitching wedge. The Vapor Pro is a quarter-inch longer in the mid and long irons and publishes offset figures, which the VR Pro Combo did not."
