description: >
  The VR_S Covert irons were the iron half of Nike's 2013 Covert launch, sold alongside
  the cavity-back Covert driver. They use a deep undercut cavity with a thin,
  high-strength face and a modified sole, and carry noticeably more offset than Nike's
  players irons — 0.150 inches at the 7-iron, tapering to 0.040 inches in the gap wedge.
  Lofts are moderately strong for the period, with a 31-degree 7-iron and a 44-degree
  pitching wedge. The stock set listed here is 4-iron through gap wedge; a 3-iron and a
  sand wedge were available as add-ons. Bounce and swing weight were not published in
  the source table and are omitted rather than inferred.
