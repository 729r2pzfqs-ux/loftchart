faq:
  - q: "What is the loft of a Nike VR_S Covert 7-iron?"
    a: "The Nike VR_S Covert 7-iron has a loft of 31 degrees, with a 62-degree lie and a 37.5-inch steel-shaft length."
  - q: "What is the pitching wedge loft on the Nike VR_S Covert?"
    a: "The VR_S Covert pitching wedge is 44 degrees, with a 48-degree gap wedge in the stock set to fill the gap below it."
  - q: "How much offset do the Nike VR_S Covert irons have?"
    a: "The 7-iron has 0.150 inches of offset. Offset reduces progressively through the set, from 0.195 inches in the 4-iron down to 0.040 inches in the gap wedge."
